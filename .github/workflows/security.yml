name: Security

# Supply-chain + configuration scanning, separate from the build gates in ci.yml
# so it can also run on a schedule (catches newly-disclosed CVEs in dependencies
# and base images that were clean at merge time).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # Mondays 04:23 UTC — weekly drift sweep

permissions:
  contents: read

jobs:
  filesystem:
    name: Trivy — dependencies + secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Trivy installed from a pinned release tarball rather than the composite
      # aquasecurity/trivy-action: that action internally references
      # aquasecurity/setup-trivy@v0.2.2, a tag that no longer resolves and broke
      # the job at setup. The amd64 (Linux-64bit) asset matches ubuntu-latest.
      # Mirrors the install in image-release.yml.
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.71.0"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version
      - name: Trivy filesystem scan (vuln + secret)
        run: |
          trivy fs --scanners vuln,secret --ignore-unfixed \
            --severity HIGH,CRITICAL --exit-code 1 .

  iac:
    name: Trivy — IaC / manifest misconfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.71.0"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version
      - name: Trivy config scan (Dockerfiles + k8s manifests)
        run: trivy config --severity HIGH,CRITICAL --exit-code 1 .

  rust-advisories:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    # audit-check posts results as a Check Run, which needs checks:write on top
    # of the repo-default contents:read; without it the step fails with
    # "Resource not accessible by integration".
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: backend

  rust-supply-chain:
    name: cargo deny (licenses + sources + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pinned version for reproducibility (mirrors the cargo-audit gate; the
      # policy + accepted-advisory rationale live in backend/deny.toml).
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.9
      - run: cargo deny --manifest-path backend/Cargo.toml check

  node-advisories:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # High/critical advisories fail the job; moderate are reported only.
      - run: npm audit --audit-level=high
