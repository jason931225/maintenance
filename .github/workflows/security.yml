name: Security

# Supply-chain + configuration scanning, separate from the build gates in ci.yml
# so it can also run on a schedule (catches newly-disclosed CVEs in dependencies
# and base images that were clean at merge time).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # Mondays 04:23 UTC — weekly drift sweep

permissions:
  contents: read

jobs:
  filesystem:
    name: Trivy — dependencies + secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy filesystem scan (vuln + secret)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: fs
          scanners: vuln,secret
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

  iac:
    name: Trivy — IaC / manifest misconfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy config scan (Dockerfiles + k8s manifests)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: "1"

  rust-advisories:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: backend

  node-advisories:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbc3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # High/critical advisories fail the job; moderate are reported only.
      - run: npm audit --audit-level=high
