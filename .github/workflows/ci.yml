name: CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

jobs:
  backend:
    name: Backend — fmt / clippy / test / gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          # rust-toolchain.toml drives the exact version; this step just
          # ensures rustup is available and honours the file.
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Layer-boundary gate
        run: cargo run -p mnt-gate-layer-boundary

      - name: Audit-coverage gate
        run: cargo run -p mnt-gate-audit-coverage

      - name: Migration-safety gate
        run: cargo run -p mnt-gate-migration-safety

      - name: PII-no-logs gate
        run: cargo run -p mnt-gate-pii-no-logs
