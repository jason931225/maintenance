name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "backend/openapi/**"
      - "clients/**"
      - "web/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "android/**"
      - "ios/**"
      - "deploy/**"
      - "docs/benchmarks/**"
      - "docs/specs/**"
      - "docs/ENTERPRISE-READINESS.md"
      - "docs/GO-LIVE-CHECKLIST.md"
      - "docs/i18n.md"
      - "docs/parity-checklist.md"
      - "ops/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
      - "tsconfig.json"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend/openapi/**"
      - "clients/**"
      - "web/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "android/**"
      - "ios/**"
      - "deploy/**"
      - "docs/benchmarks/**"
      - "docs/specs/**"
      - "docs/ENTERPRISE-READINESS.md"
      - "docs/GO-LIVE-CHECKLIST.md"
      - "docs/i18n.md"
      - "docs/parity-checklist.md"
      - "ops/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
      - "tsconfig.json"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — fmt / clippy / test / gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: mnt_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/mnt_ci
      # Backend CI compiles the full workspace, tests, and custom gates on the
      # standard GitHub runner. Keep artifacts lean so unrelated UI-only PRs do
      # not fail from runner disk exhaustion while preserving the same checks.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Free runner disk for Rust backend
        uses: ./.github/actions/free-runner-disk

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # rust-toolchain.toml drives the exact version; this step just
          # ensures rustup is available and honours the file.
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-backend-
            ${{ runner.os }}-cargo-

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy -D warnings
        run: SQLX_OFFLINE=true cargo clippy --all-targets -- -D warnings

      - name: cargo test
        # SQLX_OFFLINE=true so the query! macros compile against the committed
        # .sqlx cache (the documented contract — see crates/platform/db/src/lib.rs)
        # rather than the unmigrated CI service DB. The #[sqlx::test] runtime
        # tests still use DATABASE_URL to create their own per-test databases.
        # Without this, a Cargo.lock change busts the build cache and the macros
        # re-check online against a schema-less DB ("audit_events does not exist").
        run: SQLX_OFFLINE=true cargo test

      - name: Layer-boundary gate
        run: cargo run -p mnt-gate-layer-boundary

      - name: Audit-coverage gate
        run: cargo run -p mnt-gate-audit-coverage

      - name: Migration-safety gate
        run: cargo run -p mnt-gate-migration-safety

      - name: Tenant-isolation gate
        run: cargo run -p mnt-gate-tenant-isolation

      - name: PII-no-logs gate
        run: cargo run -p mnt-gate-pii-no-logs

      - name: RLS-arming gate
        run: cargo run -p mnt-gate-rls-arming

  dev-up-smoke:
    name: dev-up.mjs smoke — compose deps + migrate + /readyz
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Free runner disk for Rust backend
        uses: ./.github/actions/free-runner-disk

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-dev-up-smoke-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dev-up-smoke-
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: dev-up bootstrap (compose deps + migrate + backend readyz)
        # macOS/Windows GH-hosted runners cannot run Linux containers reliably,
        # so this smoke test is ubuntu-only; the other OSes' acceptance is the
        # `doctor` self-check (documented deviation from the plan's "macos
        # runner" wording, per W2.5 reviewer note).
        run: node scripts/dev-up.mjs bootstrap

      - name: Confirm /readyz reachable
        run: curl -fsS "http://127.0.0.1:${MNT_DEV_HTTP_PORT:-8090}/readyz"

      - name: dev-up down
        if: always()
        run: node scripts/dev-up.mjs down

  api-clients:
    name: API clients — TypeScript / Kotlin generation and compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install client tooling
        run: npm ci

      - name: Regenerate TypeScript and Kotlin clients
        run: npm run gen:api:portable

      - name: Generated client drift gate
        run: git diff --exit-code -- clients/ts clients/kotlin

      - name: TypeScript compile
        run: npm run check:ts

      - name: Kotlin compile
        run: npm run check:kotlin

  web:
    name: Web console — lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Foundation gate contract
        run: npm run check:foundation-gates

      - name: Enterprise UX parity / no-text-wall gate
        run: npm run check:enterprise-ux-parity

      - name: Browser persona E2E matrix gate
        run: npm run check:browser-persona-matrix

      - name: G004 identity group org people policy foundation gate
        run: npm run check:g004-identity-foundation

      - name: G005 workflow approval Work Hub lifecycle gate
        run: npm run check:g005-workflow-lifecycle

      - name: Workflow runtime spine gate
        run: npm run check:workflow-runtime-spine

      - name: G006 asset equipment dispatch lifecycle gate
        run: npm run check:g006-asset-dispatch-lifecycle

      - name: G007 collaboration mail calendar poll mobile lifecycle gate
        run: npm run check:g007-collaboration-mobile-lifecycle

      - name: G008 import HR payroll readiness gate
        run: npm run check:g008-payroll-readiness

      - name: People HR lifecycle maturity gate
        run: npm run check:people-hr-maturity

      - name: Payroll release-gate contract
        run: npm run check:payroll-release-gate

      - name: Financial maturity gate
        run: npm run check:financial-maturity

      - name: CX reporting BI maturity gate
        run: npm run check:cx-reporting-maturity

      - name: Operations intelligence maturity gate
        run: npm run check:operations-intelligence-maturity

      - name: Lint (eslint + UI-string gate)
        run: npm run lint --workspace @maintenance/web-console

      - name: Unit tests
        run: npm run test --workspace @maintenance/web-console

      - name: Production build
        run: npm run build --workspace @maintenance/web-console

  api-contract:
    name: API contract — app OpenAPI and generated TS round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: mnt_contract
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_contract"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CONTRACT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mnt_contract

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-contract-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contract-
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install client tooling
        run: npm ci

      - name: OpenAPI app-served drift gate
        run: npm run check:openapi-app

      - name: Generated TypeScript client round-trip
        run: npm run test:contract

  kubernetes-manifests:
    name: Kubernetes manifests — render / hardening / Argo target guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install kubectl (for kustomize renderer)
        env:
          KUBECTL_VERSION: "v1.36.2"
        run: |
          curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Render production manifests and guard Argo targets
        run: scripts/render-k8s-manifests.sh "${RUNNER_TEMP}/rendered-k8s"

      - name: Production hardening contract
        run: npm run check:production-hardening

  swift-client:
    name: API client — Swift generation and build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install client tooling
        run: npm ci

      - name: Verify Swift toolchain
        run: swift --version

      - name: Regenerate Swift client
        run: npm run gen:api:swift

      - name: Generated Swift client drift gate
        run: git diff --exit-code -- clients/swift

      - name: Swift build
        run: npm run check:swift

  mobile-parity:
    name: Mobile parity — checklist and strings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check hardcoded UI strings across clients
        run: node scripts/check-i18n.mjs

      - name: Check parity checklist and localized string keys
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const checklistPath = "docs/parity-checklist.md";
          const androidStringsPath = "android/app/src/main/res/values/strings.xml";
          const iosStringsPath = "ios/Sources/MaintenanceFieldApp/Resources/ko.lproj/Localizable.strings";

          const iosOnlyStringKeys = {
            camera_unavailable: "iOS camera capability fallback copy",
            camera_open_settings: "iOS-only: deep-link to the Settings app for camera permission",
            capture_evidence: "SwiftUI alias for detail_capture_evidence",
            equipment: "SwiftUI detail label",
            error_invalid_user_id: "iOS-only login user-id format validation copy",
            error_network: "SwiftUI network error copy",
            location_consent_collection: "iOS base label; Android uses location_consent_collection_format",
            location_consent_state: "SwiftUI location-consent status label",
            messenger_search_no_results: "iOS messenger search empty-state copy",
            request_no: "SwiftUI detail label",
            result_type: "SwiftUI alias for report_result_type",
            site: "SwiftUI detail label",
            submit_report: "SwiftUI alias for detail_submit_report",
            symptom: "SwiftUI detail label",
            target_due: "SwiftUI detail label (target due date)",
            user_id: "SwiftUI alias for login_user_id_label",
          };

          const fail = (message) => {
            console.error(message);
            process.exitCode = 1;
          };

          const splitMarkdownRow = (line) =>
            line
              .trim()
              .replace(/^\|/, "")
              .replace(/\|$/, "")
              .split("|")
              .map((cell) => cell.trim());

          const checklist = readFileSync(checklistPath, "utf8");
          const parityRows = checklist
            .split(/\r?\n/)
            .filter((line) => /^\|.+\|$/.test(line.trim()))
            .map(splitMarkdownRow)
            .filter((cells) => cells.length >= 4)
            .filter(([area]) => area !== "Area" && !/^[-: ]+$/.test(area));

          if (parityRows.length === 0) {
            fail(`${checklistPath} does not contain parity checklist rows.`);
          }

          for (const [area, androidTarget, iosImplementation, evidence] of parityRows) {
            const missing = [];
            if (!androidTarget) missing.push("Android parity target");
            if (!iosImplementation) missing.push("iOS implementation");
            if (!evidence) missing.push("evidence");
            if (missing.length > 0) {
              fail(`${checklistPath}: row "${area}" is missing ${missing.join(", ")}.`);
            }

            const rowText = [androidTarget, iosImplementation, evidence].join(" ");
            if (/\b(TODO|TBD|unchecked|not checked|not verified)\b/i.test(rowText)) {
              fail(`${checklistPath}: row "${area}" is not checked for both platforms.`);
            }
          }

          const androidXml = readFileSync(androidStringsPath, "utf8");
          const androidKeys = new Set(
            [...androidXml.matchAll(/<string\s+name="([^"]+)"(?:\s+[^>]*)?>[\s\S]*?<\/string>/g)].map(
              ([, key]) => key,
            ),
          );

          const iosStrings = readFileSync(iosStringsPath, "utf8");
          const iosKeys = new Set(
            [...iosStrings.matchAll(/"((?:\\"|[^"])*)"\s*=\s*"((?:\\"|[^"])*)";/g)].map(
              ([, key]) => key.replace(/\\"/g, '"'),
            ),
          );

          const missingFromIos = [...androidKeys].filter((key) => !iosKeys.has(key)).sort();
          const undeclaredIosOnly = [...iosKeys]
            .filter((key) => !androidKeys.has(key) && !Object.hasOwn(iosOnlyStringKeys, key))
            .sort();

          if (missingFromIos.length > 0) {
            fail(`${iosStringsPath} is missing Android string keys: ${missingFromIos.join(", ")}`);
          }

          if (undeclaredIosOnly.length > 0) {
            fail(`${iosStringsPath} has undeclared iOS-only string keys: ${undeclaredIosOnly.join(", ")}`);
          }

          if (process.exitCode) {
            process.exit();
          }

          console.log(`Checked ${parityRows.length} parity rows.`);
          console.log(`Checked ${androidKeys.size} Android string keys against ${iosKeys.size} iOS keys.`);
          console.log(`Allowed ${Object.keys(iosOnlyStringKeys).length} declared iOS-only aliases.`);
          console.log("This gate checks checklist coverage and string-key parity; platform builds cover compile-time parity.");
          NODE

  android-app:
    name: Android app — Gradle build
    runs-on: ubuntu-latest
    needs: mobile-parity

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.1.0"

      - name: Gradle build
        working-directory: android
        # Exclude unit-test tasks from the build step: testDebugUnitTest is run in the
        # dedicated step below, and testReleaseUnitTest cannot be run here because
        # ui-test-manifest (debugImplementation) provides ComponentActivity only to the
        # debug unit-test manifest — not the release one. AGP does not support merging
        # additional AAR manifests into the release JVM unit-test binary via any test
        # source-set scope. The debug run provides equivalent coverage; the release APK
        # is still assembled and lint-checked here.
        run: ./gradlew build -x testReleaseUnitTest -x testDebugUnitTest

      - name: Robolectric Compose UI + accessibility tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Roborazzi screenshot verification
        working-directory: android
        # Goldens are recorded and committed under android/app/src/test/snapshots.
        # verifyRoborazziDebug is the regression gate; it fails on any pixel diff.
        run: ./gradlew verifyRoborazziDebug

      - name: Upload test + Roborazzi reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/test-results/**
            android/app/build/outputs/roborazzi/**
          if-no-files-found: ignore
          retention-days: 7

  android-instrumented:
    name: Android app — instrumented post-login E2E (emulator)
    runs-on: ubuntu-latest
    needs: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.1.0"

      - name: Mint a real backend session for the test user
        id: session
        # No fakes: obtain a REAL session from the REAL backend. The test user's passkey
        # was registered through the automatable web ceremony; here we refresh its token at
        # run start and hand the fresh access+refresh pair to the instrumented test.
        # When the backend secret is absent (e.g. forks), the test self-skips via Assume.
        env:
          FIELD_E2E_BASE_URL: ${{ secrets.FIELD_E2E_BASE_URL }}
          FIELD_E2E_SEED_REFRESH_TOKEN: ${{ secrets.FIELD_E2E_SEED_REFRESH_TOKEN }}
        run: |
          if [ -z "$FIELD_E2E_BASE_URL" ] || [ -z "$FIELD_E2E_SEED_REFRESH_TOKEN" ]; then
            echo "No backend E2E secrets configured; instrumented test will self-skip."
            echo "access=" >> "$GITHUB_OUTPUT"
            echo "refresh=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          resp=$(curl -fsS -X POST "$FIELD_E2E_BASE_URL/api/v1/auth/refresh" \
            -H 'Content-Type: application/json' \
            -d "{\"refresh_token\":\"$FIELD_E2E_SEED_REFRESH_TOKEN\"}")
          echo "access=$(echo "$resp" | jq -r '.access_token')" >> "$GITHUB_OUTPUT"
          echo "refresh=$(echo "$resp" | jq -r '.refresh_token')" >> "$GITHUB_OUTPUT"

      - name: Instrumented post-login E2E on Gradle Managed Device
        working-directory: android
        # Gradle Managed Device: API 34, google_apis_playstore, swiftshader_indirect.
        # The device is declared in app/build.gradle.kts (fieldApi34 GMD).
        run: |
          ./gradlew fieldApi34DebugAndroidTest \
            -Pandroid.testInstrumentationRunnerArguments.FIELD_E2E_ACCESS_TOKEN="${{ steps.session.outputs.access }}" \
            -Pandroid.testInstrumentationRunnerArguments.FIELD_E2E_REFRESH_TOKEN="${{ steps.session.outputs.refresh }}"

  ios-app:
    name: iOS app — Swift build and behavior tests
    runs-on: macos-latest
    needs: mobile-parity

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify Swift toolchain
        run: swift --version

      - name: Swift build
        working-directory: ios
        run: swift build

      - name: Swift package tests
        working-directory: ios
        run: swift test

      - name: Behavior runner
        working-directory: ios
        run: swift run MaintenanceFieldCoreBehaviorTests

  browser-e2e:
    name: Browser E2E — Playwright (all user stories)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          # The harness builds passwordless postgres:// URLs (sqlx + psql connect
          # as the `postgres` superuser, which owns the schema and bypasses RLS for
          # seeding); trust auth lets them connect without a password.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      # Point the harness (e2e/harness/*.sh) at the service as the postgres superuser.
      E2E_PG_SUPERUSER: postgres
      E2E_PG_HOST: localhost
      E2E_PG_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Install PostgreSQL client (psql for the harness seeding)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install Python E2E helpers
        run: |
          python3 -m venv .venv-e2e
          .venv-e2e/bin/python -m pip install --upgrade pip
          .venv-e2e/bin/python -m pip install -r e2e/requirements.txt
          echo "$PWD/.venv-e2e/bin" >> "$GITHUB_PATH"

      - name: Build backend binary (mnt-app) for the harness
        working-directory: backend
        # SQLX_OFFLINE so the query! macros compile against the committed .sqlx cache
        # (same contract as the backend job). The harness then runs target/debug/mnt-app
        # for the migrate + api roles.
        run: SQLX_OFFLINE=true cargo build -q -p mnt-app

      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E suite
        # e2e/run.sh: gen-keys -> db (drop+migrate+seed mnt_e2e) -> boot backend
        # (api role, /readyz) -> playwright (builds + previews web on :5173, proxies
        # /api) -> teardown. Every user-story spec across all roles, real WebAuthn
        # via the CDP virtual authenticator.
        run: bash e2e/run.sh

      - name: Upload Playwright report + traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-e2e-report
          path: |
            e2e/.artifacts/html-report
            e2e/.artifacts/test-results
          retention-days: 7
