name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    # GitHub Actions does not evaluate `paths` for tag pushes; release tags
    # therefore run the full ADR-0009/0012 CI gate regardless of changed files.
    paths:
      - "backend/**"
      - "backend/openapi/**"
      - "clients/**"
      - "web/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "android/**"
      - "ios/**"
      - "deploy/**"
      - "docs/decisions/**"
      - "docs/CI-GATES.md"
      - "docs/benchmarks/**"
      - "docs/specs/**"
      - "docs/ENTERPRISE-READINESS.md"
      - "docs/GO-LIVE-CHECKLIST.md"
      - "docs/i18n.md"
      - "docs/parity-checklist.md"
      - "docs/release/**"
      - "ops/**"
      - "scripts/**"
      - "fastlane/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
      - "tsconfig.json"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend/openapi/**"
      - "clients/**"
      - "web/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "android/**"
      - "ios/**"
      - "deploy/**"
      - "docs/decisions/**"
      - "docs/CI-GATES.md"
      - "docs/benchmarks/**"
      - "docs/specs/**"
      - "docs/ENTERPRISE-READINESS.md"
      - "docs/GO-LIVE-CHECKLIST.md"
      - "docs/i18n.md"
      - "docs/parity-checklist.md"
      - "docs/release/**"
      - "ops/**"
      - "scripts/**"
      - "fastlane/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
      - "tsconfig.json"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel superseded runs only for PRs. On main, every push must run CI to
  # completion: the image-release ci-gate requires CI success for the exact
  # sha, and a rapid merge train cancelling predecessors starves it of images.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend — fmt / clippy / test / gates
    runs-on: ubuntu-latest
    # Serial integration execution avoids cluster-global role mutation races;
    # retain enough headroom for the full workspace on a cold hosted runner.
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: mnt_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/mnt_ci
      # Job-level so every step (including the gate binaries, which didn't
      # previously set it themselves) compiles query! macros against the
      # committed .sqlx cache instead of an unmigrated DB. Cheap insurance;
      # steps below still set it explicitly too, which is a harmless no-op.
      SQLX_OFFLINE: "true"
      # Backend CI compiles the full workspace, tests, and custom gates on the
      # standard GitHub runner. Keep artifacts lean so unrelated UI-only PRs do
      # not fail from runner disk exhaustion while preserving the same checks.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Free runner disk for Rust backend
        uses: ./.github/actions/free-runner-disk

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # rust-toolchain.toml drives the exact version; this step just
          # ensures rustup is available and honours the file.
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - name: Cache Rust dependencies + build artifacts
        # rust-cache keys on Cargo.lock + rustc + job, caches registry/git deps
        # and prunes stale crates from target/ (so the cache does not grow
        # unbounded on every Cargo.lock change the way a raw target/ cache does).
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Cargo.lock freshness gate
        if: ${{ !cancelled() }}
        run: cargo tree --locked --workspace --target all >/dev/null

      - name: rustfmt check
        if: ${{ !cancelled() }}
        run: cargo fmt --all -- --check

      - name: clippy -D warnings
        if: ${{ !cancelled() }}
        run: SQLX_OFFLINE=true cargo clippy --all-targets -- -D warnings

      # Migration 0165 fails closed unless the portable six-role topology
      # already exists. Reconcile it before any database test applies the
      # migration, using the distinct service administrator only for this
      # cluster-scoped bootstrap.
      - name: Reconcile portable PostgreSQL role topology
        if: ${{ !cancelled() }}
        run: |
          APP_PASSWORD="$(openssl rand -hex 32)"
          RT_PASSWORD="$(openssl rand -hex 32)"
          LEAVE_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          ONTOLOGY_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/ops/postgres-reconcile-topology.sh:/usr/local/bin/postgres-reconcile-topology:ro" \
            -e POSTGRES_HOST=127.0.0.1 -e POSTGRES_DB=mnt_ci \
            -e POSTGRES_ADMIN_USER=postgres -e POSTGRES_ADMIN_PASSWORD=postgres \
            -e MNT_APP_POSTGRES_PASSWORD="$APP_PASSWORD" \
            -e MNT_RT_POSTGRES_PASSWORD="$RT_PASSWORD" \
            -e MNT_LEAVE_COMMAND_POSTGRES_PASSWORD="$LEAVE_COMMAND_PASSWORD" \
            -e MNT_ONTOLOGY_COMMAND_POSTGRES_PASSWORD="$ONTOLOGY_COMMAND_PASSWORD" \
            --entrypoint bash postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20 \
            /usr/local/bin/postgres-reconcile-topology

          # The Apalis adapter contract intentionally mutates only its own
          # dedicated database while proving direct mnt_app/mnt_rt logins. Keep
          # the job-level DATABASE_URL on the cluster administrator because the
          # rest of the serial workspace suite creates its own test databases.
          docker run --rm --network host \
            -e PGPASSWORD=postgres \
            --entrypoint psql \
            postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20 \
            -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "DROP DATABASE IF EXISTS mnt_apalis_contract WITH (FORCE)" \
            -c "CREATE DATABASE mnt_apalis_contract OWNER mnt_app"

          echo "::add-mask::$APP_PASSWORD"
          echo "::add-mask::$RT_PASSWORD"
          {
            echo "MNT_APALIS_OWNER_DATABASE_URL=postgres://mnt_app:${APP_PASSWORD}@localhost:5432/mnt_apalis_contract"
            echo "MNT_APALIS_RUNTIME_DATABASE_URL=postgres://mnt_rt:${RT_PASSWORD}@localhost:5432/mnt_apalis_contract"
            echo "MNT_APALIS_ADMIN_DATABASE_URL=postgres://postgres:postgres@localhost:5432/mnt_apalis_contract"
          } >> "$GITHUB_ENV"

      - name: PR 473 migration operational gate
        if: ${{ !cancelled() }}
        working-directory: .
        # SQLX_OFFLINE=true so the query! macros compile against the committed
        # .sqlx cache (the documented contract — see crates/platform/db/src/lib.rs)
        # rather than the unmigrated CI service DB. The #[sqlx::test] runtime
        # tests still use DATABASE_URL to create their own per-test databases.
        # Without this, a Cargo.lock change busts the build cache and the macros
        # re-check online against a schema-less DB ("audit_events does not exist").
        # The wrapper preserves the full workspace run while isolating the 11
        # migration regressions for exact one-test runtime-result validation.
        # Every test binary remains serial because topology upgrade tests
        # intentionally mutate cluster-global roles.
        run: npm run check:pr473-migration-operational

      # Boot smoke: the real mnt-app binary, migrate then serve mode, against
      # this job's fresh service DB — catches route-panic-at-boot regressions
      # (e.g. a bad router/state wiring) that unit/integration tests never
      # exercise because they never call `serve()`. Mirrors the minimal env
      # image-release.yml's release-probe job uses to boot the shipped image;
      # a throwaway keypair is fine, this only proves the app comes up.
      - name: Boot smoke — migrate + serve + /readyz
        if: ${{ !cancelled() }}
        run: |
          set -e
          openssl ecparam -name prime256v1 -genkey -noout | openssl pkcs8 -topk8 -nocrypt -out /tmp/smoke-priv.pem
          openssl ec -in /tmp/smoke-priv.pem -pubout -out /tmp/smoke-pub.pem

          APP_PASSWORD="$(openssl rand -hex 32)"
          RT_PASSWORD="$(openssl rand -hex 32)"
          LEAVE_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          ONTOLOGY_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/ops/postgres-reconcile-topology.sh:/usr/local/bin/postgres-reconcile-topology:ro" \
            -e POSTGRES_HOST=127.0.0.1 -e POSTGRES_DB=mnt_ci \
            -e POSTGRES_ADMIN_USER=postgres -e POSTGRES_ADMIN_PASSWORD=postgres \
            -e MNT_APP_POSTGRES_PASSWORD="$APP_PASSWORD" \
            -e MNT_RT_POSTGRES_PASSWORD="$RT_PASSWORD" \
            -e MNT_LEAVE_COMMAND_POSTGRES_PASSWORD="$LEAVE_COMMAND_PASSWORD" \
            -e MNT_ONTOLOGY_COMMAND_POSTGRES_PASSWORD="$ONTOLOGY_COMMAND_PASSWORD" \
            --entrypoint bash postgres:18.4 /usr/local/bin/postgres-reconcile-topology

          OWNER_DATABASE_URL="postgres://mnt_app:${APP_PASSWORD}@localhost:5432/mnt_ci"
          RUNTIME_DATABASE_URL="postgres://mnt_rt:${RT_PASSWORD}@localhost:5432/mnt_ci"
          LEAVE_COMMAND_DATABASE_URL="postgres://mnt_leave_cmd:${LEAVE_COMMAND_PASSWORD}@localhost:5432/mnt_ci"
          ONTOLOGY_COMMAND_DATABASE_URL="postgres://mnt_ontology_cmd:${ONTOLOGY_COMMAND_PASSWORD}@localhost:5432/mnt_ci"
          export DATABASE_URL="$OWNER_DATABASE_URL"

          MNT_APP_ROLE=migrate SQLX_OFFLINE=true cargo run -q -p mnt-app
          SQLX_OFFLINE=true cargo test --locked \
            -p mnt-gate-tenant-isolation \
            --test owner_only_acl_postgres18 -- \
            --include-ignored --test-threads=1

          MNT_APP_ROLE=api \
          DATABASE_URL="$RUNTIME_DATABASE_URL" \
          LEAVE_COMMAND_DATABASE_URL="$LEAVE_COMMAND_DATABASE_URL" \
          ONTOLOGY_COMMAND_DATABASE_URL="$ONTOLOGY_COMMAND_DATABASE_URL" \
          MNT_HTTP_ADDR=127.0.0.1:8092 \
          MNT_JWT_ISSUER=ci-boot-smoke \
          MNT_JWT_AUDIENCE=ci-boot-smoke \
          MNT_JWT_PRIVATE_KEY_PEM="$(cat /tmp/smoke-priv.pem)" \
          MNT_JWT_PUBLIC_KEY_PEM="$(cat /tmp/smoke-pub.pem)" \
          MNT_WEBAUTHN_RP_ID=localhost \
          MNT_WEBAUTHN_RP_ORIGIN=http://localhost \
          MNT_COOKIE_SECURE=false \
          SQLX_OFFLINE=true \
          cargo run -q -p mnt-app &
          BOOT_PID=$!

          ready=0
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8092/readyz; then
              ready=1
              break
            fi
            sleep 2
          done

          kill "$BOOT_PID" 2>/dev/null || true
          wait "$BOOT_PID" 2>/dev/null || true

          if [ "$ready" != "1" ]; then
            echo "::error::mnt-app never became ready in boot smoke"
            exit 1
          fi

      - name: Layer-boundary gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-layer-boundary

      - name: Audit-coverage gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-audit-coverage

      - name: Migration-safety gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-migration-safety

      - name: Tenant-isolation gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-tenant-isolation

      - name: PII-no-logs gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-pii-no-logs

      - name: RLS-arming gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-rls-arming

      - name: Dev-auth-absence gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-dev-auth-absence

      - name: IaC tier-discipline gate
        if: ${{ !cancelled() }}
        run: cargo run -p mnt-gate-iac-tier

      - name: Dev-auth feature build/tests
        if: ${{ !cancelled() }}
        # `dev-auth` is NOT in default features (proven above) — build/test it
        # explicitly so its code path still compiles and its own tests
        # (including the route-present-under-the-feature session tests) run.
        # `set -e` would abort on the first failing invocation and hide the rest;
        # run all three, recording failure, then propagate the real exit code so
        # one run reports every failing suite (no exit-code masking).
        run: |
          rc=0
          SQLX_OFFLINE=true cargo test -p mnt-platform-auth-rest --features dev-auth --no-fail-fast -- --test-threads=1 || rc=1
          SQLX_OFFLINE=true cargo test -p mnt-app --features dev-auth --test dev_auth_persona_guard_feature --no-fail-fast -- --test-threads=1 || rc=1
          SQLX_OFFLINE=true cargo test -p mnt-platform-provisioning --test dev_principal_upsert_race --no-fail-fast -- --test-threads=1 || rc=1
          exit $rc

  dev-up-smoke:
    name: dev-up.mjs smoke — compose deps + migrate + /readyz + dev-auth e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Free runner disk for Rust backend
        uses: ./.github/actions/free-runner-disk

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache Rust dependencies + build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: dev-up compose contract unit test
        run: node --test scripts/dev-up-compose.test.mjs

      - name: PostgreSQL topology integration regression
        run: ops/postgres-topology.integration.test.sh

      - name: dev-up bootstrap (compose deps + migrate + backend readyz)
        # macOS/Windows GH-hosted runners cannot run Linux containers reliably,
        # so this smoke test is ubuntu-only; the other OSes' acceptance is the
        # `doctor` self-check (documented deviation from the plan's "macos
        # runner" wording, per W2.5 reviewer note).
        run: node scripts/dev-up.mjs bootstrap

      - name: Confirm /readyz reachable
        run: curl -fsS "http://127.0.0.1:${MNT_DEV_HTTP_PORT:-8090}/readyz"

      - name: dev-up down
        if: always()
        run: node scripts/dev-up.mjs down

      - name: Install workspace dependencies (for the dev-auth e2e project)
        run: npm ci

      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: dev-up bootstrap --features dev-auth (backend + Vite dev server)
        env:
          MNT_DEV_AUTH_E2E: "1"
        run: node scripts/dev-up.mjs bootstrap

      - name: Dev-mode e2e — role switcher against the real dev-auth stack
        # This spec CANNOT run in the "Browser E2E" job above: that suite tests
        # a production build (no dev-auth feature), and the switcher's
        # DEV-only predicate must never be weakened just to make it render
        # there (see playwright.config.ts). Both tiers are already running
        # from the previous step.
        env:
          MNT_DEV_AUTH_E2E: "1"
        run: npx playwright test --project=dev-auth

      - name: Upload dev-auth e2e report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-auth-e2e-report
          path: |
            e2e/.artifacts/html-report
            e2e/.artifacts/test-results
          retention-days: 7

      - name: dev-up down (dev-auth stack)
        if: always()
        run: node scripts/dev-up.mjs down

  api-clients:
    name: API clients — TypeScript / Kotlin generation and compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install client tooling
        run: npm ci

      - name: Regenerate TypeScript and Kotlin clients
        run: npm run gen:api:portable

      - name: Generated client drift gate
        run: git diff --exit-code -- clients/ts clients/kotlin

      - name: TypeScript compile
        if: ${{ !cancelled() }}
        run: npm run check:ts

      - name: TypeScript generated contract tests
        if: ${{ !cancelled() }}
        run: npm run test:api-client-contract:ts

      - name: Kotlin compile and generated contract tests
        if: ${{ !cancelled() }}
        run: npm run check:kotlin

  web:
    name: Web console — lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: ADR governance tests
        if: ${{ !cancelled() }}
        run: npm run test:adrs

      - name: ADR governance gate
        if: ${{ !cancelled() }}
        run: npm run check:adrs

      - name: Foundation gate contract
        if: ${{ !cancelled() }}
        run: npm run check:foundation-gates

      - name: Root npm workspace integrity
        if: ${{ !cancelled() }}
        run: npm run check:root-workspaces

      - name: Root npm workspace integrity tests
        if: ${{ !cancelled() }}
        run: npm run test:root-workspaces

      - name: Canonical npm lockfile
        if: ${{ !cancelled() }}
        run: npm run check:package-lock

      - name: Shared text gate unit tests
        if: ${{ !cancelled() }}
        run: npm run test:text-gate

      - name: Enterprise UX parity / no-text-wall gate
        if: ${{ !cancelled() }}
        run: npm run check:enterprise-ux-parity

      - name: Browser persona E2E matrix gate
        if: ${{ !cancelled() }}
        run: npm run check:browser-persona-matrix

      - name: iOS UI-test fail-closed workflow guard
        if: ${{ !cancelled() }}
        run: npm run check:ios-ui-test-fail-closed

      - name: Android E2E fail-closed workflow guard
        if: ${{ !cancelled() }}
        run: npm run check:android-e2e-fail-closed

      - name: G004 identity group org people policy foundation gate
        if: ${{ !cancelled() }}
        run: npm run check:g004-identity-foundation

      - name: G005 workflow approval Work Hub lifecycle gate
        if: ${{ !cancelled() }}
        run: npm run check:g005-workflow-lifecycle

      - name: Workflow runtime spine gate
        if: ${{ !cancelled() }}
        run: npm run check:workflow-runtime-spine

      - name: Workflow runtime M2 strangler dark-landing gate
        if: ${{ !cancelled() }}
        run: npm run check:workflow-runtime-m2-strangler

      - name: Workflow runtime M2 Cedar-guard observe-and-record gate
        if: ${{ !cancelled() }}
        run: npm run check:workflow-runtime-m2-cedar-guards

      - name: Workflow runtime M2 flag-ON runtime gate
        if: ${{ !cancelled() }}
        run: npm run check:workflow-runtime-m2-runtime

      - name: Workflow runtime M2 outbox-drainer transactional-idempotency gate
        if: ${{ !cancelled() }}
        run: npm run check:workflow-runtime-m2-drainer

      - name: G006 asset equipment dispatch lifecycle gate
        if: ${{ !cancelled() }}
        run: npm run check:g006-asset-dispatch-lifecycle

      - name: G007 collaboration mail calendar poll mobile lifecycle gate
        if: ${{ !cancelled() }}
        run: npm run check:g007-collaboration-mobile-lifecycle

      - name: G008 import HR payroll readiness gate
        if: ${{ !cancelled() }}
        run: npm run check:g008-payroll-readiness

      - name: People HR lifecycle maturity gate
        if: ${{ !cancelled() }}
        run: npm run check:people-hr-maturity

      - name: Payroll release-gate contract
        if: ${{ !cancelled() }}
        run: npm run check:payroll-release-gate

      - name: Financial maturity gate
        if: ${{ !cancelled() }}
        run: npm run check:financial-maturity

      - name: CX reporting BI maturity gate
        if: ${{ !cancelled() }}
        run: npm run check:cx-reporting-maturity

      - name: Operations intelligence maturity gate
        if: ${{ !cancelled() }}
        run: npm run check:operations-intelligence-maturity

      - name: Lint (eslint + UI-string gate)
        if: ${{ !cancelled() }}
        run: npm run lint --workspace @console/web

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: npm run test --workspace @console/web

      - name: Production build
        if: ${{ !cancelled() }}
        run: npm run build --workspace @console/web

  api-contract:
    name: API contract — app OpenAPI and generated TS round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: mnt_contract
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_contract"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CONTRACT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mnt_contract
      MNT_APP_BIN: ${{ github.workspace }}/backend/target/debug/mnt-app
      # This job builds mnt-app before comparing the app-served OpenAPI and
      # running the generated-client round-trip. Match the backend job's lean
      # Cargo artifacts so the standard runner does not exhaust disk on cache
      # misses.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Free runner disk for API contract
        uses: ./.github/actions/free-runner-disk

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache Rust dependencies + build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install client tooling
        run: npm ci

      - name: OpenAPI app-served drift gate
        if: ${{ !cancelled() }}
        run: npm run check:openapi-app

      - name: Employee import replay contract
        if: ${{ !cancelled() }}
        run: npm run test:employee-import-contract

      - name: Ontology write precondition contract
        if: ${{ !cancelled() }}
        run: npm run test:ontology-write-precondition

      - name: Generated TypeScript client round-trip
