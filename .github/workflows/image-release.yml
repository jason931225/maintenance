name: Image Release

# Builds, scans, signs and publishes the server (mnt-app) and web console
# (mnt-web) container images to GHCR as MULTI-ARCH manifest lists
# (linux/amd64 + linux/arm64) so the images run on bare-metal amd64 as well as
# the Oracle Ampere A1 (arm64) cluster. Native-runner build: each arch builds on
# its own native runner (no QEMU — a Rust build under emulation is punishingly
# slow), pushes a single-arch image BY DIGEST, and a merge job stitches the two
# per-arch digests into one manifest list with `docker buildx imagetools
# create`. The manifest-LIST digest (the multi-arch index) is the immutable
# artifact that gets Trivy-scanned, cosign-signed, provenance-attested and
# pinned into the prod overlay — so `docker pull @sha256:<list>` resolves the
# right per-node-arch image.
#
# The Trivy scan is a BLOCKING gate: the manifest list is tagged, but it is only
# cosign-signed + attested after BOTH arches pass the scan, so a vulnerable image
# is never signed. Hard-fail admission verification is not enabled until ops
# installs the sigstore policy-controller CRDs/controller; an audit-mode
# ClusterImagePolicy lives under deploy/apps/maintenance/components/admission-audit.

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Build images only when source/build inputs change. Tag pushes still run
    # regardless of path filters; deploy-only pushes should not wait for a CI
    # run that intentionally never starts. Keep docs/reference and docs/specs
    # because backend crates embed those files into the image at compile time.
    paths:
      - "backend/**"
      - "clients/**"
      - "web/**"
      - "docs/reference/**"
      - "docs/specs/**"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
  workflow_dispatch:

permissions:
  contents: read
  actions: read          # read the same SHA's CI result before building images
  packages: write        # push to GHCR
  id-token: write        # cosign keyless (Fulcio/Rekor) + provenance attest
  attestations: write    # SLSA build provenance

concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Require CI success for this SHA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Wait for CI success
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: bash scripts/wait-for-protected-main-ci.sh

  # One native build per (image, arch). Each leg builds its arch on the matching
  # native runner (amd64 → ubuntu-24.04, arm64 → ubuntu-24.04-arm) and pushes the
  # single-arch image BY DIGEST only (no tags yet — the merge job tags the
  # manifest list). provenance+sbom attestations are attached per arch and are
  # preserved through the manifest-list merge. Each leg exports its digest as an
  # artifact for the merge job to fan in.
  build:
    name: ${{ matrix.image.name }} (${{ matrix.platform.arch }}) — build / push by digest
    needs: ci-gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: mnt-app, dockerfile: backend/Dockerfile }
          - { name: mnt-web, dockerfile: web/Dockerfile }
        platform:
          - { arch: amd64, runner: ubuntu-24.04, target: linux/amd64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, target: linux/arm64 }
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Deterministic build timestamps — rewrite layer/image mtimes to the
      # commit time so the same source produces a bit-reproducible image.
      - name: Set SOURCE_DATE_EPOCH from commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only here — the by-digest push carries no tags; tags are applied
      # to the manifest list in the merge job.
      - name: Derive image labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push by digest (${{ matrix.platform.target }})
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .                       # repo root: backend embeds docs/, web is a workspace
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.target }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest: publish the single-arch image under its content
          # digest with no tag; the merge job assembles the tagged manifest list.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max             # SLSA provenance attestation, per arch
          sbom: true                       # in-toto SPDX SBOM attestation, per arch
          # Per-(image,arch) cache scope so the two arches never clobber each
          # other's gha cache under a shared default key.
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      # Fan-in to the merge job: one tiny artifact per (image, arch) carrying the
      # single-arch digest that imagetools will stitch into the manifest list.
      - name: Stash per-arch digest
        run: printf '%s' "${{ steps.build.outputs.digest }}" > "digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}.txt"
      - name: Upload per-arch digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}.txt
          retention-days: 1
          if-no-files-found: error

  # Merge the two per-arch by-digest images into one multi-arch manifest list,
  # then run the full gate against the LIST digest: Trivy (both arches),
  # cosign-sign, provenance-attest, and stash the list digest for the bump job.
  # Everything downstream (release-probe, bump-digests) consumes this list digest.
  merge:
    name: ${{ matrix.image.name }} — merge manifest / scan / sign / push
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: mnt-app }
          - { name: mnt-web }
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}

    steps:
      # Checkout is only needed to resolve the local setup-trivy composite
      # action below; the image itself comes from the downloaded digest.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Download amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-${{ matrix.image.name }}-amd64
          path: digests
      - name: Download arm64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-${{ matrix.image.name }}-arm64
          path: digests

      # Stitch the two single-arch digests into one manifest list under every
      # derived tag, then read the LIST (index) digest back — that is the
      # immutable multi-arch artifact everything downstream must reference.
      - name: Create multi-arch manifest list + capture its digest
        id: manifest
        run: |
          AMD_DIGEST="$(cat "digests/digest-${IMAGE}-amd64.txt")"
          ARM_DIGEST="$(cat "digests/digest-${IMAGE}-arm64.txt")"
          # Build `-t <tag>` args as an array (no unquoted word-splitting).
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create "${tag_args[@]}" \
            "${IMAGE_NAME}@${AMD_DIGEST}" "${IMAGE_NAME}@${ARM_DIGEST}"
          FIRST_TAG="$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          LIST_DIGEST="$(docker buildx imagetools inspect "$FIRST_TAG" --format '{{.Manifest.Digest}}')"
          case "$LIST_DIGEST" in
            sha256:*) ;;
            *) echo "::error::failed to resolve manifest-list digest (got '$LIST_DIGEST')"; exit 1 ;;
          esac
          echo "digest=$LIST_DIGEST" >> "$GITHUB_OUTPUT"
          echo "Manifest-list digest for ${IMAGE_NAME}: $LIST_DIGEST"
        env:
          IMAGE: ${{ matrix.image.name }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      # BLOCKING vulnerability gate. Runs against the pushed manifest-list digest,
      # once per arch, BEFORE the signing step — so nothing vulnerable is signed.
      # --image-src remote scans the REMOTE registry image (buildx push never
      # loads it into the local daemon); --platform selects each arch's
      # manifest out of the multi-arch index.
      - uses: ./.github/actions/setup-trivy
      - name: Trivy scan both arches (fail on HIGH/CRITICAL)
        run: |
          for platform in linux/amd64 linux/arm64; do
            echo "::group::Trivy ${platform}"
            trivy image --image-src remote --platform "$platform" \
              --exit-code 1 --ignore-unfixed \
              --vuln-type os,library --severity HIGH,CRITICAL \
              "${IMAGE_NAME}@${DIGEST}"
            echo "::endgroup::"
          done
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4

      # Keyless signature over the immutable manifest-list digest (OIDC → Fulcio
      # → Rekor). Signing the index covers both per-arch manifests.
      - name: Sign the manifest list (keyless)
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.manifest.outputs.digest }}

      - name: Attest build provenance (manifest list)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### ${{ matrix.image.name }} (linux/amd64 + linux/arm64)"
            echo ""
            echo "- manifest-list digest: \`${{ steps.manifest.outputs.digest }}\`"
            echo "- tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- both arches scanned (HIGH/CRITICAL gate), SBOM + provenance attested, cosign-signed."
          } >> "$GITHUB_STEP_SUMMARY"

      # Carry the manifest-list digest to the bump-digests job. A matrix collapses
      # to one shared job-outputs map (legs overwrite each other), so a tiny
      # per-image artifact is the robust fan-in for the downstream consumer.
      - name: Stash manifest-list digest for the bump job
        run: printf '%s' "${{ steps.manifest.outputs.digest }}" > "digest-${{ matrix.image.name }}.txt"
      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.image.name }}
          path: digest-${{ matrix.image.name }}.txt
          retention-days: 1
          if-no-files-found: error

  # Plan W3.3(c) / pre-mortem #1: the dev-auth local role-switch endpoint must
  # be REACHABLE NOWHERE outside a dev build. `mnt-gate-dev-auth-absence`
  # (backend job) proves it at the cargo-metadata feature-graph level, and
  # `dev_auth_absence.rs` proves it at the HTTP level for a plain `cargo test`
  # build — this is the THIRD, primary proof: the exact signed image that
  # ships. Runs the freshly built+signed `mnt-app` digest for real and asserts
  # its route table has no `/api/v1/dev-auth/session` at all (404, not a 401/
  # 400 that would mean the route exists but rejected the request).
  release-probe:
    name: mnt-app image — dev-auth route absence probe
    needs: merge
    # The mnt-app manifest list now carries both linux/amd64 and linux/arm64, so
    # `docker pull @<list-digest>` resolves the runner's arch on either. Kept on
    # arm64 (the production cluster's arch) so the probe exercises the arch that
    # actually ships to the A1 nodes.
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
        env:
          POSTGRES_DB: mnt_release_probe
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_release_probe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Download mnt-app digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-app
          path: digests

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the just-built, just-signed image by digest
        run: |
          DIGEST="$(cat digests/digest-mnt-app.txt)"
          IMAGE="ghcr.io/${{ github.repository_owner }}/mnt-app@${DIGEST}"
          docker pull "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # A throwaway ES256 keypair: this probe only needs the app to BOOT and
      # answer /readyz + the one route check, never a real ceremony.
      - name: Generate a throwaway ES256 keypair
        run: |
          openssl ecparam -name prime256v1 -genkey -noout | openssl pkcs8 -topk8 -nocrypt -out /tmp/probe-priv.pem
          openssl ec -in /tmp/probe-priv.pem -pubout -out /tmp/probe-pub.pem
          {
            echo "PROBE_JWT_PRIVATE_KEY_PEM<<PROBE_PEM_EOF"
            cat /tmp/probe-priv.pem
            echo "PROBE_PEM_EOF"
            echo "PROBE_JWT_PUBLIC_KEY_PEM<<PROBE_PEM_EOF"
            cat /tmp/probe-pub.pem
            echo "PROBE_PEM_EOF"
          } >> "$GITHUB_ENV"

      - name: Provision and verify the probe database topology
        run: |
          APP_PASSWORD="$(openssl rand -hex 32)"
          RT_PASSWORD="$(openssl rand -hex 32)"
          LEAVE_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          ONTOLOGY_COMMAND_PASSWORD="$(openssl rand -hex 32)"
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/ops/postgres-reconcile-topology.sh:/usr/local/bin/postgres-reconcile-topology:ro" \
            -e POSTGRES_HOST=127.0.0.1 -e POSTGRES_DB=mnt_release_probe \
            -e POSTGRES_ADMIN_USER=postgres -e POSTGRES_ADMIN_PASSWORD=postgres \
            -e MNT_APP_POSTGRES_PASSWORD="$APP_PASSWORD" \
            -e MNT_RT_POSTGRES_PASSWORD="$RT_PASSWORD" \
            -e MNT_LEAVE_COMMAND_POSTGRES_PASSWORD="$LEAVE_COMMAND_PASSWORD" \
            -e MNT_ONTOLOGY_COMMAND_POSTGRES_PASSWORD="$ONTOLOGY_COMMAND_PASSWORD" \
            --entrypoint bash postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20 \
            /usr/local/bin/postgres-reconcile-topology
          {
            echo "PROBE_OWNER_DATABASE_URL=postgres://mnt_app:${APP_PASSWORD}@127.0.0.1:5432/mnt_release_probe"
            echo "PROBE_RUNTIME_DATABASE_URL=postgres://mnt_rt:${RT_PASSWORD}@127.0.0.1:5432/mnt_release_probe"
            echo "PROBE_LEAVE_COMMAND_DATABASE_URL=postgres://mnt_leave_cmd:${LEAVE_COMMAND_PASSWORD}@127.0.0.1:5432/mnt_release_probe"
            echo "PROBE_ONTOLOGY_COMMAND_DATABASE_URL=postgres://mnt_ontology_cmd:${ONTOLOGY_COMMAND_PASSWORD}@127.0.0.1:5432/mnt_release_probe"
          } >> "$GITHUB_ENV"

      - name: Run migrations against the probe database as mnt_app
        run: |
          docker run --rm --network host \
            -e MNT_APP_ROLE=migrate \
            -e DATABASE_URL="$PROBE_OWNER_DATABASE_URL" \
            "$IMAGE"

      - name: Boot the release image (the real published image — no dev-auth flag exists to pass)
        run: |
          docker run -d --network host --name mnt-app-probe \
            -e MNT_APP_ROLE=api \
            -e DATABASE_URL="$PROBE_RUNTIME_DATABASE_URL" \
            -e LEAVE_COMMAND_DATABASE_URL="$PROBE_LEAVE_COMMAND_DATABASE_URL" \
            -e ONTOLOGY_COMMAND_DATABASE_URL="$PROBE_ONTOLOGY_COMMAND_DATABASE_URL" \
            -e MNT_HTTP_ADDR=127.0.0.1:8091 \
            -e MNT_JWT_ISSUER=release-probe \
            -e MNT_JWT_AUDIENCE=release-probe \
            -e MNT_JWT_PRIVATE_KEY_PEM="$PROBE_JWT_PRIVATE_KEY_PEM" \
            -e MNT_JWT_PUBLIC_KEY_PEM="$PROBE_JWT_PUBLIC_KEY_PEM" \
            -e MNT_WEBAUTHN_RP_ID=localhost \
            -e MNT_WEBAUTHN_RP_ORIGIN=http://localhost \
            -e MNT_COOKIE_SECURE=false \
            "$IMAGE"

      - name: Wait for /readyz
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:8091/readyz && exit 0
            sleep 2
          done
          echo "::error::mnt-app never became ready"
          docker logs mnt-app-probe || true
          exit 1

      - name: Assert POST /api/v1/dev-auth/session is ABSENT (404) in the shipped image
        run: |
          status="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8091/api/v1/dev-auth/session -H 'Content-Type: application/json' -d '{}')"
          echo "status=$status"
          if [ "$status" != "404" ]; then
            echo "::error::dev-auth route answered with $status (expected 404 — not reachable) in the release image"
            docker logs mnt-app-probe || true
            exit 1
          fi

      - name: Stop the probe container
        if: always()
        run: docker rm -f mnt-app-probe || true

  # Auto digest-bump: writes the two freshly built+signed manifest-list digests
  # into the prod kustomize overlay and commits back to the triggering branch,
  # eliminating the manual "extract digest -> hand-edit kustomization" toil. The
  # Argo Rollouts blue/green canary on mnt-app/mnt-web still gates a bad release
  # at deploy time. Skipped on tag builds (detached HEAD — no branch to push to)
  # and dispatch.
  bump-digests:
    name: Auto-bump prod overlay digests
    runs-on: ubuntu-latest
    needs: [merge, release-probe]
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/') &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write # job-level: only this job may push the bump commit

    steps:
      - name: Checkout (full history for rebase before push)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download mnt-app digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-app
          path: digests
      - name: Download mnt-web digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-web
          path: digests

      - name: Bump prod overlay digests
        run: |
          APP_DIGEST="$(cat digests/digest-mnt-app.txt)"
          WEB_DIGEST="$(cat digests/digest-mnt-web.txt)"
          bash scripts/bump-prod-digests.sh "${APP_DIGEST}" "${WEB_DIGEST}"

      - name: Commit + push the bump (rebase-and-retry on a racing push)
        env:
          OVERLAY: deploy/apps/maintenance/overlays/prod/kustomization.yaml
        run: |
          if git diff --quiet -- "$OVERLAY"; then
            echo "Digests already current; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          git commit -m "deploy(prod): auto-bump mnt-app/mnt-web @${GITHUB_SHA:0:7}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on the latest remote head."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done
          echo "Failed to push the digest bump after 5 attempts." >&2
          exit 1
