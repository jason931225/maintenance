name: Image Release

# Builds, scans, signs and publishes the server (mnt-app) and web console
# (mnt-web) container images to GHCR. Multi-arch (linux/amd64 + linux/arm64 —
# arm64 is what the Oracle Ampere A1 cluster runs). The Trivy scan is a BLOCKING
# gate: the image is pushed by digest, but it is only cosign-signed + attested
# after the scan passes, so the deploy-time signature policy refuses any image
# that did not clear scanning.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # push to GHCR
  id-token: write        # cosign keyless (Fulcio/Rekor) + provenance attest
  attestations: write    # SLSA build provenance

concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    name: ${{ matrix.image }} — build / scan / sign / push
    runs-on: ubuntu-24.04-arm # native arm64 — the OCI Ampere A1 cluster is arm64-only
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mnt-app
            dockerfile: backend/Dockerfile
          - image: mnt-web
            dockerfile: web/Dockerfile
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Deterministic build timestamps — rewrite layer/image mtimes to the
      # commit time so the same source produces a bit-reproducible image.
      - name: Set SOURCE_DATE_EPOCH from commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push (by digest, multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .                       # repo root: backend embeds docs/, web is a workspace
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max             # SLSA provenance attestation in the image index
          sbom: true                       # in-toto SPDX SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      # BLOCKING vulnerability gate. Runs against the pushed digest; failing here
      # fails the job BEFORE the signing step, so nothing vulnerable is signed.
      # Trivy installed directly (the composite trivy-action pinned a setup-trivy
      # tag that no longer resolves); arm64 binary matches the runner.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.58.1
          trivy --version
      - name: Trivy scan (fail on HIGH/CRITICAL)
        run: |
          trivy image --exit-code 1 --ignore-unfixed \
            --vuln-type os,library --severity HIGH,CRITICAL \
            "${IMAGE_NAME}@${DIGEST}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      # Keyless signature over the immutable digest (OIDC → Fulcio → Rekor).
      - name: Sign the image (keyless)
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### ${{ matrix.image }}"
            echo ""
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- scanned (HIGH/CRITICAL gate), SBOM + provenance attested, cosign-signed."
          } >> "$GITHUB_STEP_SUMMARY"
