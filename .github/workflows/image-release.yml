name: Image Release

# Builds, scans, signs and publishes the server (mnt-app) and web console
# (mnt-web) container images to GHCR. Single-arch linux/arm64 only — that is
# what the Oracle Ampere A1 cluster runs (extend `platforms` to add amd64). The
# Trivy scan is a BLOCKING gate: the image is pushed by digest, but it is only
# cosign-signed + attested after the scan passes, so a vulnerable image is never
# signed. Hard-fail admission verification is not enabled until ops installs the
# sigstore policy-controller CRDs/controller; an audit-mode ClusterImagePolicy
# lives under deploy/apps/maintenance/components/admission-audit.

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Build images only when source/build inputs change. Tag pushes still run
    # regardless of path filters; deploy-only and docs/specs-only pushes should
    # not wait for a CI run that intentionally never starts. Keep docs/reference
    # because the backend reporting crate embeds those templates into the image.
    paths:
      - "backend/**"
      - "clients/**"
      - "web/**"
      - "docs/reference/**"
      - "package.json"
      - "package-lock.json"
      - "openapitools.json"
  workflow_dispatch:

permissions:
  contents: read
  actions: read          # read the same SHA's CI result before building images
  packages: write        # push to GHCR
  id-token: write        # cosign keyless (Fulcio/Rekor) + provenance attest
  attestations: write    # SLSA build provenance

concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Require CI success for this SHA
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI success
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          deadline=$((SECONDS + 3600))
          while (( SECONDS < deadline )); do
            runs="$(gh run list --repo "$REPO" --workflow ci.yml --commit "$SHA" --limit 5 --json status,conclusion,url)"
            if [[ "$(jq 'length' <<<"$runs")" -gt 0 ]]; then
              status="$(jq -r '.[0].status' <<<"$runs")"
              conclusion="$(jq -r '.[0].conclusion // ""' <<<"$runs")"
              url="$(jq -r '.[0].url' <<<"$runs")"
              echo "CI for $SHA: ${status}/${conclusion} ${url}"
              if [[ "$status" == "completed" ]]; then
                [[ "$conclusion" == "success" ]] && exit 0
                echo "::error::CI did not pass for ${SHA}: ${conclusion} ${url}"
                exit 1
              fi
            else
              echo "No CI run for $SHA yet."
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for CI to finish for ${SHA}"
          exit 1

  images:
    name: ${{ matrix.image }} — build / scan / sign / push
    needs: ci-gate
    runs-on: ubuntu-24.04-arm # free native arm64 for public repos — the A1 cluster is arm64
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mnt-app
            dockerfile: backend/Dockerfile
          - image: mnt-web
            dockerfile: web/Dockerfile
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Deterministic build timestamps — rewrite layer/image mtimes to the
      # commit time so the same source produces a bit-reproducible image.
      - name: Set SOURCE_DATE_EPOCH from commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push (by digest, linux/arm64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .                       # repo root: backend embeds docs/, web is a workspace
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max             # SLSA provenance attestation in the image index
          sbom: true                       # in-toto SPDX SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      # BLOCKING vulnerability gate. Runs against the pushed digest; failing here
      # fails the job BEFORE the signing step, so nothing vulnerable is signed.
      # Trivy installed directly (the composite trivy-action pinned a setup-trivy
      # tag that no longer resolves); arm64 binary matches the runner.
      # Pinned direct binary download. The upstream install.sh lives on Trivy's
      # `main` branch — a moving target that broke the arm64 asset resolution; a
      # pinned release tarball is reproducible and matches the arm64 runner.
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.71.1"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-ARM64.tar.gz" \
            -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version
      # buildx --push uploads to GHCR by digest but never loads the image into
      # the local Docker daemon, so Trivy must scan the REMOTE registry image.
      # --image-src remote skips the (empty) local daemons; TRIVY_USERNAME/PASSWORD
      # authenticate against the private GHCR package; --platform selects the
      # arm64 manifest out of the multi-attestation image index.
      - name: Trivy scan (fail on HIGH/CRITICAL)
        run: |
          trivy image --image-src remote --platform linux/arm64 \
            --exit-code 1 --ignore-unfixed \
            --vuln-type os,library --severity HIGH,CRITICAL \
            "${IMAGE_NAME}@${DIGEST}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4

      # Keyless signature over the immutable digest (OIDC → Fulcio → Rekor).
      - name: Sign the image (keyless)
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### ${{ matrix.image }}"
            echo ""
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- scanned (HIGH/CRITICAL gate), SBOM + provenance attested, cosign-signed."
          } >> "$GITHUB_STEP_SUMMARY"

      # Carry this leg's signed digest to the bump-digests job. A matrix collapses
      # to one shared job-outputs map (legs overwrite each other), so a tiny
      # per-image artifact is the robust fan-in for the downstream consumer.
      - name: Stash digest for the bump job
        run: printf '%s' "${{ steps.build.outputs.digest }}" > "digest-${{ matrix.image }}.txt"
      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.image }}
          path: digest-${{ matrix.image }}.txt
          retention-days: 1
          if-no-files-found: error

  # Plan W3.3(c) / pre-mortem #1: the dev-auth local role-switch endpoint must
  # be REACHABLE NOWHERE outside a dev build. `mnt-gate-dev-auth-absence`
  # (backend job) proves it at the cargo-metadata feature-graph level, and
  # `dev_auth_absence.rs` proves it at the HTTP level for a plain `cargo test`
  # build — this is the THIRD, primary proof: the exact signed image that
  # ships. Runs the freshly built+signed `mnt-app` digest for real and asserts
  # its route table has no `/api/v1/dev-auth/session` at all (404, not a 401/
  # 400 that would mean the route exists but rejected the request).
  release-probe:
    name: mnt-app image — dev-auth route absence probe
    needs: images
    # Must match the images job's arch: mnt-app is built linux/arm64-only, so an
    # amd64 runner fails the pull with "no matching manifest for linux/amd64".
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
        env:
          POSTGRES_DB: mnt_release_probe
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d mnt_release_probe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Download mnt-app digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-app
          path: digests

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the just-built, just-signed image by digest
        run: |
          DIGEST="$(cat digests/digest-mnt-app.txt)"
          IMAGE="ghcr.io/${{ github.repository_owner }}/mnt-app@${DIGEST}"
          docker pull "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # A throwaway ES256 keypair: this probe only needs the app to BOOT and
      # answer /readyz + the one route check, never a real ceremony.
      - name: Generate a throwaway ES256 keypair
        run: |
          openssl ecparam -name prime256v1 -genkey -noout | openssl pkcs8 -topk8 -nocrypt -out /tmp/probe-priv.pem
          openssl ec -in /tmp/probe-priv.pem -pubout -out /tmp/probe-pub.pem
          {
            echo "PROBE_JWT_PRIVATE_KEY_PEM<<PROBE_PEM_EOF"
            cat /tmp/probe-priv.pem
            echo "PROBE_PEM_EOF"
            echo "PROBE_JWT_PUBLIC_KEY_PEM<<PROBE_PEM_EOF"
            cat /tmp/probe-pub.pem
            echo "PROBE_PEM_EOF"
          } >> "$GITHUB_ENV"

      - name: Run migrations against the probe database
        run: |
          docker run --rm --network host \
            -e MNT_APP_ROLE=migrate \
            -e DATABASE_URL="postgres://postgres:postgres@127.0.0.1:5432/mnt_release_probe" \
            "$IMAGE"

      - name: Boot the release image (the real published image — no dev-auth flag exists to pass)
        run: |
          docker run -d --network host --name mnt-app-probe \
            -e MNT_APP_ROLE=api \
            -e DATABASE_URL="postgres://postgres:postgres@127.0.0.1:5432/mnt_release_probe" \
            -e MNT_HTTP_ADDR=127.0.0.1:8091 \
            -e MNT_JWT_ISSUER=release-probe \
            -e MNT_JWT_AUDIENCE=release-probe \
            -e MNT_JWT_PRIVATE_KEY_PEM="$PROBE_JWT_PRIVATE_KEY_PEM" \
            -e MNT_JWT_PUBLIC_KEY_PEM="$PROBE_JWT_PUBLIC_KEY_PEM" \
            -e MNT_WEBAUTHN_RP_ID=localhost \
            -e MNT_WEBAUTHN_RP_ORIGIN=http://localhost \
            -e MNT_COOKIE_SECURE=false \
            "$IMAGE"

      - name: Wait for /readyz
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:8091/readyz && exit 0
            sleep 2
          done
          echo "::error::mnt-app never became ready"
          docker logs mnt-app-probe || true
          exit 1

      - name: Assert POST /api/v1/dev-auth/session is ABSENT (404) in the shipped image
        run: |
          status="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8091/api/v1/dev-auth/session -H 'Content-Type: application/json' -d '{}')"
          echo "status=$status"
          if [ "$status" != "404" ]; then
            echo "::error::dev-auth route answered with $status (expected 404 — not reachable) in the release image"
            docker logs mnt-app-probe || true
            exit 1
          fi

      - name: Stop the probe container
        if: always()
        run: docker rm -f mnt-app-probe || true

  # Auto digest-bump: writes the two freshly built+signed digests into the prod
  # kustomize overlay and commits back to the triggering branch, eliminating the
  # manual "extract digest -> hand-edit kustomization" toil. The Argo Rollouts
  # blue/green canary on mnt-app/mnt-web still gates a bad release at deploy time.
  # Skipped on tag builds (detached HEAD — no branch to push to) and dispatch.
  bump-digests:
    name: Auto-bump prod overlay digests
    runs-on: ubuntu-latest
    needs: [images, release-probe]
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/') &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write # job-level: only this job may push the bump commit

    steps:
      - name: Checkout (full history for rebase before push)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download mnt-app digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-app
          path: digests
      - name: Download mnt-web digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-mnt-web
          path: digests

      - name: Bump prod overlay digests
        run: |
          APP_DIGEST="$(cat digests/digest-mnt-app.txt)"
          WEB_DIGEST="$(cat digests/digest-mnt-web.txt)"
          bash scripts/bump-prod-digests.sh "${APP_DIGEST}" "${WEB_DIGEST}"

      - name: Commit + push the bump (rebase-and-retry on a racing push)
        env:
          OVERLAY: deploy/apps/maintenance/overlays/prod/kustomization.yaml
        run: |
          if git diff --quiet -- "$OVERLAY"; then
            echo "Digests already current; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          git commit -m "deploy(prod): auto-bump mnt-app/mnt-web @${GITHUB_SHA:0:7}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on the latest remote head."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done
          echo "Failed to push the digest bump after 5 attempts." >&2
          exit 1
