name: Release Please

# Enforced semantic versioning. Conventional-commit history on main drives an
# automatically maintained release PR; merging it bumps the version, updates the
# changelog, and pushes a vX.Y.Z tag. That tag then triggers image-release.yml
# (server + web images) and release.yml (mobile apps).
#
# NOTE: a tag pushed with the default GITHUB_TOKEN will NOT trigger those
# tag-based workflows (GitHub suppresses recursive triggers). Add a repo secret
# RELEASE_PLEASE_TOKEN (a fine-grained PAT with contents:write) to chain the
# downstream releases automatically; without it the release PR + tag still work,
# you just trigger image/mobile builds manually. See docs/release/SECRETS.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
