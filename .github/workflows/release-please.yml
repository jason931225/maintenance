name: Release Please

# Enforced semantic versioning. Conventional-commit history on main drives an
# automatically maintained release PR; merging it bumps the version, updates the
# changelog, and pushes a vX.Y.Z tag. That tag then triggers image-release.yml
# (server + web images) and release.yml (mobile apps).
#
# NOTE: release PR creation with the default GITHUB_TOKEN also requires the repo
# Actions setting "Allow GitHub Actions to create and approve pull requests".
# A tag pushed with the default GITHUB_TOKEN will NOT trigger tag-based workflows
# (GitHub suppresses recursive triggers). Add RELEASE_PLEASE_TOKEN (fine-grained
# PAT with contents:write + pull-requests:write) to chain downstream releases
# automatically; without it the release PR + tag still work, but image/mobile
# builds are triggered manually. See docs/release/SECRETS.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Baseline at the last pre-conventional commit so release-please only
          # parses history AFTER it. Without this it walks back to the repo root
          # and the conventional-commit parser aborts on a non-conventional merge
          # subject ("Merge pull request #5 …"). The repo is now squash-merge-only
          # (PR title = commit), so everything after this baseline is conventional.
          bootstrap-sha: 84d39e710204e151465e8c95e7547ba39acfe31d
