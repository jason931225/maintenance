name: iOS UI tests

# CI-ONLY XCUITest run for the SwiftUI field app. The SwiftPM build/unit tests
# live in the main `ci.yml` `ios-app` job (`swift build` / `swift test`); this
# workflow adds the Simulator-bound UI + accessibility-audit suite, which cannot
# run without Xcode + a Simulator and therefore is not runnable on a
# Command-Line-Tools-only machine.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    # GitHub does not evaluate `paths` for tag pushes, so v* release tags run
    # this simulator gate even when the tag itself has no file diff. Branch/PR
    # paths stay narrow: iOS UI changes, generated Swift client drift, or the
    # OpenAPI contract that feeds that client.
    paths:
      - "backend/openapi/**"
      - "clients/swift/**"
      - "ios/**"
      - "openapitools.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-ui-tests.yml"
  pull_request:
    paths:
      - "backend/openapi/**"
      - "clients/swift/**"
      - "ios/**"
      - "openapitools.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-ui-tests.yml"

permissions:
  contents: read

# A UI run is expensive; cancel superseded runs on the same ref.
concurrency:
  group: ios-ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-ui-tests:
    name: iOS — XCUITest + accessibility audit (Simulator)
    runs-on: macos-15

    env:
      # Identity (no hardcoded guess). MNT_IOS_BUNDLE_ID is a repo variable that
      # mirrors the registered app id behind MNT_IOS_APP_IDS in
      # deploy/apps/maintenance/base/configmap.yaml. When that repo variable is
      # absent, the xcconfig repo default is used for the unsigned Simulator test
      # build only; this does not prove release signing/provisioning readiness.
      MNT_IOS_BUNDLE_ID: ${{ vars.MNT_IOS_BUNDLE_ID || 'com.maintenance.field' }}
      MNT_IOS_TEAM_ID: ${{ vars.MNT_IOS_TEAM_ID || '98Q89GFZWP' }}
      # Real-backend session source for the no-fakes seeding. The suite skips
      # (XCTSkip) the session-dependent tests if these are absent — it never fakes
      # a session. Provide a base URL + a seeded refresh token (or OTP) for a
      # dedicated UI-test mechanic.
      MNT_UITEST_BASE_URL: ${{ secrets.MNT_UITEST_BASE_URL }}
      MNT_UITEST_REFRESH_TOKEN: ${{ secrets.MNT_UITEST_REFRESH_TOKEN }}
      MNT_UITEST_OTP: ${{ secrets.MNT_UITEST_OTP }}
      # The fully-qualified shared keychain access group
      # (<TeamIDPrefix>.com.maintenance.field.shared). The test runner uses this
      # as an explicit override only if a probe write to it succeeds; otherwise it
      # resolves the granted group at runtime (see RealSessionSeed.resolvedAccessGroup).
      MNT_IOS_KEYCHAIN_GROUP: ${{ vars.MNT_IOS_KEYCHAIN_GROUP }}
      # Anti-false-green: require the real post-login suite to actually run (not
      # all-skip) on protected refs and pushes. This is a trust-context decision,
      # not a function of whether secrets happen to be present; missing required
      # inputs fail closed in the run step below instead of downgrading the gate.
      MNT_UITEST_REQUIRE_REAL: ${{ (github.event_name == 'push' || github.ref_protected) && '1' || '0' }}
      # Accessibility-audit strictness. BOOTSTRAP = "0": the SwiftUI views have
      # not yet been observed under a real Simulator audit, so the first runs
      # record findings as result-bundle attachments (to triage + fix the views)
      # without failing. Flip to "1" (hard gate) once the audit is clean. Findings
      # are NEVER silently suppressed — they always appear in the result bundle.
      MNT_UITEST_AUDIT_STRICT: ${{ vars.MNT_UITEST_AUDIT_STRICT || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode
        # Pin to Xcode 16.4: swift-openapi-runtime 1.12 uses Swift tools 6.1,
        # and Xcode 16.0 only ships Swift 6.0 on the macos-15 runner.
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ios
        # project.yml wraps the SwiftPM app sources in an app target + a UITests
        # target. The generated .xcodeproj is a build artifact (not committed).
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift packages
        working-directory: ios
        run: xcodebuild -resolvePackageDependencies -project MaintenanceField.xcodeproj -scheme MaintenanceFieldApp

      - name: Boot Simulator
        run: |
          xcrun simctl list devices available | grep -i "iPhone" || true

      - name: Run XCUITest + accessibility audit
        working-directory: ios
        # Env vars the test RUNNER process must read (ProcessInfo.environment) are
        # passed with the TEST_RUNNER_ prefix; xcodebuild strips the prefix before
        # injecting them into the runner. This is how the no-fakes session source
        # and the keychain group reach the suite without being baked into the app.
        run: |
          set -o pipefail
          # Ad-hoc signing (CODE_SIGN_IDENTITY="-" via App.xcconfig) embeds the
          # shared keychain-access-group entitlement on the Simulator build so the
          # no-fakes seeding works; do NOT force CODE_SIGNING_ALLOWED=NO here or
          # the entitlement is dropped and the session-dependent tests skip.
          DERIVED_DATA_PATH="${RUNNER_TEMP}/maintenance-field-uitests-derived-data"
          rm -rf "$DERIVED_DATA_PATH" TestResults.xcresult

          # Xcode 16.4 on GitHub's macOS runner can begin the test operation
          # before the host app product is fully materialized, which fails as:
          # "The bundle identifier for MaintenanceFieldApp couldn't be read".
          # Split the operation into build-for-testing + test-without-building
          # against the same DerivedData path so the app host and .xctestrun are
          # complete before XCTest starts.
          xcodebuild build-for-testing \
            -project MaintenanceField.xcodeproj \
            -scheme MaintenanceFieldApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            | xcbeautify

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/MaintenanceFieldApp.app"
          test -d "$APP_PATH"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist"

          XCTESTRUN="$(find "$DERIVED_DATA_PATH/Build/Products" -name '*.xctestrun' -print -quit)"
          test -f "$XCTESTRUN"
          python3 ../scripts/patch-ios-xctestrun.py "$XCTESTRUN" \
            --target MaintenanceFieldUITests \
            --ui-target-app-path "__TESTROOT__/Debug-iphonesimulator/MaintenanceFieldApp.app" \
            --env MNT_UITEST_BASE_URL \
            --env MNT_UITEST_REFRESH_TOKEN \
            --env MNT_UITEST_OTP \
            --env MNT_IOS_KEYCHAIN_GROUP \
            --env MNT_UITEST_REQUIRE_REAL \
            --env MNT_UITEST_AUDIT_STRICT
          grep -q "MaintenanceFieldApp.app" "$XCTESTRUN"
          echo "Verified xctestrun points UI tests at MaintenanceFieldApp.app"

          TEST_SELECTION_ARGS=()
          HAS_REAL_SESSION_SOURCE=0
          if [[ -n "${MNT_UITEST_BASE_URL:-}" && ( -n "${MNT_UITEST_REFRESH_TOKEN:-}" || -n "${MNT_UITEST_OTP:-}" ) ]]; then
            HAS_REAL_SESSION_SOURCE=1
          fi

          if [[ "${MNT_UITEST_REQUIRE_REAL:-0}" == "1" && "$HAS_REAL_SESSION_SOURCE" != "1" ]]; then
            echo "::error title=Required iOS UI-test real-session inputs are missing::Protected/push iOS UI-test runs require MNT_UITEST_BASE_URL plus MNT_UITEST_REFRESH_TOKEN or MNT_UITEST_OTP; refusing an all-skip false green."
            if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
              {
                echo "### iOS UI-test real-session gate"
                echo "- Gate: required"
                echo "- Result: failed closed before session-dependent tests could be skipped"
                echo "- Required inputs: MNT_UITEST_BASE_URL plus MNT_UITEST_REFRESH_TOKEN or MNT_UITEST_OTP"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 1
          fi

          if [[ "$HAS_REAL_SESSION_SOURCE" != "1" ]]; then
            echo "::notice title=Optional iOS UI-test real-session gate skipped::No real UI-test session source is configured in this optional context; skipping session-dependent UI tests."
            if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
              {
                echo "### iOS UI-test real-session gate"
                echo "- Gate: optional/skipped"
                echo "- Reason: MNT_UITEST_BASE_URL plus MNT_UITEST_REFRESH_TOKEN or MNT_UITEST_OTP were not available in this non-required context"
                echo "- Required contexts still fail closed before skip selection"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            TEST_SELECTION_ARGS+=(
              "-skip-testing:MaintenanceFieldUITests/AccessibilityAuditUITests"
              "-skip-testing:MaintenanceFieldUITests/CameraCaptureUITests"
              "-skip-testing:MaintenanceFieldUITests/FieldCriticalPathUITests"
              "-skip-testing:MaintenanceFieldUITests/LoginValidationUITests/testInvalidUserIDSurfacesRealValidationCopy"
              "-skip-testing:MaintenanceFieldUITests/MessengerUITests"
            )
          else
            echo "Real UI-test session source configured; running session-dependent UI tests."
          fi

          xcodebuild test-without-building \
            -xctestrun "$XCTESTRUN" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            "${TEST_SELECTION_ARGS[@]}" \
            | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-ui-test-results
          path: ios/TestResults.xcresult
          if-no-files-found: ignore
