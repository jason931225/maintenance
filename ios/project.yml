# XcodeGen project definition for the CI-only XCUITest run.
#
# The day-to-day build is `swift build` / `swift test` against Package.swift.
# XCUITest, however, needs a real .xcodeproj with an app host target and a UI-test
# target — SwiftPM cannot produce one, and `swift package generate-xcodeproj` was
# removed. CI runs `xcodegen generate` to materialize MaintenanceField.xcodeproj
# from this file, then `xcodebuild test`. The generated project is NOT committed
# (it is a build artifact); this declarative file is the source of truth.
#
# The app target reuses the SAME source + resources as the SwiftPM app target, so
# the UI under test is the real app, not a copy.
#
# Identity settings come from Config/App.xcconfig. The hermetic Simulator job uses
# its repository defaults; a separately governed distribution build may override
# MNT_IOS_BUNDLE_ID / MNT_IOS_TEAM_ID only after proving its registered identity.
# See Config/README.md.

name: MaintenanceField
options:
  bundleIdPrefix: com.maintenance.field
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/App.xcconfig
  Release: Config/App.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.1"
    # Identity + signing are sourced from Config/App.xcconfig (xcconfig wins for
    # values it sets). Hermetic CI uses the xcconfig defaults; no workflow secret
    # or repository variable is required for the Simulator wrapper.

packages:
  MaintenanceField:
    path: .

targets:
  MaintenanceFieldApp:
    type: application
    platform: iOS
    # The app's real sources + resources, reused verbatim from the SwiftPM layout.
    sources:
      - path: Sources/MaintenanceFieldApp
        excludes:
          - "Info.plist"
      - path: Sources/MaintenanceFieldApp/Resources
        buildPhase: resources
    dependencies:
      - package: MaintenanceField
        product: MaintenanceFieldCore
    settings:
      base:
        # Use the hand-written Info.plist verbatim (NSCameraUsageDescription and
        # any future keys) rather than generating one, so no key is silently
        # dropped. CFBundleDisplayName is supplied here because the source plist
        # is intentionally minimal.
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/MaintenanceFieldApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "정비 필드"
        CODE_SIGN_ENTITLEMENTS: Config/MaintenanceFieldApp.entitlements
        # PRODUCT_BUNDLE_IDENTIFIER / DEVELOPMENT_TEAM come from App.xcconfig.

  MaintenanceFieldUITestSeeder:
    type: application
    platform: iOS
    # A separately signed helper app. It uses the production Keychain store to
    # establish the process-boundary proof required by the UI-test suite.
    sources:
      - path: Sources/MaintenanceFieldUITestSeeder
    dependencies:
      - package: MaintenanceField
        product: MaintenanceFieldCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "MaintenanceField UITest Seeder"
        CODE_SIGN_ENTITLEMENTS: Config/MaintenanceFieldUITestSeeder.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: "$(MNT_IOS_BUNDLE_ID).UITestSeeder"

  MaintenanceFieldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    # The dependency on the app target wires the UI-test host (XcodeGen sets the
    # target's "Target Application" relationship for a bundle.ui-testing target).
    dependencies:
      - target: MaintenanceFieldApp
      # Build the separate, entitled seeder with every UI-test run. The actual
      # target application remains MaintenanceFieldApp (TEST_TARGET_NAME below).
      - target: MaintenanceFieldUITestSeeder
    settings:
      base:
        # Xcode 16.4's XCTest UI APIs are MainActor-isolated in Swift 6 mode,
        # while XCTest lifecycle hooks remain nonisolated. Keep the CI-only
        # UI-test harness in Swift 5 compatibility mode; the app target and
        # SwiftPM packages stay on Swift 6.1 via the global setting above.
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "MaintenanceFieldUITests"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MNT_IOS_BUNDLE_ID).UITests"
        # Keep this as the Xcode target name (not the .app wrapper name) so
        # XcodeGen emits the UI-test Target Application relationship/TestTargetID.
        # The GitHub runner's Xcode 16.4 xctestrun still records an extensionless
        # UITargetAppPath, so the CI workflow patches the generated xctestrun
        # after build-for-testing and before test-without-building.
        TEST_TARGET_NAME: "MaintenanceFieldApp"
        # The UI-test bundle intentionally carries no shared-Keychain
        # entitlement: only the app and separately signed seeder hold that
        # capability, preserving the real process-boundary proof.

schemes:
  MaintenanceFieldApp:
    build:
      targets:
        MaintenanceFieldApp: all
        MaintenanceFieldUITests: [test]
    test:
      targets:
        - MaintenanceFieldUITests
      gatherCoverageData: false
