pluginManagement {
    def reactNativeGradlePluginDir = new File(settingsDir, "../node_modules/@react-native/gradle-plugin")
    if (!reactNativeGradlePluginDir.exists()) {
        reactNativeGradlePluginDir = new File(settingsDir, "../../node_modules/@react-native/gradle-plugin")
    }
    includeBuild(reactNativeGradlePluginDir.absolutePath)
}
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'CossKoreaLanding'
include ':app'
def reactNativeGradlePluginDir = new File(settingsDir, "../node_modules/@react-native/gradle-plugin")
if (!reactNativeGradlePluginDir.exists()) {
    reactNativeGradlePluginDir = new File(settingsDir, "../../node_modules/@react-native/gradle-plugin")
}
includeBuild(reactNativeGradlePluginDir.absolutePath)
