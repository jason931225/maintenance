[package]
name = "mnt-leave-rest"
version = "0.1.0"
description = "Branch-scoped REST API for the leave-request queue, decide, balances, and §61 statutory push."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-leave-adapter-postgres = { workspace = true }
mnt-leave-application = { workspace = true }
mnt-leave-domain = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
mnt-inbox-adapter-postgres = { workspace = true }
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
