[package]
name = "mnt-registry-rest"
version = "0.1.0"
description = "REST API for equipment registry use cases."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true, features = ["multipart"] }
http = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-db = { workspace = true }
mnt-platform-request-context = { workspace = true }
mnt-registry-adapter-postgres = { workspace = true }
mnt-registry-application = { workspace = true }
mnt-registry-domain = { workspace = true }
serde = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
mnt-platform-db = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = { workspace = true, features = ["util"] }
uuid = { workspace = true }

[lints]
workspace = true
