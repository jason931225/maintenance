[package]
name = "mnt-ontology-rest"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum.workspace = true
mnt-ontology-adapter-postgres = { path = "../adapter-postgres" }
mnt-ontology-application = { path = "../application" }
mnt-ontology-domain = { path = "../domain" }
mnt-governance-adapter-postgres = { path = "../../governance/adapter-postgres" }
mnt-governance-domain = { path = "../../governance/domain" }
mnt-kernel-core.workspace = true
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz.workspace = true
mnt-platform-db.workspace = true
mnt-platform-request-context = { workspace = true }
serde.workspace = true
serde_json.workspace = true
sqlx.workspace = true
time.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
mnt-governance-application = { path = "../../governance/application" }
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tokio.workspace = true
tower = { workspace = true, features = ["util"] }
# Dev-only: the projected-dispatch wiring test installs a registry-backed handler
# to prove a projected_usecase action routes into the OWNING domain use-case
# (registry.update_equipment) with the domain's own RLS + audit. The production
# handlers are wired in the App tier (mnt-app); the ontology REST tier itself must
# NOT depend on a domain ADAPTER (layer boundary), so these are dev-only. The
# layer-boundary gate exempts dev-deps (kind = "dev").
mnt-registry-adapter-postgres = { workspace = true }
mnt-registry-application = { workspace = true }
mnt-registry-domain = { workspace = true }

[lints]
workspace = true
