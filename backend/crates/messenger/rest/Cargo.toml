[package]
name = "mnt-messenger-rest"
version = "0.1.0"
description = "REST API for messenger polling, search, sends, and read receipts."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
http = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-messenger-adapter-postgres = { workspace = true }
mnt-messenger-application = { workspace = true }
mnt-messenger-domain = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-db = { workspace = true }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
mnt-platform-db = { workspace = true }
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
sqlx = { workspace = true }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
