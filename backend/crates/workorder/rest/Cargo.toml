[package]
name = "mnt-workorder-rest"
version = "0.1.0"
description = "REST API for work-order lifecycle use cases."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
http = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-db = { workspace = true }
mnt-platform-jobs = { workspace = true }
mnt-platform-request-context = { workspace = true }
mnt-platform-storage = { workspace = true }
mnt-workflow-domain = { workspace = true }
mnt-workflow-runtime = { workspace = true }
mnt-workflow-runtime-adapter-postgres = { workspace = true }
mnt-workorder-adapter-postgres = { workspace = true }
mnt-workorder-application = { workspace = true }
mnt-workorder-domain = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
sqlx = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
