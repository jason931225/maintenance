[package]
name = "mnt-comms-rest"
version = "0.1.0"
description = "REST API for webmail: GET/PUT /api/v1/mail/account (write-only password), POST /api/v1/mail/account/test, POST /api/v1/mail/send|reply|forward. authz-gated (MailAccountManage/MailUse), audited, 503 when the master key is absent."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
base64 = { workspace = true }
mnt-comms-adapter-imap = { workspace = true }
mnt-comms-adapter-mox = { workspace = true }
mnt-comms-adapter-postgres = { workspace = true }
mnt-comms-adapter-smtp = { workspace = true }
mnt-comms-application = { workspace = true }
mnt-platform-storage = { workspace = true }
mnt-comms-credential-cipher = { workspace = true }
mnt-comms-domain = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-db = { workspace = true }
mnt-platform-request-context = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
