[package]
name = "mnt-inbox-rest"
version = "0.1.0"
description = "Person-scoped REST API for the statutory-notice vault (개인 수신함)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-inbox-adapter-postgres = { workspace = true }
mnt-inbox-application = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
http = { workspace = true }
mnt-inbox-domain = { workspace = true }
mnt-platform-db = { workspace = true }
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }
url = "2.5.8"
uuid = { workspace = true }
webauthn-authenticator-rs = { version = "0.5.5", features = ["softpasskey"] }

[lints]
workspace = true
