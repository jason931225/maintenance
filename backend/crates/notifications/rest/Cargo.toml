[package]
name = "mnt-notifications-rest"
version = "0.1.0"
description = "Person-scoped REST API for the notification center."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-notifications-adapter-postgres = { workspace = true }
mnt-notifications-application = { workspace = true }
mnt-platform-auth = { path = "../../platform/auth" }
mnt-platform-authz = { path = "../../platform/authz" }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
http = { workspace = true }
mnt-notifications-domain = { workspace = true }
mnt-platform-db = { workspace = true }
mnt-platform-test-support = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
serde_json = { workspace = true }
sqlx = { workspace = true }
tower = { workspace = true, features = ["util"] }
uuid = { workspace = true }

[lints]
workspace = true
