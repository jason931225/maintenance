[package]
name = "mnt-platform-audit-chain"
version = "0.1.0"
description = "L20 tamper-evident audit chain: a per-org append-only cryptographically-sealed hash chain over audit_events, a seal worker, and verify_org_chain. Reads audit_events, writes the disjoint audit_chain_seals table as mnt_rt under RLS (charter §2-§5)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
mnt-kernel-core = { workspace = true }
mnt-platform-db = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
time = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# Ed25519 seal signing. `ring` 0.17.x is ALREADY resolved in-tree (transitively
# via lettre/tokio-rustls' rustls `ring` provider — Cargo.lock name = "ring",
# version 0.17.14), so this pins the existing lockfile entry and adds NO new
# third-party to reindeer/buck2-vendor. Keep ring's default features (`alloc` for
# the PKCS#8 Document/Vec APIs, `dev_urandom_fallback` for SystemRandom) — the
# Ed25519 keygen path needs both. Verified against the committed Cargo.lock:
# reusing the in-tree version is the workspace's single-stack discipline.
ring = "0.17"

[dev-dependencies]
mnt-platform-request-context = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
