[package]
name = "mnt-platform-auth-rest"
version = "0.1.0"
description = "REST API for passkey ceremonies and token lifecycle."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[features]
# Local role-switch dev-auth endpoint. NOT in `default` — see the crate-level
# docs on the `dev_auth` module and `mnt-gate-dev-auth-absence`.
dev-auth = []

[dependencies]
axum = { workspace = true }
http = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-platform-auth = { path = "../auth" }
mnt-platform-authz = { path = "../authz" }
mnt-platform-db = { workspace = true }
mnt-platform-email = { workspace = true }
mnt-platform-group = { path = "../group" }
mnt-platform-provisioning = { path = "../provisioning" }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
url = "2.5.8"
uuid = { workspace = true }

[dev-dependencies]
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
