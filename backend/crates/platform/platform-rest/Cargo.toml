[package]
name = "mnt-platform-rest"
version = "0.1.0"
description = "REST API for the SaaS-vendor PLATFORM tier (tenant onboarding, list, suspend)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
axum = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-platform-auth = { path = "../auth" }
mnt-platform-authz = { path = "../authz" }
mnt-platform-db = { workspace = true }
mnt-platform-provisioning = { path = "../provisioning" }
mnt-platform-request-context = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
http = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }
mnt-platform-db = { workspace = true }
mnt-platform-request-context = { workspace = true }
# Dev-only: the onboarding-seed wiring test installs an engine-backed seeder.
# The production impl lives in the App tier (mnt-app); the platform tier itself
# must NOT depend on the ontology ADAPTER (layer boundary), so this is dev-only.
mnt-ontology-adapter-postgres = { workspace = true }
serde_json = { workspace = true }
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }

[lints]
workspace = true
