[package]
name = "mnt-platform-auth"
version = "0.1.0"
description = "Passkey ceremonies, ES256 access JWTs, and rotating refresh-token families."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
mnt-kernel-core = { workspace = true }
mnt-platform-db = { path = "../db" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
time = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
webauthn-rs = { version = "0.5.5", features = [
    "danger-allow-state-serialisation",
    "conditional-ui",
] }
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["rust_crypto", "use_pem"] }
sha2 = "0.11.0"
url = "2.5.8"
# Force the lockfile-pinned OpenSSL source into the auth test closure. The
# `vendored` feature makes openssl-sys build and link its own static OpenSSL
# rather than consulting the host SDK or Homebrew.
openssl = { version = "0.10.80", features = ["vendored"] }

[dev-dependencies]
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tokio = { workspace = true, features = ["sync"] }
webauthn-authenticator-rs = { version = "0.5.5", features = ["softpasskey"] }

[lints]
workspace = true
