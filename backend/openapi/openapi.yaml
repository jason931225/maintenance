openapi: 3.1.0
info:
  title: Maintenance FSM Backend API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      summary: Health check
      responses:
        '200':
          description: Service is alive.
  /readyz:
    get:
      operationId: readyz
      summary: Readiness check
      responses:
        '200':
          description: Service dependencies are ready.
        '503':
          description: A required dependency is unavailable.
  /.well-known/apple-app-site-association:
    get:
      operationId: appleAppSiteAssociation
      summary: Apple App Site Association (native passkeys)
      description: >-
        Public, unauthenticated association document Apple fetches over the RP
        origin to authorize the native iOS app's passkeys. The
        `webcredentials.apps` list is sourced from `MNT_IOS_APP_IDS`; an
        unconfigured deployment serves a valid empty document. Served as
        `application/json` (no file extension, per Apple's requirement).
      responses:
        '200':
          description: The Apple App Site Association document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /.well-known/assetlinks.json:
    get:
      operationId: androidAssetLinks
      summary: Android Digital Asset Links (native passkeys)
      description: >-
        Public, unauthenticated Digital Asset Links document Android fetches to
        authorize the native app's passkeys for the RP domain. The package and
        signing-cert fingerprints come from `MNT_ANDROID_PACKAGE` /
        `MNT_ANDROID_CERT_SHA256`; an unconfigured deployment serves an empty
        JSON array. Served as `application/json`.
      responses:
        '200':
          description: The Android Digital Asset Links statements.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AndroidAssetLinkStatement'
  /api/v1/ws:
    get:
      operationId: connectRealtimeWebSocket
      summary: Connect to the realtime WebSocket stream
      description: 'Upgrades to a WebSocket after bearer-token verification. Server frames are JSON realtime
        events; reconnecting clients pass last_message_id to resume from the last processed message cursor.

        '
      security:
      - bearerAuth: []
      parameters:
      - name: last_message_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      responses:
        '101':
          description: WebSocket upgrade accepted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Realtime is unavailable.
  /api/work-orders:
    post:
      operationId: createWorkOrder
      summary: Create a work order from branch-scoped equipment management number
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderRequest'
      responses:
        '201':
          description: Work order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/work-orders/{workOrderId}:
    get:
      operationId: getWorkOrder
      summary: Fetch one work order
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      responses:
        '200':
          description: Work order summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/work-orders/{workOrderId}/priority:
    patch:
      operationId: updateWorkOrderPriority
      summary: Update work-order priority
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - priority
              properties:
                priority:
                  $ref: '#/components/schemas/PriorityLevel'
      responses:
        '200':
          description: Updated work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
  /api/work-orders/{workOrderId}/assignments:
    put:
      operationId: assignWorkOrder
      summary: Assign mechanics and approval-line approvers
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignWorkOrderRequest'
      responses:
        '200':
          description: Assigned work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
  /api/work-orders/{workOrderId}/start:
    post:
      operationId: startWorkOrder
      summary: Start assigned work
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      responses:
        '200':
          description: In-progress work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
  /api/work-orders/{workOrderId}/report:
    post:
      operationId: submitWorkOrderReport
      summary: Submit a mechanic work report
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReportRequest'
      responses:
        '200':
          description: Report-submitted work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
  /api/work-orders/{workOrderId}/approve:
    post:
      operationId: approveWorkOrder
      summary: Approve the next pending non-mechanic approval step
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      responses:
        '200':
          description: Updated work-order approval state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/work-orders/{workOrderId}/target-change-requests:
    post:
      operationId: requestTargetChange
      summary: Request a target due-date change
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetChangeRequest'
      responses:
        '201':
          description: Target change request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetChangeRequestSummary'
  /api/target-change-requests/{requestId}/review:
    post:
      operationId: reviewTargetChange
      summary: Review a target due-date change request
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewTargetChangeRequest'
      responses:
        '200':
          description: Target change review persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetChangeRequestSummary'
  /api/daily-work-plans:
    get:
      operationId: listDailyWorkPlans
      summary: List branch-scoped daily work plans
      description: Returns branch-scoped daily work plans (the approval queue) ordered newest plan
        date first, with NO status filter so DRAFT/REQUESTED plans surface to approvers. Admins see
        the whole org; other roles see their branch set.
      security:
      - bearerAuth: []
      parameters:
      - name: plan_date
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Date'
        description: Optional single-day filter (YYYY-MM-DD). Absent returns every day.
      responses:
        '200':
          description: Daily work plans for the caller's scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanListPage'
    post:
      operationId: createDailyWorkPlan
      summary: Create a daily work plan
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDailyPlanRequest'
      responses:
        '201':
          description: Daily plan created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanSummary'
  /api/daily-work-plans/{planId}:
    get:
      operationId: getDailyWorkPlan
      summary: Read a daily work plan by id
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Daily plan found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanSummary'
  /api/daily-work-plans/{planId}/request-review:
    post:
      operationId: requestDailyWorkPlanReview
      summary: Send a daily work plan for review
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Daily plan moved to requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanSummary'
  /api/daily-work-plans/{planId}/review:
    post:
      operationId: reviewDailyWorkPlan
      summary: Review a daily work plan
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDailyPlanRequest'
      responses:
        '200':
          description: Daily plan reviewed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanSummary'
  /api/daily-work-plans/{planId}/confirm:
    post:
      operationId: confirmDailyWorkPlan
      summary: Confirm an approved daily work plan
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Daily plan confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanSummary'
  /api/work-orders/{workOrderId}/outsource-works:
    post:
      operationId: createOutsourceWork
      summary: Create an outsource work request for a work order
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOutsourceWorkRequest'
      responses:
        '201':
          description: Outsource work created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutsourceWorkSummary'
  /api/v1/kpi:
    get:
      operationId: getKpiReport
      summary: Fetch branch-scoped KPI rollups for the seven standard metrics
      description: Computes KPI metrics from approved work-order reports within the requested approval
        period. Metrics whose source domains have not merged yet are returned in `unavailable_metrics`
        instead of fabricated values.
      security:
      - bearerAuth: []
      parameters:
      - name: period
        in: query
        required: true
        schema:
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}\.\.[0-9]{4}-[0-9]{2}-[0-9]{2}$
        example: 2026-06-01..2026-07-01
        description: Inclusive start date and exclusive end date in UTC day boundaries.
      - name: scope
        in: query
        required: false
        schema:
          type: string
          default: company
        examples:
          company:
            value: company
          region:
            value: region:00000000-0000-0000-0000-000000000000
          branch:
            value: branch:00000000-0000-0000-0000-000000000000
          technician:
            value: technician:00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: KPI report with company, region, branch, and technician rollups constrained by
            the authenticated principal branch scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiReport'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/ops/summary:
    get:
      operationId: getOpsSummary
      summary: Per-tenant operational dashboard rollup
      description: 'Point-in-time operational rollup for the authenticated tenant: work-order funnel counts
        by stage, aging work orders, P1 SLA risk, mechanic utilization, equipment-status distribution,
        active substitutions, pending approvals, and open support tickets. Authorized for SUPER_ADMIN /
        ADMIN; every read is org-scoped under RLS.'
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operational summary scoped to the authenticated tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/work-orders:
    get:
      operationId: listWorkOrders
      summary: List branch-scoped work orders
      description: Returns branch-scoped work orders sorted by priority and target due date. The server
        accepts repeated `status`, `status[]`, `priority`, and `priority[]` query keys, plus comma-separated
        values.
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderStatus'
      - name: priority
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            $ref: '#/components/schemas/PriorityLevel'
      - name: assigned_to
        in: query
        required: false
        schema:
          type: string
        description: Use `me` for the authenticated user or a user UUID.
      - name: customer_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: site_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: target_due_from
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: target_due_to
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
          maximum: 100
          default: 50
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
          default: 0
      responses:
        '200':
          description: Paginated work-order list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderListPage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/work-orders/{workOrderId}:
    get:
      operationId: getWorkOrderDetail
      summary: Fetch branch-scoped work-order detail
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      responses:
        '200':
          description: Full work-order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/work-orders/{workOrderId}/reject:
    post:
      operationId: rejectWorkOrder
      summary: Reject a submitted work order with an audit memo
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectWorkOrderRequest'
      responses:
        '200':
          description: Rejected work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/inspections/schedules:
    get:
      operationId: listInspectionSchedules
      summary: List branch-scoped regular inspection schedules
      security:
      - bearerAuth: []
      parameters:
      - name: due_start
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Date'
      - name: due_end
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Date'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
          maximum: 500
          default: 200
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
          default: 0
      responses:
        '200':
          description: A page of inspection schedules due in the requested range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionSchedulePage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    post:
      operationId: createInspectionSchedule
      summary: Create a regular inspection schedule
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInspectionScheduleRequest'
      responses:
        '201':
          description: Inspection schedule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionScheduleSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/inspections/schedules/{schedule_id}/rounds:
    post:
      operationId: completeInspectionRound
      summary: Complete a scheduled regular inspection round
      security:
      - bearerAuth: []
      parameters:
      - name: schedule_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteInspectionRoundRequest'
      responses:
        '201':
          description: Inspection round completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionRoundSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/support/tickets:
    get:
      operationId: listSupportTickets
      summary: List branch-scoped support tickets with optional filters
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SupportTicketStatus'
      - name: priority
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SupportTicketPriority'
      - name: category
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SupportTicketCategory'
      - name: origin
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SupportTicketOrigin'
      - name: assignee_user_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: include_untriaged
        in: query
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
          maximum: 100
          default: 50
      - name: cursor
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: >-
            A keyset page of support tickets visible in the principal's branch
            scope, plus the unpaged total for the same filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    post:
      operationId: createInternalSupportTicket
      summary: Open an internal support ticket as authenticated staff
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInternalTicketRequest'
      responses:
        '201':
          description: Support ticket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/support/tickets/{id}:
    get:
      operationId: getSupportTicket
      summary: Get a support ticket with its comments (staff view)
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Support ticket detail including internal notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/support/tickets/{id}/assign:
    post:
      operationId: assignSupportTicket
      summary: Assign or reassign a support ticket (triages untriaged intake)
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTicketRequest'
      responses:
        '200':
          description: Support ticket assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
