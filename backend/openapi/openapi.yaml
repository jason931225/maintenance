    PolicyRoleImpactResponse:
      type: object
      description: 'Per-custom-role impact row for assignment preview. Runtime fields are computed by the same fail-closed
        evaluator used for the top-level preview: only ACTIVE roles whose supported conditions (branch and team) match the
        target user''s live attributes/scope and whose permissions are supported can expose runtime grants.'
      required:
      - role_id
      - role_key
      - display_name
      - status
      - runtime_effective
      - runtime_warnings
      - conditions
      properties:
        role_id:
          $ref: '#/components/schemas/Uuid'
        role_key:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - RETIRED
        runtime_effective:
          type: boolean
          description: True only when this custom role will produce supported runtime feature grants for the target user after
            the assignment is saved.
        runtime_warnings:
          type: array
          description: Deterministic fail-closed reasons explaining why this role is planning/audit-only for the target user.
          items:
            type: string
            enum:
            - custom_role_status_not_active
            - custom_role_condition_unsupported_by_runtime_evaluator
            - custom_role_condition_invalid_branch_value
            - custom_role_condition_outside_target_branch_scope
            - custom_role_condition_outside_target_attributes
            - custom_role_no_runtime_allowed_permissions
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/PolicyConditionResponse'
    PolicyFeatureGrantPreviewResponse:
      type: object
      required:
      - feature_key
      - permission_level
      - source_type
      - source_key
      - source_label
      properties:
        feature_key:
          type: string
        permission_level:
          type: string
          enum:
          - request_only
          - limited
          - allow
        source_type:
          type: string
          enum:
          - system_role
          - custom_role
        source_key:
          type: string
        source_label:
          type: string
    PolicyAssignmentPreviewResponse:
      type: object
      required:
      - user_id
      - preview_receipt_id
      - preview_receipt_expires_at
      - effective
      - system_roles
      - current_system_roles
      - requested_system_roles
      - current_branch_ids
      - requested_branch_ids
      - current_role_ids
      - requested_role_ids
      - delta
      - custom_roles
      - feature_grants
      - warnings
      properties:
        user_id:
          $ref: '#/components/schemas/Uuid'
        preview_receipt_id:
          $ref: '#/components/schemas/Uuid'
        preview_receipt_expires_at:
          $ref: '#/components/schemas/Timestamp'
        effective:
          type: boolean
          description: True when the requested saved assignment set contains at least one ACTIVE custom role that will produce
            runtime-effective feature grants for the target user's live branch scope. DRAFT/RETIRED roles, unsupported conditions,
            invalid branch values, and reserved elevated/scope-widening features remain fail-closed.
        system_roles:
          type: array
          items:
            type: string
        current_system_roles:
          type: array
          description: System-role set currently persisted on the target before this preview.
          items:
            type: string
        requested_system_roles:
          type: array
          description: Replacement system-role set covered by the preview receipt. Defaults to the current system roles when omitted.
          items:
            type: string
        current_branch_ids:
          type: array
          description: Branch membership set currently persisted on the target before this preview.
          items:
            $ref: '#/components/schemas/Uuid'
        requested_branch_ids:
          type: array
          description: Replacement branch membership set covered by the preview receipt. Defaults to the current branch ids when omitted.
          items:
            $ref: '#/components/schemas/Uuid'
        current_role_ids:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        requested_role_ids:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        delta:
          $ref: '#/components/schemas/PolicyRoleAssignmentDeltaResponse'
        custom_roles:
          type: array
          items:
            $ref: '#/components/schemas/PolicyRoleImpactResponse'
        feature_grants:
          type: array
          description: Effective runtime grant preview. Custom-role rows are included only for runtime_effective custom roles;
            DRAFT roles, unsupported conditions, branch/team mismatches, and unsupported permissions are reported through
            custom_roles[].runtime_warnings instead of being shown as grants.
          items:
            $ref: '#/components/schemas/PolicyFeatureGrantPreviewResponse'
        warnings:
          type: array
          description: Preview-level warnings. Includes deterministic custom-role runtime warning codes when any requested
            role is planning/audit-only.
          items:
            type: string
    ReplacePolicyRoleAssignmentsRequest:
      type: object
      description: 'Policy assignment/account-scope preview and custom-role assignment replacement. The preview endpoint
        accepts `role_ids` plus optional `system_roles` and `branch_ids` for account/person mutation previews. The mutating
        custom-role replacement endpoint also requires `preview_acknowledged: true`, the server-issued `preview_receipt_id`
        from a current impact preview for the same actor/user/role set, plus a fresh passkey `step_up` assertion server-side
        so the audit trail binds the sensitive policy write to the human actor. ACTIVE custom-role assignments become runtime-effective
        on the next request when their grants and conditions pass the fail-closed runtime evaluator.'
      properties:
        role_ids:
          type: array
          description: Custom-role replacement set. For account/person role-or-scope previews, omit this field to preserve
            the target's current custom-role assignments; send an explicit empty array to preview removing all custom roles.
          items:
            $ref: '#/components/schemas/Uuid'
        system_roles:
          type: array
          description: Optional replacement system-role set for account/person mutation previews. Ignored by the custom-role assignment save endpoint.
          items:
            type: string
        branch_ids:
          type: array
          description: Optional replacement branch membership set for account/person mutation previews. Ignored by the custom-role assignment save endpoint.
          items:
            $ref: '#/components/schemas/Uuid'
        preview_acknowledged:
          type: boolean
          description: Must be true for the mutating replacement endpoint after the caller reviewed the assignment impact
            preview. The preview endpoint ignores this field. Omitted values are treated as false by the server.
        preview_receipt_id:
          $ref: '#/components/schemas/Uuid'
        step_up:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
