                $ref: '#/components/schemas/ErrorBody'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Client-stable device identifier. The server stores only a SHA-256 hash.
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentIdV2:
      name: equipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PurchaseRequestId:
      name: purchaseRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DispatchId:
      name: dispatchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportDate:
      name: date
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/Date'
      description: Report date in YYYY-MM-DD format.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Principal lacks role or branch authority.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Resource was not found in branch scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Conflict:
      description: State conflict or illegal transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Rate limit exceeded for this client; retry later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
