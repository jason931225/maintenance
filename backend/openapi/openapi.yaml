      - credential
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    RefreshTokenRequest:
      type: object
      description: Refresh/logout request body. `refresh_token` is OPTIONAL because the web
