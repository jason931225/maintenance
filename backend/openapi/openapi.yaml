        '404': { $ref: '#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LifecycleObjectType:
      name: objectType
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_]{1,63}$'
    LifecycleObjectId:
      name: objectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Client-stable device identifier. The server stores only a SHA-256 hash.
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentSubstitutionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SiteId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentIdV2:
      name: equipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PurchaseRequestId:
      name: purchaseRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DispatchId:
      name: dispatchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportDate:
      name: date
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/Date'
      description: Report date in YYYY-MM-DD format.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Principal lacks role or branch authority.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadRequest:
      description: Request syntax or conditional validator is malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Resource was not found in branch scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Conflict:
      description: State conflict or illegal transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    PreconditionFailed:
      description: The submitted ontology key write validator is stale.
      headers:
        ETag:
          description: Current strong tenant/key write validator.
          schema: { type: string }
        Cache-Control:
          schema: { type: string, enum: [no-store] }
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    PreconditionRequired:
      description: A required passkey step-up or other precondition is missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Rate limit exceeded for this client; retry later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadGateway:
      description: An upstream dependency (e.g. the email relay) failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: Required storage or platform dependency is not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    InternalServerError:
      description: Unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    MailUnavailable:
      description: Webmail is not configured on this server (the master key MNT_MAIL_MASTER_KEY is absent), or JWT verification
        is not configured. The app is otherwise healthy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
    BenefitCatalogScope:
      type: object
      additionalProperties: false
      required: [scope_type]
      properties:
        scope_type: { type: string, enum: [ORG, BRANCH, SITE, TEAM, ROLE, EMPLOYEE_SEGMENT] }
        scope_ref: { $ref: '#/components/schemas/Uuid', nullable: true }
        branch_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        site_id: { $ref: '#/components/schemas/Uuid', nullable: true }
    BenefitCatalogTier:
      type: object
      additionalProperties: false
      required: [tier_basis, tier_key, value_label, criteria, display_order]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        benefit_id: { $ref: '#/components/schemas/Uuid' }
        tier_basis: { type: string }
        tier_key: { type: string }
        value_label: { type: string }
        amount_won: { type: integer, format: int64, nullable: true }
        limit_period: { type: string, nullable: true }
        criteria: { type: object, additionalProperties: true }
        display_order: { type: integer }
    BenefitCatalogCondition:
      type: object
      additionalProperties: false
      required: [condition_kind, operator, condition_key, condition_value, display_label, display_order]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        benefit_id: { $ref: '#/components/schemas/Uuid' }
        condition_kind: { type: string }
        operator: { type: string }
        condition_key: { type: string }
        condition_value: { type: object, additionalProperties: true }
        display_label: { type: string }
        cedar_policy_ref: { type: string, nullable: true }
        display_order: { type: integer }
    BenefitCatalogCreateRequest:
      type: object
      description: Tenant and actor are derived from the verified bearer token; neither can be supplied by callers.
      additionalProperties: false
      required: [scope, category, name, coverageLabel, costLabel]
      properties:
        scope: { $ref: '#/components/schemas/BenefitCatalogScope' }
        category: { type: string, enum: [legal, extra] }
        name: { type: string, minLength: 1 }
        coverageLabel: { type: string, minLength: 1 }
        coveredCount: { type: integer, nullable: true }
        costLabel: { type: string, minLength: 1 }
        estimatedAnnualCostWon: { type: integer, format: int64, nullable: true }
        employerRateBps: { type: integer, nullable: true }
        note: { type: string, nullable: true }
        legalBasis: { type: string, nullable: true }
        relatedDomain: { type: string, nullable: true }
        relatedObjectId: { $ref: '#/components/schemas/Uuid', nullable: true }
        effectiveOn: { type: string, format: date, nullable: true }
        retiresOn: { type: string, format: date, nullable: true }
        displayOrder: { type: integer, default: 0 }
        metadata: { type: object, additionalProperties: true }
        tiers: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogTier' } }
        conditions: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogCondition' } }
    BenefitCatalogUpdateRequest:
      type: object
      description: Mutable catalog fields only; tenant, actor, identifiers, and lifecycle state are server-owned.
      additionalProperties: false
      properties:
        category: { type: string, enum: [legal, extra] }
        name: { type: string, minLength: 1 }
        scope: { $ref: '#/components/schemas/BenefitCatalogScope' }
        coverageLabel: { type: string }
        coveredCount: { type: integer, nullable: true }
        costLabel: { type: string }
        estimatedAnnualCostWon: { type: integer, format: int64, nullable: true }
        employerRateBps: { type: integer, nullable: true }
        note: { type: string, nullable: true }
        legalBasis: { type: string, nullable: true }
        relatedDomain: { type: string, nullable: true }
        relatedObjectId: { $ref: '#/components/schemas/Uuid', nullable: true }
        effectiveOn: { type: string, format: date, nullable: true }
        retiresOn: { type: string, format: date, nullable: true }
        displayOrder: { type: integer }
        metadata: { type: object, additionalProperties: true }
    BenefitCatalogReplaceTiersRequest:
      type: object
      additionalProperties: false
      required: [tiers]
      properties:
        tiers: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogTier' } }
    BenefitCatalogReplaceConditionsRequest:
      type: object
      additionalProperties: false
      required: [conditions]
      properties:
        conditions: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogCondition' } }
    BenefitCatalogLifecycleBinding:
      type: object
      additionalProperties: false
      required: [object_type, object_id]
      properties:
        object_type: { type: string, enum: [benefit_catalog_item] }
        object_id: { $ref: '#/components/schemas/Uuid' }
        current_state: { type: string, nullable: true }
        legal_hold: { type: boolean, nullable: true }
        retention_until: { type: string, format: date-time, nullable: true }
    BenefitCatalogItemPage:
      type: object
      required: [items, limit, offset, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogItem' } }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
    BenefitCatalogItem:
      type: object
      required: [id, benefit_code, category, name, scope, coverage_label, cost_label, tiers, conditions, lifecycle]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        benefit_code: { type: string }
        category: { type: string, enum: [legal, extra] }
        name: { type: string }
        scope: { $ref: '#/components/schemas/BenefitCatalogScope' }
        coverage_label: { type: string }
        covered_count: { type: integer, nullable: true }
        cost_label: { type: string }
        estimated_annual_cost_won: { type: integer, format: int64, nullable: true }
        employer_rate_bps: { type: integer, nullable: true }
        note: { type: string, nullable: true }
        legal_basis: { type: string, nullable: true }
        related_domain: { type: string, nullable: true }
        related_object_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        effective_on: { type: string, format: date, nullable: true }
        retires_on: { type: string, format: date, nullable: true }
        tiers: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogTier' } }
        conditions: { type: array, items: { $ref: '#/components/schemas/BenefitCatalogCondition' } }
        lifecycle: { $ref: '#/components/schemas/BenefitCatalogLifecycleBinding' }
    ConsultingEngagement:
      type: object
      required: [id, customer_id, title, status, version, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        customer_id: { $ref: '#/components/schemas/Uuid' }
        customer_document_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        ontology_instance_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        title: { type: string }
        status: { type: string, enum: [DRAFT, PROPOSED, APPROVED, IMPLEMENTED, MEASURED, SUSTAINED, CORRECTIVE] }
        approval_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        workflow_execution_id: { $ref: '#/components/schemas/Uuid', nullable: true }
        version: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ConsultingEngagementPage:
      type: object
      required: [items, limit, offset, total]
