      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Fixity report (outcome + per-copy verdict)., content: { application/json: { schema: { $ref: '#/components/schemas/EvidenceVerifyReport' } } } }
