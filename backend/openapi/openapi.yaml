      description: >-
        The caller's authorization projection: org, branch scope,
        roles-as-principal-attributes, and the legacy-matrix capability grants
        the console needs for deny-by-omission rendering. NON-AUTHORITATIVE
        (`authority = "advisory_ui_only"`) — the server remains the sole
        enforcer; this is a rendering hint that lets the frontend gate on grants
        instead of hardcoded role lists. `source = "legacy_matrix"` today; the
        Cedar enforce-flip later flips `source` to `"cedar"` with this shape
        unchanged. Capabilities are deny-by-omission: a feature the caller cannot
        use is omitted (never emitted at `deny`).
      security:
