    PasskeyRegisterStartRequest:
      type: object
      description: Optional overrides for the authenticated session user's passkey registration (username/display_name default
        to the user's stored profile when omitted), plus the step-up assertion required to ADD a passkey when the user already
        has one. A user with zero passkeys (initial enrollment) omits `step_up`; an already-enrolled user MUST supply a fresh
        `step_up` assertion of an existing passkey (user verification required), or register/start returns 401 — so a stolen
        session cannot silently add a credential.
      properties:
        username:
          type: string
        display_name:
          type: string
        step_up:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
    PasskeyStepUpAssertion:
      type: object
      description: A fresh assertion of an EXISTING passkey, proving the caller currently possesses an authenticator (not
        just a bearer token). The `ceremony_id` comes from a preceding `POST /api/v1/auth/passkey/login/start`; the `credential`
        is the resulting WebAuthn assertion. Verified with user verification (UV) required and rejected unless the asserted
        credential belongs to the authenticated caller.
      required:
      - ceremony_id
      - credential
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    MobileStepUpActionKind:
      type: string
      enum:
      - APPROVAL_DECISION
      - POLL_VOTE
    MobilePasskeyStepUpBinding:
      type: object
      required:
      - action_kind
      - object_id
      - reason_key
      - replay_attempt
      properties:
        action_kind:
          $ref: '#/components/schemas/MobileStepUpActionKind'
        object_id:
          $ref: '#/components/schemas/Uuid'
        reason_key:
          type: string
          enum:
          - operations_passkey_approval_decision
          - operations_passkey_poll_vote
        replay_attempt:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 1
          description: Null for an immediate online action; 1-based for queued replay attempts.
    MobilePasskeyStepUpStartRequest:
      type: object
      required:
      - binding
      properties:
        binding:
          $ref: '#/components/schemas/MobilePasskeyStepUpBinding'
    MobilePasskeyStepUpStartResponse:
      type: object
      required:
      - ceremony_id
      - challenge
      - expires_at
      - binding
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        challenge:
          type: object
          additionalProperties: true
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        binding:
          $ref: '#/components/schemas/MobilePasskeyStepUpBinding'
    MobilePasskeyStepUpEnvelope:
      type: object
      required:
      - binding
      - assertion
      properties:
        binding:
          $ref: '#/components/schemas/MobilePasskeyStepUpBinding'
        assertion:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
    AppleAppSiteAssociation:
      type: object
      description: Apple App Site Association document authorizing the native iOS app's passkeys for the RP domain.
      required:
