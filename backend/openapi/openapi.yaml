      summary: Start a workflow run (idempotent)
      description: Starts an ACTIVE definition and advances synchronously until the first WAITING task or terminal node.
        idempotency_key maps to workflow_runs.idempotency_key — a replay returns the existing run, and the same key with a
        different definition/object is a 409. Entry-node policy (when declared) is legacy-enforced with an inert Cedar shadow.
