          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/MailUnavailable'
    put:
      operationId: configureMailAccount
      summary: Configure (create or replace) the tenant's webmail account
      description: >-
        Upserts the mailbox config. Passwords are write-only: a present password
        is sealed (envelope AEAD) and only the ciphertext is stored; an
        absent/null password leaves the stored secret unchanged. A first-time
        configure requires both the SMTP and IMAP password. Audited. Requires
        the MailAccountManage feature.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigureMailAccountRequest'
      responses:
        '200':
          description: The configured mailbox (write-only view).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailAccountView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/account/test:
    post:
      operationId: testMailAccountConnection
      summary: Test the SMTP connection with the stored credentials
      description: >-
        Authenticates to the tenant's configured SMTP server using the stored
        credentials and reports a structured result. Never leaks the secret; the
        error_code is a stable, non-secret token. Requires the MailAccountManage
        feature.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The structured test-connection result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTestConnectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/send:
    post:
      operationId: sendMail
      summary: Compose and send a new message
      description: >-
        Sends a new outbound message through the tenant's SMTP server and
        persists it as a direction=OUT message. The From is constrained to the
        configured account address. Audited (email.send). Requires the MailUse
        feature.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailRequest'
      responses:
        '201':
          description: The message was sent and persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMailResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/reply:
    post:
      operationId: replyMail
      summary: Reply to a message (sets In-Reply-To / References)
      description: >-
        Sends a reply through the tenant's SMTP server, stamping the In-Reply-To
        and References threading headers, and persists it as direction=OUT.
        Audited (email.reply). Requires the MailUse feature.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailRequest'
      responses:
        '201':
          description: The reply was sent and persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMailResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/forward:
    post:
      operationId: forwardMail
      summary: Forward a message (sets In-Reply-To / References)
      description: >-
        Forwards a message through the tenant's SMTP server, stamping the
        In-Reply-To and References threading headers, and persists it as
        direction=OUT. Audited (email.forward). Requires the MailUse feature.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailRequest'
      responses:
        '201':
          description: The forward was sent and persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMailResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/folders:
    get:
      operationId: listMailFolders
      summary: List the tenant mailbox folders
      description: >-
        Lists the configured mailbox's folders (Inbox/Sent/…) with per-folder
        unread + total counts. RLS-armed to the caller's org. Requires the
        MailUse feature.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The folders for the tenant's mailbox (empty if unconfigured).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MailFolderView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/threads:
    get:
      operationId: listMailThreads
      summary: List mail threads (paginated, unread filter, search)
      description: >-
        Lists the mailbox's threads newest-first. Optional filters: unread-only,
        a full-text search term q, a folder id, and a keyset cursor (before, a
        unix-second last_message_at). RLS-armed to the caller's org. Requires the
        MailUse feature.
      security:
      - bearerAuth: []
      parameters:
      - name: unread
        in: query
        required: false
        schema:
          type: boolean
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: folder
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: before
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: A page of threads (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MailThreadView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/threads/{id}:
    get:
      operationId: getMailThread
      summary: Get one thread with its messages
      description: >-
        Returns the thread and its messages (oldest first). body_html is returned
        verbatim and MUST be sanitized by the client before render. RLS-armed to
        the caller's org. Requires the MailUse feature.
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: The thread and its ordered messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailThreadDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/messages/{id}:
    get:
      operationId: getMailMessage
      summary: Get one message with its attachments
      description: >-
        Returns one message (with attachment metadata; bytes are fetched via the
        attachment download endpoint). body_html is verbatim and MUST be
        sanitized by the client. RLS-armed to the caller's org. Requires the
        MailUse feature.
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: The message and its attachments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailMessageView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/MailUnavailable'
  /api/v1/mail/attachments/{id}/download:
    get:
      operationId: downloadMailAttachment
      summary: Get a presigned download URL for an attachment
      description: >-
        Resolves the attachment under the caller's org (cross-tenant invisible)
        and returns a short-lived presigned GET URL — the raw object key is never
        exposed. RLS-armed to the caller's org. Requires the MailUse feature.
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: A short-lived presigned download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailAttachmentDownload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/MailUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Client-stable device identifier. The server stores only a SHA-256 hash.
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentSubstitutionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SiteId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentIdV2:
      name: equipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PurchaseRequestId:
      name: purchaseRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DispatchId:
      name: dispatchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportDate:
      name: date
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/Date'
      description: Report date in YYYY-MM-DD format.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Principal lacks role or branch authority.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Resource was not found in branch scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Conflict:
      description: State conflict or illegal transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Rate limit exceeded for this client; retry later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadGateway:
      description: An upstream dependency (e.g. the email relay) failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    MailUnavailable:
      description: >-
        Webmail is not configured on this server (the master key
        MNT_MAIL_MASTER_KEY is absent), or JWT verification is not configured.
        The app is otherwise healthy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
    Uuid:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    Date:
      type: string
      format: date
    PriorityLevel:
      type: string
      enum:
      - P1
      - P2
      - P3
      - OUTSOURCE
      - UNSET
    WorkOrderStatus:
      type: string
      enum:
      - RECEIVED
      - UNASSIGNED
      - ASSIGNED
      - IN_PROGRESS
      - REPORT_SUBMITTED
      - ADMIN_REVIEW
      - FINAL_COMPLETED
      - REJECTED
      - ON_HOLD
      - DELAYED
      - TEMPORARY_ACTION
      - PART_WAITING
      - EQUIPMENT_IN_USE
      - REVISIT_REQUIRED
      - ARCHIVED
      - CANCELLED
    WorkResultType:
      type: string
      enum:
      - COMPLETED
      - TEMPORARY_ACTION
      - INCOMPLETE
      - REVISIT_REQUIRED
      - UNKNOWN
    AssignmentRole:
      type: string
      enum:
      - PRIMARY
      - SECONDARY
    AttachmentStage:
      type: string
      enum:
      - REQUEST
      - BEFORE
      - DURING
      - AFTER
      - REPORT
      - OUTSOURCE_RESULT
    SyncOperationKind:
      type: string
      enum:
      - WORK_ORDER_START
      - WORK_ORDER_REPORT
    SyncOperationStatus:
      type: string
      enum:
      - APPLIED
      - FAILED
    DevicePlatform:
      type: string
      enum:
      - ios
      - android
    WormReplicaStatus:
      type: string
      enum:
      - PENDING
      - VERIFIED
      - FAILED
    DailyPlanStatus:
      type: string
      enum:
      - DRAFT
      - REQUESTED
      - APPROVED
      - REJECTED
      - FINAL_CONFIRMED
    InspectionCycle:
      type: string
      enum:
      - DAILY
      - WEEKLY
      - MONTHLY
      - QUARTERLY
      - YEARLY
      - CUSTOM
    InspectionScheduleStatus:
      type: string
      enum:
      - SCHEDULED
      - COMPLETED
      - CANCELLED
    InspectionRoundOutcome:
      type: string
      enum:
      - COMPLETED
      - FOLLOW_UP_REQUIRED
    TargetChangeDecision:
      type: string
      enum:
      - APPROVED
      - REJECTED
    KpiMetric:
      type: string
      enum:
      - completed_count
      - average_response_speed
      - completion_duration_and_due_compliance
      - revisit_rate
      - delay_rate_and_reason_distribution
      - inspection_plan_completion_rate
      - p1_acceptance_rate
    Period:
      type: object
      required:
      - start
      - end
      properties:
        start:
          $ref: '#/components/schemas/Timestamp'
        end:
          $ref: '#/components/schemas/Timestamp'
    KpiScope:
      type: object
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - company
          - region
          - branch
          - technician
        id:
          $ref: '#/components/schemas/Uuid'
      description: '`id` is present for region, branch, and technician scopes and absent for company.'
    KpiRollupScope:
      type: object
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - company
          - region
          - branch
          - technician
        id:
          $ref: '#/components/schemas/Uuid'
      description: '`id` is present for region, branch, and technician rollups and absent for company.'
    KpiReport:
      type: object
      required:
      - period
      - requested_scope
      - rollups
      - unavailable_metrics
      properties:
        period:
          $ref: '#/components/schemas/Period'
        requested_scope:
          $ref: '#/components/schemas/KpiScope'
        rollups:
          type: array
          items:
            $ref: '#/components/schemas/KpiRollup'
        unavailable_metrics:
          type: array
          items:
            $ref: '#/components/schemas/UnavailableMetric'
    KpiRollup:
      type: object
      required:
      - scope
      - approved_report_count
      - completed_count
      - weighted_completed_points
      - average_response_seconds
      - average_completion_seconds
      - target_due_compliance_bps
      - revisit_rate_bps
      - delay_rate_bps
      - delay_reason_distribution
      - inspection_schedule_due_count
      - inspection_schedule_completed_count
      - inspection_plan_completion_bps
      - p1_dispatch_count
      - p1_accepted_count
      - p1_acceptance_bps
      properties:
        scope:
          $ref: '#/components/schemas/KpiRollupScope'
        scope_display_name:
          type:
          - string
          - 'null'
          description: >-
            Human-readable name for the scope (region/branch/mechanic), resolved
            via a same-org lookup. Null for the company-wide scope or a deleted
            region/branch/user. Optional; absent on the pure-domain shape.
        approved_report_count:
          type: integer
          format: int32
          minimum: 0
        completed_count:
          type: integer
          format: int32
          minimum: 0
        weighted_completed_points:
          type: integer
          format: int32
          minimum: 0
        average_response_seconds:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        average_completion_seconds:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        target_due_compliance_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
        revisit_rate_bps:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
        delay_rate_bps:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
        delay_reason_distribution:
          type: object
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
        inspection_schedule_due_count:
          type: integer
          format: int32
          minimum: 0
        inspection_schedule_completed_count:
          type: integer
          format: int32
          minimum: 0
        inspection_plan_completion_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
        p1_dispatch_count:
          type: integer
          format: int32
          minimum: 0
        p1_accepted_count:
          type: integer
          format: int32
          minimum: 0
        p1_acceptance_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
    OpsFunnel:
      type: object
      required:
      - received
      - assigned
      - in_progress
      - completed
      properties:
        received:
          type: integer
          format: int32
          minimum: 0
        assigned:
          type: integer
          format: int32
          minimum: 0
        in_progress:
          type: integer
          format: int32
          minimum: 0
        completed:
          type: integer
          format: int32
          minimum: 0
    OpsEquipmentStatus:
      type: object
      required:
      - rented
      - spare
      - scrapped
      - replacement
      - sold
      properties:
        rented:
          type: integer
          format: int32
          minimum: 0
        spare:
          type: integer
          format: int32
          minimum: 0
        scrapped:
          type: integer
          format: int32
          minimum: 0
        replacement:
          type: integer
          format: int32
          minimum: 0
        sold:
          type: integer
          format: int32
          minimum: 0
    OpsMechanicLoad:
      type: object
      required:
      - mechanic_id
      - display_name
      - active_assignments
      properties:
        mechanic_id:
          type: string
          format: uuid
        display_name:
          type: string
        active_assignments:
          type: integer
          format: int32
          minimum: 0
    OpsSummary:
      type: object
      required:
      - funnel
      - aging_hours
      - aging_work_orders
      - sla_breached
      - sla_at_risk
      - mechanic_load
      - equipment_status
      - active_substitutions
      - pending_approvals
      - open_support_tickets
      properties:
        funnel:
          $ref: '#/components/schemas/OpsFunnel'
        aging_hours:
          type: integer
          format: int32
          minimum: 0
        aging_work_orders:
          type: integer
          format: int32
          minimum: 0
        sla_breached:
          type: integer
          format: int32
          minimum: 0
        sla_at_risk:
          type: integer
          format: int32
          minimum: 0
        mechanic_load:
          type: array
          items:
            $ref: '#/components/schemas/OpsMechanicLoad'
        equipment_status:
          $ref: '#/components/schemas/OpsEquipmentStatus'
        active_substitutions:
          type: integer
          format: int32
          minimum: 0
        pending_approvals:
          type: integer
          format: int32
          minimum: 0
        open_support_tickets:
          type: integer
          format: int32
          minimum: 0
    UnavailableMetric:
      type: object
      required:
      - metric
      - source_domain
      - reason
      properties:
        metric:
          $ref: '#/components/schemas/KpiMetric'
        source_domain:
          type: string
        reason:
          type: string
    CreateWorkOrderRequest:
      type: object
      required:
      - branch_id
      - management_no
      - symptom
      properties:
        branch_id:
          $ref: '#/components/schemas/Uuid'
        management_no:
          type: string
        symptom:
          type: string
        customer_request:
          type: string
        target_due_at:
          $ref: '#/components/schemas/Timestamp'
    AssignWorkOrderRequest:
      type: object
      required:
      - assignments
      properties:
        assignments:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - mechanic_id
            - role
            properties:
              mechanic_id:
                $ref: '#/components/schemas/Uuid'
              role:
                $ref: '#/components/schemas/AssignmentRole'
        admin_approver_id:
          $ref: '#/components/schemas/Uuid'
        executive_approver_id:
          $ref: '#/components/schemas/Uuid'
    SubmitReportRequest:
      type: object
      required:
      - result_type
      - diagnosis
      - action_taken
      properties:
        result_type:
          $ref: '#/components/schemas/WorkResultType'
        diagnosis:
          type: string
        action_taken:
          type: string
    TargetChangeRequest:
      type: object
      required:
      - requested_target_due_at
      - reason
      properties:
        requested_target_due_at:
          $ref: '#/components/schemas/Timestamp'
        reason:
          type: string
    ReviewTargetChangeRequest:
      type: object
      required:
      - decision
      properties:
        decision:
          $ref: '#/components/schemas/TargetChangeDecision'
        memo:
          type: string
    CreateDailyPlanRequest:
      type: object
      required:
      - branch_id
      - mechanic_id
      - plan_date
      - items
      properties:
        branch_id:
          $ref: '#/components/schemas/Uuid'
        mechanic_id:
