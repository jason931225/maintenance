          $ref: '#/components/schemas/Uuid'
        detector_id:
          type: string
          description: >-
            Dot-namespaced detector identity, e.g. `anomaly.self_approval` or
            `anomaly.price_outlier`.
        entity_type:
          type: string
          description: The domain entity the finding concerns, e.g. `financial_purchase_request`.
        entity_id:
          type: string
          description: Identifier of the entity the finding concerns.
        source_audit_event_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Audit event that triggered the finding (OnWrite detectors); may be null.
        subject_user_id:
          type:
          - string
          - 'null'
          format: uuid
          description: >-
            The user whose action was flagged (e.g. the self-approver). Null for
            non-person findings. A raw id; resolve to a display name in the UI.
        score:
          type: number
          format: double
          minimum: 0
          description: Non-negative detector score; the severity enum is the primary triage signal.
        severity:
          $ref: '#/components/schemas/FindingSeverity'
        evidence:
          type: object
          additionalProperties: true
          description: >-
            Detector-specific evidence bag. For `anomaly.self_approval` this
            includes action, requested_by, submitted_by, approver, and
            exemption_reason (org_lead_exempt or super_admin_exempt).
        status:
          $ref: '#/components/schemas/FindingStatus'
        detected_at:
          $ref: '#/components/schemas/Timestamp'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        reviewed_by:
          type:
          - string
          - 'null'
          format: uuid
          description: The reviewer who triaged the finding; null until triaged.
        reviewed_at:
          oneOf:
          - $ref: '#/components/schemas/Timestamp'
          - type: 'null'
        review_memo:
          type:
          - string
          - 'null'
          description: Reviewer memo recorded at triage; required when dismissing or escalating.
    TriageFindingRequest:
      type: object
      description: >-
        Triage an OPEN finding. A memo is required when status is DISMISSED or
        ESCALATED, optional for REVIEWED. Max 2000 characters.
      required:
      - status
      properties:
        status:
          type: string
          description: Target triage status. OPEN is not a valid target.
          enum:
          - REVIEWED
          - DISMISSED
          - ESCALATED
        memo:
          type:
          - string
          - 'null'
          maxLength: 2000
          description: Reviewer memo. Required when dismissing or escalating.
    MailSecurity:
      type: string
      description: >-
        Transport security. SSL_TLS is implicit TLS (port 993/465); START_TLS
        upgrades a plaintext connection (port 143/587). There is no plaintext
        option.
      enum:
      - SSL_TLS
      - START_TLS
    MailAddress:
      type: object
      required:
      - address
      properties:
        address:
          type: string
          description: The bare mailbox, e.g. user@example.com.
        name:
          type:
          - string
          - 'null'
          description: Optional display name.
    MailAttachment:
      type: object
      required:
      - filename
      - content_type
      - content_base64
      properties:
        filename:
          type: string
        content_type:
          type: string
        content_base64:
          type: string
          description: Standard-base64 encoded attachment bytes.
    MailAccountView:
      type: object
      description: >-
        The write-only view of a configured mailbox. It NEVER contains a
        password; has_smtp_password / has_imap_password signal whether a
        credential is on file.
      required:
      - id
      - display_name
      - email_address
      - imap_host
      - imap_port
      - imap_security
      - imap_username
      - smtp_host
      - smtp_port
      - smtp_security
      - smtp_username
      - has_smtp_password
      - has_imap_password
      - status
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        display_name:
          type: string
        email_address:
          type: string
        from_name:
          type:
          - string
          - 'null'
        imap_host:
          type: string
        imap_port:
          type: integer
          format: int32
        imap_security:
          $ref: '#/components/schemas/MailSecurity'
        imap_username:
          type: string
        smtp_host:
          type: string
        smtp_port:
          type: integer
          format: int32
        smtp_security:
          $ref: '#/components/schemas/MailSecurity'
        smtp_username:
          type: string
        has_smtp_password:
          type: boolean
        has_imap_password:
          type: boolean
        status:
          type: string
    ConfigureMailAccountRequest:
      type: object
      description: >-
        Configure (create or replace) the mailbox. A password field that is
        absent or null leaves the stored secret unchanged; a present value is
        re-sealed. A first-time configure requires both passwords.
      required:
      - display_name
      - email_address
      - imap_host
      - imap_port
      - imap_security
      - imap_username
      - smtp_host
      - smtp_port
      - smtp_security
      - smtp_username
      properties:
        display_name:
          type: string
        email_address:
          type: string
        from_name:
          type:
          - string
          - 'null'
        imap_host:
          type: string
        imap_port:
          type: integer
          format: int32
        imap_security:
          $ref: '#/components/schemas/MailSecurity'
        imap_username:
          type: string
        imap_password:
          type:
          - string
          - 'null'
          description: Write-only. Present = (re)seal; absent/null = keep the stored secret.
        smtp_host:
          type: string
        smtp_port:
          type: integer
          format: int32
        smtp_security:
          $ref: '#/components/schemas/MailSecurity'
        smtp_username:
          type: string
        smtp_password:
          type:
          - string
          - 'null'
          description: Write-only. Present = (re)seal; absent/null = keep the stored secret.
    MailTestConnectionResult:
      type: object
      required:
      - ok
      properties:
        ok:
          type: boolean
        error_code:
          type:
          - string
          - 'null'
          description: A stable, non-secret token when the connection failed.
    SendMailRequest:
      type: object
      description: >-
        Compose a message. For reply/forward, in_reply_to is required and
        references carries the accumulated chain. The From is constrained to the
        configured account address (it cannot be set here).
      required:
      - to
      - subject
      - body_text
      properties:
        to:
          type: array
          items:
            $ref: '#/components/schemas/MailAddress'
        cc:
          type: array
          items:
            $ref: '#/components/schemas/MailAddress'
        bcc:
          type: array
          items:
            $ref: '#/components/schemas/MailAddress'
        subject:
          type: string
        body_text:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/MailAttachment'
        in_reply_to:
          type:
          - string
          - 'null'
          description: Required for reply/forward — the Message-ID being responded to.
        references:
          type: array
          items:
            type: string
    SendMailResult:
      type: object
      required:
      - message_id
      - rfc_message_id
      properties:
        message_id:
          $ref: '#/components/schemas/Uuid'
        rfc_message_id:
          type: string
          description: The RFC 5322 Message-ID stamped on the sent message.
    MailFolderView:
      type: object
      required:
      - id
      - role
      - name
      - unread_count
      - total_count
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        role:
          type: string
          description: INBOX | SENT | DRAFTS | ARCHIVE | TRASH | JUNK | CUSTOM.
        name:
          type: string
        unread_count:
          type: integer
          format: int64
        total_count:
          type: integer
          format: int64
    MailThreadView:
      type: object
      required:
      - id
      - subject
      - last_message_at
      - message_count
      - unread_count
      - has_attachments
      - is_flagged
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        subject:
          type: string
        last_message_at:
          type: string
          format: date-time
        message_count:
          type: integer
          format: int64
        unread_count:
          type: integer
          format: int64
        has_attachments:
          type: boolean
        is_flagged:
          type: boolean
    MailThreadDetail:
      type: object
      required:
      - id
      - subject
      - messages
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        subject:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MailMessageView'
    MailMessageView:
      type: object
      required:
      - id
      - thread_id
      - direction
      - from_address
      - to
      - cc
      - subject
      - snippet
      - seen
      - flagged
      - answered
      - has_attachments
      - received_at
      - attachments
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        thread_id:
          $ref: '#/components/schemas/Uuid'
        direction:
          type: string
          description: IN (mirrored from IMAP) or OUT (sent by the tenant).
        message_id:
          type:
          - string
          - 'null'
        in_reply_to:
          type:
          - string
          - 'null'
        from_address:
          type: string
        from_name:
          type:
          - string
          - 'null'
        to:
          type: array
          items:
            $ref: '#/components/schemas/MailAddress'
        cc:
          type: array
          items:
            $ref: '#/components/schemas/MailAddress'
        subject:
          type: string
        snippet:
          type: string
        body_text:
          type:
          - string
          - 'null'
        body_html:
          type:
          - string
          - 'null'
          description: >-
            The stored HTML body, returned verbatim. The client MUST sanitize it
            (DOMPurify-class) before rendering.
        seen:
          type: boolean
        flagged:
          type: boolean
        answered:
          type: boolean
        has_attachments:
          type: boolean
        received_at:
          type: string
          format: date-time
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/MailAttachmentView'
    MailAttachmentView:
      type: object
      required:
      - id
      - filename
      - content_type
      - size_bytes
      - is_inline
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        is_inline:
          type: boolean
    MailAttachmentDownload:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          description: A short-lived presigned GET URL for the attachment bytes.
