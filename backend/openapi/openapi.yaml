        required: false
        schema:
          type: string
        description: Filter by model name (case-insensitive exact match).
      - name: maker
        in: query
        required: false
        schema:
          type: string
        description: Filter by maker name (case-insensitive exact match).
      - name: sort
        in: query
        required: false
