      properties:
        email:
          type: string
          format: email
          description: The email address to register and deliver the one-time code to.
    SignupResponse:
      type: object
      required:
      - accepted
      properties:
        accepted:
          type: boolean
          description: Always true. The signup was accepted and a one-time code was sent;
            the response intentionally carries no account-existence or token information.
    OtpRedeemRequest:
      type: object
      required:
      - otp
      properties:
        otp:
          type: string
          description: The one-time sign-in code (8 characters for admin-issued codes).
    OtpRedeemResponse:
      type: object
      required:
      - access_token
      - token_type
      - refresh_expires_at
      - requires_passkey_setup
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          nullable: true
          description: The opaque rotating refresh token in the body transport (mobile). It is
            null in the cookie transport (web), where the token is set as an HttpOnly
            `mnt_refresh` cookie and must never reach web JS.
        token_type:
          type: string
        refresh_expires_at:
          $ref: '#/components/schemas/Timestamp'
        requires_passkey_setup:
          type: boolean
          description: True when the signed-in user has no passkey yet and should enroll one
            in initial settings.
    AdminIssueOtpRequest:
      type: object
      required:
      - user_id
      - branch_id
      properties:
        user_id:
          $ref: '#/components/schemas/Uuid'
        branch_id:
          $ref: '#/components/schemas/Uuid'
        ttl_seconds:
          type: integer
          format: int64
          description: Optional code lifetime in seconds; defaults to 86400 (24 hours).
    AdminIssueOtpResponse:
      type: object
      required:
      - user_id
