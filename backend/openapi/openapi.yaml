    PasskeyRegisterStartRequest:
      type: object
      description: Optional overrides for the authenticated session user's passkey registration (username/display_name default
        to the user's stored profile when omitted), plus the step-up assertion required to ADD a passkey when the user already
        has one. A user with zero passkeys (initial enrollment) omits `step_up`; an already-enrolled user MUST supply a fresh
        `step_up` assertion of an existing passkey (user verification required), or register/start returns 401 — so a stolen
        session cannot silently add a credential.
      properties:
        username:
          type: string
        display_name:
          type: string
        step_up:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
    PasskeyStepUpAssertion:
      type: object
      description: A fresh assertion of an EXISTING passkey, proving the caller currently possesses an authenticator (not
        just a bearer token). The `ceremony_id` comes from a preceding `POST /api/v1/auth/passkey/login/start`; the `credential`
        is the resulting WebAuthn assertion. Verified with user verification (UV) required and rejected unless the asserted
        credential belongs to the authenticated caller.
      required:
      - ceremony_id
      - credential
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    AppleAppSiteAssociation:
      type: object
      description: Apple App Site Association document authorizing the native iOS app's passkeys for the RP domain.
      required:
      - webcredentials
      properties:
        webcredentials:
          type: object
          required:
          - apps
          properties:
            apps:
              type: array
              description: iOS app identifiers (`<TeamID>.<bundle-id>`).
              items:
                type: string
    AndroidAssetLinkStatement:
      type: object
      description: A single Android Digital Asset Links statement authorizing the native app's signing keys to provide login
        credentials for the RP domain.
      required:
      - relation
      - target
      properties:
        relation:
          type: array
          items:
            type: string
        target:
          type: object
          required:
          - namespace
          - package_name
          - sha256_cert_fingerprints
          properties:
            namespace:
              type: string
            package_name:
              type: string
            sha256_cert_fingerprints:
              type: array
              items:
                type: string
    PasskeyRegisterStartResponse:
      type: object
      required:
      - ceremony_id
      - challenge
      - expires_at
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        challenge:
          type: object
          additionalProperties: true
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    PasskeyRegisterFinishRequest:
      type: object
      required:
      - ceremony_id
      - credential
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    PasskeyRegisterFinishResponse:
      type: object
      required:
      - passkey_id
      - user_id
      - credential_id
      properties:
        passkey_id:
          $ref: '#/components/schemas/Uuid'
        user_id:
          $ref: '#/components/schemas/Uuid'
        credential_id:
          type: string
    SignupRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          description: The email address to register and deliver the one-time code to.
    SignupResponse:
      type: object
      required:
      - accepted
      properties:
        accepted:
          type: boolean
          description: Always true. The signup was accepted and a one-time code was sent; the response intentionally carries
            no account-existence or token information.
    OtpRedeemRequest:
      type: object
      required:
      - otp
      properties:
        otp:
          type: string
          description: The one-time sign-in code (8 characters for admin-issued codes).
    OtpRedeemResponse:
      type: object
