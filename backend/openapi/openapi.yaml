        '200':
          description: The visible waiting tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/workflow-tasks/{task_id}/claim:
    post:
      operationId: claimWorkflowTask
      summary: Claim an OPEN waiting task
      description: Transitions an OPEN task to CLAIMED for the caller. A same-user replay is a 200 no-op; a task claimed by
        another user, or in a terminal/cancelled/expired state, is a 409. Audits workflow_task.claim.
      security:
      - bearerAuth: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimWorkflowTaskRequest'
      responses:
        '200':
          description: Task claimed (replays return the current claim).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimWorkflowTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/workflow-tasks/{task_id}/decide:
    post:
      operationId: decideWorkflowTask
      summary: Decide a waiting task (approve/reject/return)
      description: Completes a non-finalize approval task. approve advances the run to the next node (a human task parks WAITING;
        no successor closes the run SUCCEEDED). reject and return require a non-empty comment (422 otherwise) and cancel the run —
        a resubmission is a new run, never a terminal reopen. Idempotent on idempotency_key. Audits workflow_task.decide.
      security:
      - bearerAuth: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
