      - name: user_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: branch_id
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
          maximum: 1000
          default: 100
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
          default: 0
      responses:
        '200':
          description: CSV consent lifecycle ledger export.
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/passkey/register/start:
    post:
      summary: Start passkey registration (authenticated)
      description: Starts a passkey registration ceremony for the authenticated session user.
        Used during initial-settings passkey enrollment after an OTP first sign-in, or to add
        a device later. Requires a bearer token. Adding a passkey when the user already has one
        requires a fresh `step_up` assertion of an existing passkey (user verification required);
        omitting it returns 401. Initial enrollment (zero existing passkeys) needs no step-up.
      security:
      - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterStartRequest'
      responses:
        '200':
          description: Registration ceremony challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterStartResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/passkey/register/finish:
    post:
      summary: Finish passkey registration (authenticated)
      description: Finishes a passkey registration ceremony for the authenticated session user.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterFinishRequest'
      responses:
        '201':
          description: Passkey registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterFinishResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/signup:
    post:
      summary: Open self-service signup
      description: Public, unauthenticated open signup. Creates a new lowest-privilege
        MEMBER account in the default organization and emails it a single-use one-time
        sign-in code; the caller then redeems that code via `POST /api/v1/auth/otp/redeem`
        and enrolls a passkey. The response reveals nothing about whether the email was
        newly registered (no account-existence oracle) and never mints a token. The new
        account sees the minimal role-gated surface until an admin elevates it.
        Rate-limited per client (IP and optional device).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '202':
          description: The signup was accepted and a one-time code was sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/BadGateway'
  /api/v1/auth/passkey/login/start:
    post:
      summary: Start usernameless passkey login
      description: Starts a discoverable (usernameless) authentication ceremony. No request
        body is required; the challenge has an empty allowCredentials list and the user is
        resolved from the asserted credential at finish. Rate-limited per client.
      responses:
        '200':
          description: Authentication ceremony challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyLoginStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/passkey/login/finish:
    post:
      summary: Finish passkey login
      description: Verifies the passkey assertion and issues an ES256 access JWT plus an opaque rotating
        refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginFinishRequest'
      responses:
        '200':
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/otp/redeem:
    post:
      summary: First sign-in by redeeming a one-time code
      description: First sign-in for a pre-provisioned user. Redeems a single-use,
        expiring one-time code (admin-issued, or the cold-start secret) and mints a normal
        session token pair. The code is consumed atomically on success only; a wrong or
        expired code returns a single generic 401. Rate-limited per client (IP and optional
        device). `requires_passkey_setup` is true when the user has no passkey yet, so the
        client should force passkey enrollment in initial settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRedeemRequest'
      responses:
        '200':
          description: Session token pair plus passkey-setup flag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRedeemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/admin/otp/issue:
    post:
      summary: Issue a one-time sign-in code (admin)
      description: Issues a single-use, high-entropy 8-character one-time code for a
        pre-provisioned zero-credential user so they can perform their first sign-in. Authz-gated
        to ADMIN / SUPER_ADMIN within branch scope. The code is returned once; only its hash is
        stored. `ttl_seconds` is optional and defaults to 24 hours.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminIssueOtpRequest'
      responses:
        '200':
          description: The issued one-time code and its expiry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssueOtpResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/admin/credential-reset:
    post:
      summary: Reset a user's credentials for account recovery (admin)
      description: Account-recovery escape hatch for a user who lost their only passkey.
        Revokes ALL of the target user's passkeys AND mints a fresh single-use sign-in
        one-time code, atomically and audited. Authz-gated to ADMIN / SUPER_ADMIN within
        the caller's own org and branch scope (same rules as issuing an admin one-time
        code); a non-SUPER_ADMIN caller cannot reset a privileged user, and a user in
        another org is not resettable. After the reset the old passkeys fail login and
        the returned code redeems for a first sign-in. The code is returned once; only
        its hash is stored.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCredentialResetRequest'
      responses:
        '200':
          description: The fresh one-time code and its expiry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCredentialResetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/passkey/enroll-handoff:
    post:
      summary: Mint a cross-device passkey-enrollment handoff (self)
      description: Mints a fresh single-use, short-lived (5 minutes) one-time code for the
        CURRENTLY AUTHENTICATED user so they can finish passkey enrollment on a SECOND device
        (typically a phone scanning a QR shown on the desktop console). SELF-ONLY — the user and
        org come from the verified access token, never the request body, so a caller can only
        ever mint a handoff for itself. When the caller is ALREADY enrolled (adding a device),
        a fresh `step_up` assertion of an existing passkey (user verification required) is
        mandatory, exactly like `passkey/register/start`; a mid-onboarding caller (no passkey
        yet) omits it. The response returns the code once (only its hash is stored) plus the
        ready-to-encode enrollment URL. The phone opens that URL, redeems the code via
        `POST /api/v1/auth/otp/redeem`, and enrolls a platform passkey — no Bluetooth required.
      security:
      - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollHandoffRequest'
      responses:
        '200':
          description: The minted single-use enrollment code, its expiry, and the QR enrollment URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollHandoffResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/passkeys:
    get:
      operationId: listAuthPasskeys
      summary: List the authenticated user's own passkey credentials
      description: >-
        Returns the caller's own WebAuthn credentials (id and registration /
        last-use timestamps) through the auth namespace. This self-only route is
        not behind tenant middleware, so it works for both tenant sessions and
        platform-admin sessions. No secret material is ever returned.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The authenticated user's passkey credentials.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PasskeySummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/auth/passkeys/{id}:
    delete:
      operationId: deleteAuthPasskey
      summary: Revoke one of the authenticated user's own passkey credentials
      description: >-
        Deletes a credential owned by the caller through the auth namespace. A
        credential that is not the caller's own returns 404. The caller's last
        remaining passkey cannot be deleted (409) so they do not lock themselves
        out. This route works for both platform-admin and tenant sessions.
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      responses:
        '204':
          description: The passkey was revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /api/v1/auth/privacy-consent/status:
    post:
      summary: Read required first-login privacy consent status
      description: Returns whether the authenticated user has accepted the current
        required Korean privacy collection/use notice and service terms version.
        This status is checked before initial passkey enrollment. Optional marketing
        consent and GPS/location consent are not bundled here and remain separate flows.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Current required privacy consent status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyConsentStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/privacy-consent/accept:
    post:
      summary: Accept required first-login privacy terms
      description: Persists the authenticated user's required initial-login
        acknowledgement of the privacy collection/use notice and service terms as
        a tenant-scoped audit event. Both required agreements must be accepted
        explicitly; optional marketing and GPS/location consent are excluded.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyConsentAcceptRequest'
      responses:
        '200':
          description: The accepted current required privacy consent status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyConsentStatusResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/token/refresh:
    post:
      summary: Rotate refresh token
      description: Rotates an opaque refresh token; reuse of an old token revokes the whole family and
        returns 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/logout:
    post:
      summary: Logout and revoke refresh-token family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Refresh-token family revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/messenger/threads:
