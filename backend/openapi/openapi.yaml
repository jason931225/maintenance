    ActionInboxLink:
      type: object
      description: >-
        One server-ordered canonical source-object reference for an action-inbox
        item. Clients resolve only explicitly registered kind/id pairs; current
        browser-linkable kinds are approval_run, work_order, and support_ticket.
        Unknown kinds remain valid for forward compatibility and MUST stay inert
        until a client registry adds support. Clients MUST NOT accept a server URL
        or infer a destination from the enclosing item kind, item id, label, or a
        code prefix.
      required:
      - kind
      - id
      properties:
        kind:
          type: string
          description: >-
            Canonical source-object kind. Current browser-linkable values are
            approval_run, work_order, and support_ticket; other strings are
            forward-compatible but inert.
        id:
          type: string
          description: >-
            Canonical source-object identifier. Clients trim surrounding
            whitespace and reject a blank result before route construction.
        label:
          type: string
    ActionInboxItem:
      type: object
      description: >-
        One unified actionable item. Field names mirror the overview prototype's
        items[] shape. Source-partial fields (site/who/due/submitted) are absent
        when the originating source does not carry them.
      required:
      - id
      - kind
      - urg
      - ref
      - title
      - dueTone
      - links
      - done
      properties:
        id:
          type: string
          description: '"{kind}:{uuid}" — source-namespaced so ids never collide.'
        kind:
          type: string
          enum:
          - approval
          - dispatch
          - work
          - support
        urg:
          type: string
          enum:
          - now
          - today
          - wait
        ref:
          type: string
          description: >-
            Source reference (work order request_no, ticket id, or the workflow
            run/object id). Not a canonical AP-/CS- object code.
        title:
          type: string
        site:
          type: string
        who:
          type: string
        due:
          $ref: '#/components/schemas/Timestamp'
        dueTone:
          type: string
          enum:
          - danger
          - warn
          - neutral
        submitted:
          $ref: '#/components/schemas/Timestamp'
        links:
          type: array
          items:
            $ref: '#/components/schemas/ActionInboxLink'
        done:
          type: boolean
    ActionInboxResponse:
      type: object
      required:
      - items
      - total
      - total_is_exact
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActionInboxItem'
        total:
          type: integer
          minimum: 0
          description: Live visible item count across sources admitted by as_of; inspect total_is_exact before treating it as authoritative.
        total_is_exact:
          type: boolean
          description: False only when a bounded authorization-filtered count reached its scan budget.
        next_cursor:
          type:
          - string
          - 'null'
          description: Opaque cursor for the next immutable-keyset page, or null when exhausted.
