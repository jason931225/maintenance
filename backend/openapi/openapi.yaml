      properties:
        user_id:
          $ref: '#/components/schemas/Uuid'
        otp:
          type: string
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    EnrollHandoffRequest:
      type: object
      description: >-
        Cross-device passkey-enrollment handoff request. Carries NO user/org —
        those come from the verified access token, so a caller can only mint a
        handoff for itself. `step_up` is REQUIRED only when the caller already has
        a passkey (adding a device); a mid-onboarding caller (zero passkeys) omits
        it.
      properties:
        step_up:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
    EnrollHandoffResponse:
      type: object
      description: >-
        The minted single-use, short-lived passkey-enrollment code (returned once,
        only its hash is stored) plus the ready-to-encode enrollment URL the
        frontend renders as a QR. The phone opens `enroll_url`, redeems `otp` via
        the first-sign-in path, and enrolls a platform passkey.
      required:
      - otp
      - expires_at
      - enroll_url
      properties:
        otp:
          type: string
          description: The single-use enrollment handoff code.
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        enroll_url:
          type: string
          description: The console enrollment URL carrying the handoff code in the fragment
            (`{origin}/login#otp=<code>`), to be rendered as a QR and scanned on a phone.
    PrivacyConsentAcceptRequest:
      type: object
      description: >-
        Required initial-login Korean privacy collection/use and service-terms
        acknowledgement. These required agreements are explicit booleans so the
        client cannot bundle them into one generic "agree all" flag. Optional
        marketing consent and GPS/location consent are not collected by this
        request.
      required:
      - policy_version
      - privacy_collection
      - terms_of_service
      properties:
        policy_version:
          type: string
          description: Required privacy/terms notice version being accepted.
        privacy_collection:
          type: boolean
          description: Required acknowledgement of collection/use purpose, items,
            retention period, refusal right, and refusal consequence.
        terms_of_service:
          type: boolean
          description: Required acknowledgement of service terms, security controls,
            and audit-log processing needed to operate the console.
    PrivacyConsentStatusResponse:
      type: object
      description: Current required first-login privacy/terms consent status.
      required:
      - policy_version
      - accepted
      properties:
        policy_version:
          type: string
          description: Current required privacy/terms notice version.
        accepted:
          type: boolean
          description: True when the authenticated user has accepted the current version.
        accepted_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp of the latest acceptance for the current version.
    PasskeyLoginStartResponse:
      type: object
      required:
      - ceremony_id
