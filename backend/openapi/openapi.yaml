  /api/v1/me/action-inbox:
    get:
      operationId: listMyActionInbox
      summary: Unified action inbox for the authenticated principal
      description: >-
        One server-side fan-in of the caller's actionable items across every
        source that owns a person-scoped list: workflow/approval tasks awaiting
        the caller (the ?assignee=me path), pending P1 dispatch offers, support
        tickets assigned to the caller, and work orders assigned to the caller.
        Each source is queried through the exact predicate its own list endpoint
        uses, so the aggregate never widens visibility (deny-by-omission). Items
        are bucketed by urgency (now/today/wait) with a derived due tone. Fields
        the overview prototype carries but no backend source can supply are
        omitted (entity, amount, detail, files, stats, mailId); site/who/submitted
        are present only for the sources that carry them. Attendance exceptions
        are not aggregated (no exception object exists yet).
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The caller's actionable items, most urgent first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInboxResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
