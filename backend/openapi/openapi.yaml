      properties:
        id: { type: string, format: uuid }
        link_type_id: { type: string, format: uuid }
        from_instance_id: { type: string, format: uuid }
        to_instance_id: { type: string, format: uuid }
    TraversalGraph:
      type: object
      required: [root, nodes, edges]
      properties:
        root: { type: string, format: uuid }
        nodes: { type: array, items: { $ref: '#/components/schemas/TraversalNode' } }
        edges: { type: array, items: { $ref: '#/components/schemas/TraversalEdge' } }
    ObjectTypeSummary:
      type: object
      required: [id, stable_key, title, backing_kind, schema_version, lifecycle_state, key_write_revision, key_write_etag]
      properties:
        id: { type: string, format: uuid }
        stable_key: { type: string }
        title: { type: string }
        backing_kind: { type: string, enum: [instance, projected] }
        schema_version: { type: integer, format: int64 }
        lifecycle_state: { type: string, enum: [draft, review_pending, published, superseded, retired] }
        key_write_revision: { type: integer, format: int64, minimum: 1 }
        key_write_etag:
          type: string
          pattern: '^"ont-object-type-key:[0-9a-f]{32}:r[1-9][0-9]*"$'
    InstanceLifecycleState:
      type: string
      enum: [draft, active, locked, archived, disposed]

    # --- gap 1: lifecycle commit ---
    LifecycleRequest:
      type: object
      required: [to_state]
      properties:
        to_state: { $ref: '#/components/schemas/InstanceLifecycleState' }
        reason: { type: string, nullable: true }
        checklist_all_acknowledged: { type: boolean, nullable: true }
        four_eyes_request_ref: { type: string, format: uuid, nullable: true }
    GateChainConfig:
      type: object
      required: [authority, self_checklist, four_eyes, egress_dlp]
      properties:
        authority: { type: boolean }
        self_checklist: { type: boolean }
        four_eyes: { type: boolean }
        egress_dlp: { type: boolean }
    GateChainOutcome:
      type: object
      required: [allow, gates]
      properties:
        allow: { type: boolean }
        gates:
          type: array
          items: { type: object, additionalProperties: true }  # per-gate { gate, status }
    LifecycleOutcome:
      type: object
      required: [instance, config, gates]
      properties:
        instance: { $ref: '#/components/schemas/InstanceHead' }
        config: { $ref: '#/components/schemas/GateChainConfig' }
        gates: { $ref: '#/components/schemas/GateChainOutcome' }

    # --- gap 2: acting-read ---
    ActingRule:
      type: object
      required: [id, label, kind]
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        kind: { type: string, enum: [automation, policy] }

    # --- gap 3: code resolve ---
    ResolvedInstance:
      type: object
      required: [id, type, title]
      properties:
        id: { type: string, format: uuid }
        type: { type: string }   # object-type stable_key
        title: { type: string }

    # --- gap 4: bulk authorize ---
    BulkAuthorizeBody:
      type: object
      required: [subject, checks]
      properties:
        subject: { $ref: '#/components/schemas/PolicySimSubject' }
        checks:
          type: array
          items:
            type: object
            required: [action, resource]
            properties:
              action: { type: string }
              resource: { $ref: '#/components/schemas/PolicySimResource' }
              purpose: { type: string, nullable: true }
              field: { type: string, nullable: true }
    BulkDecisionResponse:
      type: object
      required: [decisions]
      properties:
        decisions: { type: array, items: { $ref: '#/components/schemas/SimulationOutcome' } }
    SimulationOutcome:
      type: object
      required: [effect, determining_policies, errors, reason]
      properties:
        effect: { type: string, enum: [allow, deny] }
        determining_policies: { type: array, items: { type: string } }
        errors: { type: array, items: { type: string } }
        reason: { type: string }

    # --- gap 5: decision feed ---
    DecisionLogRow:
      type: object
      required: [id, decided_at, subject_ref, action, resource_type, effect, determining_policies, reason]
      properties:
        id: { type: string, format: uuid }
        decided_at: { type: string, format: date-time }
        subject_ref: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, nullable: true }
        effect: { type: string, enum: [allow, deny] }
        determining_policies: { type: array, items: { type: string } }
        reason: { type: string }
    EquipmentVersion:
      type: object
      required:
      - version
      - status
      - content
      - createdAt
      properties:
        version:
          type: integer
          format: int32
        status:
          type: string
          enum: [CAPTURED, ROLLBACK]
        sourceVersion:
          type: integer
          format: int32
        content:
          type: object
          additionalProperties: true
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    EquipmentVersionList:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentVersion'
    EquipmentRollbackResult:
      type: object
      required:
      - version
      properties:
        version:
          type: integer
          format: int32
    PeriodLock:
      type: object
      required:
      - id
      - domain
      - periodStart
      - periodEnd
      - reason
      - lockedAt
      properties:
        id:
          type: string
          format: uuid
