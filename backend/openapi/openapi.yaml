        contentHash:
          type: string
          pattern: ^[a-f0-9]{64}$
        fileType:
          type: string
          enum: [docx, xlsx, pptx]
        byteSize:
          type: integer
          format: int64
          minimum: 0
        restoredFrom:
          type: integer
          minimum: 1
          description: The version_no this version non-destructively restored, when it is a rollback.
        createdBy:
          type: string
          format: uuid
          description: Actor who produced the version; omitted for system-initiated (force-save callback) versions.
        createdAt:
          type: string
          format: date-time
