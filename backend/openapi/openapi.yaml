  /api/v1/lifecycles/{objectType}/{objectId}/transition:
    post:
      operationId: transitionObjectLifecycle
      summary: Transition one object's lifecycle state
      description: 'Lifecycle-authority gated (LifecycleManage, org-wide), audited. The transition is validated against the
        seeded per-object-type rule table (document: draft → submitted → approved → active → revised → archived → disposed);
        an illegal transition returns 409. The disposed transition additionally fails closed with 409 while the object is
        under legal hold or its retentionUntil lies in the future. The first legal transition of an unknown object
        implicitly registers its lifecycle at draft.'
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/LifecycleObjectType'
      - $ref: '#/components/parameters/LifecycleObjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionLifecycleRequest'
      responses:
        '200':
          description: Transition applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectLifecycle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
  /api/v1/lifecycles/{objectType}/{objectId}/hold:
    post:
      operationId: setObjectLifecycleHold
      summary: Set or clear legal hold / retention on one object's lifecycle
      description: Lifecycle-authority gated (LifecycleManage, org-wide), audited. Creates the lifecycle row at draft when
        absent so a hold can be placed before the object ever transitions.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/LifecycleObjectType'
      - $ref: '#/components/parameters/LifecycleObjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLifecycleHoldRequest'
      responses:
        '200':
          description: Hold updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectLifecycle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: JWT verification is not configured.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LifecycleObjectType:
      name: objectType
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_]{1,63}$'
    LifecycleObjectId:
      name: objectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Client-stable device identifier. The server stores only a SHA-256 hash.
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentSubstitutionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SiteId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentIdV2:
      name: equipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PurchaseRequestId:
      name: purchaseRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DispatchId:
      name: dispatchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportDate:
      name: date
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/Date'
      description: Report date in YYYY-MM-DD format.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Principal lacks role or branch authority.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Resource was not found in branch scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Conflict:
      description: State conflict or illegal transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Rate limit exceeded for this client; retry later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadGateway:
      description: An upstream dependency (e.g. the email relay) failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: Required storage or platform dependency is not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    MailUnavailable:
      description: Webmail is not configured on this server (the master key MNT_MAIL_MASTER_KEY is absent), or JWT verification
        is not configured. The app is otherwise healthy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
    ObjectHead:
      type: object
      description: Compact, kind-agnostic head for any object. exists=false means the object is absent OR outside the
        caller's scope (indistinguishable, by design). Carries no route/URL — objectRegistry (frontend) is the sole
        kind->URL authority.
      required:
      - kind
      - id
      - exists
      properties:
        kind:
          type: string
        id:
          type: string
        code:
          type: string
          nullable: true
          description: Canonical issued code if the kind has one (e.g. work-order request_no); absent otherwise.
        title:
          type: string
          nullable: true
          description: Human display label if available.
        status:
          type: string
          nullable: true
          description: Domain status string if available.
        exists:
          type: boolean
    CreateObjectLinkRequest:
      type: object
      description: Request to create a directed link between two known objects.
      required:
      - src_kind
      - src_id
      - dst_kind
      - dst_id
      - link_type
      properties:
        src_kind:
          type: string
          description: Source object kind slug (must be a known object type).
        src_id:
          type: string
          description: Source object id/reference (≤200 chars).
        dst_kind:
          type: string
          description: Destination object kind slug (must be a known object type).
        dst_id:
          type: string
          description: Destination object id/reference (≤200 chars).
        link_type:
          type: string
          description: Relationship label slug (e.g. authorized_by, relates_to, blocks).
    ObjectLinkResponse:
      type: object
      required:
      - id
      - src_kind
      - src_id
      - dst_kind
      - dst_id
      - link_type
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        src_kind:
          type: string
        src_id:
          type: string
        dst_kind:
          type: string
        dst_id:
          type: string
        link_type:
          type: string
        created_by:
          $ref: '#/components/schemas/Uuid'
          nullable: true
        created_at:
          $ref: '#/components/schemas/Timestamp'
    ObjectLinksListResponse:
      type: object
      description: Links touching one object, split by direction.
      required:
      - outgoing
      - incoming
      properties:
        outgoing:
          type: array
          description: Links where the queried object is the source.
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
        incoming:
          type: array
          description: Links where the queried object is the destination.
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
    ObjectGraphResponse:
      type: object
      description: The bounded, caller-visible neighborhood of an object, walked over object_links. Unresolvable
        nodes are omitted entirely (never returned as stubs), and edges touching an omitted node are omitted too.
      required:
      - nodes
      - edges
      - truncated
      properties:
        nodes:
          type: array
          description: Every object the caller can resolve, each passed through the same visibility guard as resolveObject.
          items:
            $ref: '#/components/schemas/ObjectHead'
        edges:
          type: array
          description: Links between resolved nodes (the induced subgraph over the visible node set).
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
        truncated:
          type: boolean
          description: True if the node cap was hit before the walk exhausted the requested depth.
    SearchResponse:
      type: object
      description: Global search hits, each an ObjectHead scoped identically to resolveObject (a hit the caller could
        not resolve never appears). Grouped by kind; exists is always true for a hit.
      required:
      - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ObjectHead'
    CollaborationScopeType:
      type: string
      enum:
      - TENANT
      - ORG
      - DEPARTMENT
      - TEAM
      - PERSONAL
    CalendarEventStatus:
      type: string
      enum:
      - ACTIVE
      - CANCELLED
    PollStatus:
      type: string
      enum:
      - DRAFT
      - OPEN
      - CLOSED
      - ARCHIVED
    PollAnonymity:
      type: string
      enum:
      - NAMED
      - ANONYMOUS
    CollaborationScopePolicy:
      type: object
      required:
      - enforcement
      - scope_type
      - visibility
      properties:
        enforcement:
          type: string
          enum:
          - server
        scope_type:
          $ref: '#/components/schemas/CollaborationScopeType'
        scope_ref:
          type:
          - string
          - 'null'
        visibility:
          type: string
          enum:
          - org_members
          - creator_only
          - department_target
          - team_target
    CalendarEventResponse:
      type: object
      required:
      - id
      - scope_type
      - title
      - description
      - starts_at
      - ends_at
      - all_day
      - status
      - created_at
      - updated_at
      - policy
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        scope_type:
          $ref: '#/components/schemas/CollaborationScopeType'
        scope_ref:
          type:
          - string
          - 'null'
        title:
          type: string
        description:
          type: string
        starts_at:
          $ref: '#/components/schemas/Timestamp'
        ends_at:
          $ref: '#/components/schemas/Timestamp'
        all_day:
          type: boolean
        status:
          $ref: '#/components/schemas/CalendarEventStatus'
        object_type:
          type:
          - string
          - 'null'
        object_id:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
        created_by:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        policy:
          $ref: '#/components/schemas/CollaborationScopePolicy'
    CalendarEventListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEventResponse'
    CreateCalendarEventRequest:
      type: object
      required:
      - scope_type
      - title
      - starts_at
      - ends_at
      properties:
        scope_type:
          $ref: '#/components/schemas/CollaborationScopeType'
        scope_ref:
          type:
          - string
          - 'null'
        title:
          type: string
          minLength: 1
          maxLength: 160
        description:
          type: string
          maxLength: 2000
        starts_at:
          $ref: '#/components/schemas/Timestamp'
        ends_at:
          $ref: '#/components/schemas/Timestamp'
        all_day:
          type: boolean
          default: false
        object_type:
          type:
          - string
          - 'null'
        object_id:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
    PollOptionResponse:
      type: object
      required:
      - id
      - label
      - position
      - vote_count
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        label:
          type: string
        position:
          type: integer
          format: int32
        vote_count:
          type: integer
          format: int64
    PollMyVote:
      type: object
      required:
      - submitted
      properties:
        submitted:
          type: boolean
        selected_option_ids:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Uuid'
    PollResponse:
      type: object
      required:
      - id
      - target_scope_type
      - title
      - question
      - status
      - anonymity
      - allow_multiple
      - options
      - vote_count
      - my_vote
      - created_at
      - updated_at
      - policy
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        target_scope_type:
          $ref: '#/components/schemas/CollaborationScopeType'
        target_scope_ref:
          type:
          - string
          - 'null'
        title:
          type: string
        question:
          type: string
        status:
          $ref: '#/components/schemas/PollStatus'
        anonymity:
          $ref: '#/components/schemas/PollAnonymity'
        allow_multiple:
          type: boolean
        closes_at:
          oneOf:
          - $ref: '#/components/schemas/Timestamp'
          - type: 'null'
        object_type:
          type:
          - string
          - 'null'
        object_id:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
        options:
          type: array
          items:
            $ref: '#/components/schemas/PollOptionResponse'
        vote_count:
          type: integer
          format: int64
        my_vote:
          $ref: '#/components/schemas/PollMyVote'
        created_by:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        policy:
          $ref: '#/components/schemas/CollaborationScopePolicy'
    PollListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PollResponse'
    CreatePollRequest:
      type: object
      required:
      - target_scope_type
      - title
      - question
      - options
      properties:
        target_scope_type:
          $ref: '#/components/schemas/CollaborationScopeType'
        target_scope_ref:
          type:
          - string
          - 'null'
        title:
          type: string
          minLength: 1
          maxLength: 160
        question:
          type: string
          minLength: 1
          maxLength: 1000
        status:
          $ref: '#/components/schemas/PollStatus'
        anonymity:
          $ref: '#/components/schemas/PollAnonymity'
        allow_multiple:
          type: boolean
          default: false
        closes_at:
          oneOf:
          - $ref: '#/components/schemas/Timestamp'
          - type: 'null'
        options:
          type: array
          minItems: 2
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 240
        object_type:
          type:
          - string
          - 'null'
        object_id:
          oneOf:
          - $ref: '#/components/schemas/Uuid'
          - type: 'null'
    VotePollRequest:
      type: object
      required:
      - selected_option_ids
      properties:
        selected_option_ids:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/Uuid'
    Uuid:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    Date:
      type: string
      format: date
    PriorityLevel:
      type: string
      enum:
      - P1
      - P2
      - P3
      - OUTSOURCE
      - UNSET
    WorkOrderStatus:
      type: string
      enum:
      - RECEIVED
      - UNASSIGNED
      - ASSIGNED
      - IN_PROGRESS
      - REPORT_SUBMITTED
      - ADMIN_REVIEW
      - FINAL_COMPLETED
      - REJECTED
      - ON_HOLD
      - DELAYED
      - TEMPORARY_ACTION
      - PART_WAITING
      - EQUIPMENT_IN_USE
      - REVISIT_REQUIRED
      - ARCHIVED
      - CANCELLED
    WorkResultType:
      type: string
      enum:
      - COMPLETED
      - TEMPORARY_ACTION
      - INCOMPLETE
      - REVISIT_REQUIRED
      - UNKNOWN
    AssignmentRole:
      type: string
      enum:
      - PRIMARY
      - SECONDARY
    AttachmentStage:
      type: string
      enum:
      - REQUEST
      - BEFORE
      - DURING
      - AFTER
      - REPORT
      - OUTSOURCE_RESULT
    SyncOperationKind:
      type: string
      enum:
      - WORK_ORDER_START
      - WORK_ORDER_REPORT
    SyncOperationStatus:
      type: string
      enum:
      - APPLIED
      - FAILED
    DevicePlatform:
      type: string
      enum:
      - ios
      - android
    WormReplicaStatus:
      type: string
      enum:
      - PENDING
      - VERIFIED
      - FAILED
    DailyPlanStatus:
      type: string
      enum:
      - DRAFT
      - REQUESTED
      - APPROVED
      - REJECTED
      - FINAL_CONFIRMED
    InspectionCycle:
      type: string
      enum:
      - DAILY
      - WEEKLY
      - MONTHLY
      - QUARTERLY
      - YEARLY
      - CUSTOM
    InspectionScheduleStatus:
      type: string
      enum:
      - SCHEDULED
      - COMPLETED
      - CANCELLED
    InspectionRoundOutcome:
      type: string
      enum:
      - COMPLETED
      - FOLLOW_UP_REQUIRED
    TargetChangeDecision:
      type: string
      enum:
      - APPROVED
      - REJECTED
    KpiMetric:
      type: string
      enum:
      - completed_count
      - average_response_speed
      - completion_duration_and_due_compliance
      - revisit_rate
      - delay_rate_and_reason_distribution
      - inspection_plan_completion_rate
      - p1_acceptance_rate
    Period:
      type: object
      required:
      - start
      - end
      properties:
        start:
          $ref: '#/components/schemas/Timestamp'
        end:
          $ref: '#/components/schemas/Timestamp'
    KpiScope:
      type: object
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - company
          - region
          - branch
          - technician
        id:
          $ref: '#/components/schemas/Uuid'
      description: '`id` is present for region, branch, and technician scopes and absent for company.'
    KpiRollupScope:
      type: object
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - company
          - region
          - branch
          - technician
        id:
          $ref: '#/components/schemas/Uuid'
      description: '`id` is present for region, branch, and technician rollups and absent for company.'
    KpiReport:
      type: object
      required:
      - period
      - requested_scope
      - rollups
      - unavailable_metrics
      properties:
        period:
          $ref: '#/components/schemas/Period'
        requested_scope:
          $ref: '#/components/schemas/KpiScope'
        rollups:
          type: array
          items:
            $ref: '#/components/schemas/KpiRollup'
        unavailable_metrics:
          type: array
          items:
            $ref: '#/components/schemas/UnavailableMetric'
    KpiRollup:
      type: object
      required:
      - scope
      - approved_report_count
      - completed_count
      - weighted_completed_points
      - average_response_seconds
      - average_completion_seconds
      - target_due_compliance_bps
      - revisit_rate_bps
      - delay_rate_bps
      - delay_reason_distribution
      - inspection_schedule_due_count
      - inspection_schedule_completed_count
      - inspection_plan_completion_bps
      - p1_dispatch_count
      - p1_accepted_count
      - p1_acceptance_bps
      properties:
        scope:
          $ref: '#/components/schemas/KpiRollupScope'
        scope_display_name:
          type:
          - string
          - 'null'
          description: Human-readable name for the scope (region/branch/mechanic), resolved via a same-org lookup. Null for
            the company-wide scope or a deleted region/branch/user. Optional; absent on the pure-domain shape.
        approved_report_count:
          type: integer
          format: int32
          minimum: 0
        completed_count:
          type: integer
          format: int32
          minimum: 0
        weighted_completed_points:
          type: integer
          format: int32
          minimum: 0
        average_response_seconds:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        average_completion_seconds:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        target_due_compliance_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
        revisit_rate_bps:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
        delay_rate_bps:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
        delay_reason_distribution:
          type: object
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
        inspection_schedule_due_count:
          type: integer
          format: int32
          minimum: 0
        inspection_schedule_completed_count:
          type: integer
          format: int32
          minimum: 0
        inspection_plan_completion_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
        p1_dispatch_count:
          type: integer
          format: int32
          minimum: 0
        p1_accepted_count:
          type: integer
          format: int32
          minimum: 0
        p1_acceptance_bps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 10000
    OpsFunnel:
      type: object
      required:
      - received
      - assigned
      - in_progress
      - completed
      properties:
        received:
          type: integer
          format: int32
          minimum: 0
        assigned:
          type: integer
          format: int32
          minimum: 0
        in_progress:
          type: integer
          format: int32
          minimum: 0
        completed:
          type: integer
          format: int32
          minimum: 0
    OpsEquipmentStatus:
      type: object
      required:
      - rented
      - spare
      - scrapped
      - replacement
      - sold
      properties:
        rented:
          type: integer
          format: int32
          minimum: 0
        spare:
          type: integer
          format: int32
          minimum: 0
        scrapped:
          type: integer
          format: int32
          minimum: 0
        replacement:
          type: integer
          format: int32
          minimum: 0
        sold:
          type: integer
          format: int32
          minimum: 0
    OpsMechanicLoad:
      type: object
      required:
      - mechanic_id
      - display_name
      - active_assignments
      properties:
        mechanic_id:
          type: string
          format: uuid
        display_name:
          type: string
        active_assignments:
          type: integer
          format: int32
          minimum: 0
    OpsSummary:
      type: object
      required:
      - funnel
      - aging_hours
      - aging_work_orders
      - sla_breached
      - sla_at_risk
      - mechanic_load
      - equipment_status
      - active_substitutions
      - pending_approvals
      - open_support_tickets
      properties:
        funnel:
          $ref: '#/components/schemas/OpsFunnel'
        aging_hours:
          type: integer
          format: int32
          minimum: 0
        aging_work_orders:
          type: integer
          format: int32
          minimum: 0
        sla_breached:
          type: integer
          format: int32
          minimum: 0
        sla_at_risk:
          type: integer
          format: int32
          minimum: 0
        mechanic_load:
          type: array
          items:
            $ref: '#/components/schemas/OpsMechanicLoad'
        equipment_status:
          $ref: '#/components/schemas/OpsEquipmentStatus'
        active_substitutions:
          type: integer
          format: int32
          minimum: 0
        pending_approvals:
          type: integer
          format: int32
          minimum: 0
        open_support_tickets:
          type: integer
          format: int32
          minimum: 0
    AuditChainAttestation:
      type: object
      required:
      - org_id
      - ok
      - kind
      - unsealed_tail
      properties:
        org_id:
          type: string
          format: uuid
        ok:
          type: boolean
          description: No tamper detected. Independent of unsealed_tail.
        first_bad_seq:
          type: integer
          format: int64
          nullable: true
          description: The first offending seal's seq, when the failure localizes to one seal.
        kind:
          type: string
          enum:
          - ok
          - seal_hash_mismatch
          - batch_hash_mismatch
          - broken_continuity
          - bad_signature
          - missing_seq
          - coverage_gap
          - corrupt_seal
          description: Tamper classification. `ok` means every seal recomputes, chains, verifies, and covers its range
            with no gap.
        unsealed_tail:
          type: boolean
          description: Freshness signal — committed rows older than the seal watermark exist beyond the head seal's
            cursor (the worker fell behind or is stopped). Never forces ok=false on a healthy live chain.
