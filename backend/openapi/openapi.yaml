  /api/v2/leave/requests/{id}/decide:
    post:
      tags:
        - leave
      operationId: decideLeaveRequestV2
      summary: Approve, return, or reject a pending leave request
      description: >-
        Requires `employee_directory_manage` in the request's branch. An
        APPROVE writes the leave ledger (used += exact resolved charge units,
        remaining -= exact resolved charge units) in the same audited transaction.
        Separation of duties — a request cannot be
        decided by its own requester (403). `return`/`reject` require a comment.
        Approval additionally requires a resolved exact charge and a distinct
        resolver. Clients must carry the current request_version as
        `expected_version`; omission is rejected so every v2 decision is an
        explicit compare-and-swap. charge_version identifies immutable evidence
        and is never a request mutation precondition. A successful decision
        increments request_version only; charge_version remains unchanged. An
        unresolved approval returns 409 `leave_calendar_review_required` plus
