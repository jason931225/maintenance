  /api/v1/lifecycles/{objectType}/{objectId}:
    get:
      operationId: getObjectLifecycle
      summary: Read one object's lifecycle state and transition log
      description: Lifecycle-authority gated (LifecycleManage, org-wide). Returns the current FSM state, legal hold /
        retention flags, and the append-only transition history (newest first).
