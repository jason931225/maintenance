openapi: 3.1.0
info:
  title: Maintenance FSM Backend API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      summary: Health check
      responses:
        "200":
          description: Service is alive.
  /readyz:
    get:
      operationId: readyz
      summary: Readiness check
      responses:
        "200":
          description: Service dependencies are ready.
        "503":
          description: A required dependency is unavailable.
  /api/work-orders:
    post:
      operationId: createWorkOrder
      summary: Create a work order from branch-scoped equipment management number
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkOrderRequest"
      responses:
        "201":
          description: Work order created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/work-orders/{workOrderId}:
    get:
      operationId: getWorkOrder
      summary: Fetch one work order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      responses:
        "200":
          description: Work order summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/work-orders/{workOrderId}/priority:
    patch:
      operationId: updateWorkOrderPriority
      summary: Update work-order priority
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priority]
              properties:
                priority:
                  $ref: "#/components/schemas/PriorityLevel"
      responses:
        "200":
          description: Updated work order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
  /api/work-orders/{workOrderId}/assignments:
    put:
      operationId: assignWorkOrder
      summary: Assign mechanics and approval-line approvers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignWorkOrderRequest"
      responses:
        "200":
          description: Assigned work order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
  /api/work-orders/{workOrderId}/start:
    post:
      operationId: startWorkOrder
      summary: Start assigned work
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      responses:
        "200":
          description: In-progress work order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
  /api/work-orders/{workOrderId}/report:
    post:
      operationId: submitWorkOrderReport
      summary: Submit a mechanic work report
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReportRequest"
      responses:
        "200":
          description: Report-submitted work order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
  /api/work-orders/{workOrderId}/approve:
    post:
      operationId: approveWorkOrder
      summary: Approve the next pending non-mechanic approval step
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      responses:
        "200":
          description: Updated work-order approval state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/work-orders/{workOrderId}/target-change-requests:
    post:
      operationId: requestTargetChange
      summary: Request a target due-date change
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetChangeRequest"
      responses:
        "201":
          description: Target change request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetChangeRequestSummary"
  /api/target-change-requests/{requestId}/review:
    post:
      operationId: reviewTargetChange
      summary: Review a target due-date change request
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTargetChangeRequest"
      responses:
        "200":
          description: Target change review persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetChangeRequestSummary"
  /api/daily-work-plans:
    post:
      operationId: createDailyWorkPlan
      summary: Create a daily work plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyPlanRequest"
      responses:
        "201":
          description: Daily plan created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlanSummary"
  /api/daily-work-plans/{planId}/request-review:
    post:
      operationId: requestDailyWorkPlanReview
      summary: Send a daily work plan for review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Daily plan moved to requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlanSummary"
  /api/daily-work-plans/{planId}/review:
    post:
      operationId: reviewDailyWorkPlan
      summary: Review a daily work plan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDailyPlanRequest"
      responses:
        "200":
          description: Daily plan reviewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlanSummary"
  /api/daily-work-plans/{planId}/confirm:
    post:
      operationId: confirmDailyWorkPlan
      summary: Confirm an approved daily work plan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Daily plan confirmed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlanSummary"
  /api/work-orders/{workOrderId}/outsource-works:
    post:
      operationId: createOutsourceWork
      summary: Create an outsource work request for a work order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutsourceWorkRequest"
      responses:
        "201":
          description: Outsource work created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutsourceWorkSummary"
  /api/v1/work-orders:
    get:
      operationId: listWorkOrders
      summary: List branch-scoped work orders
      description: Returns branch-scoped work orders sorted by priority and target due date. The server accepts repeated `status`, `status[]`, `priority`, and `priority[]` query keys, plus comma-separated values.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/WorkOrderStatus"
        - name: priority
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/PriorityLevel"
        - name: assigned_to
          in: query
          required: false
          schema:
            type: string
          description: Use `me` for the authenticated user or a user UUID.
        - name: customer_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Uuid"
        - name: site_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Uuid"
        - name: target_due_from
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
        - name: target_due_to
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated work-order list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderListPage"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/work-orders/{workOrderId}:
    get:
      operationId: getWorkOrderDetail
      summary: Fetch branch-scoped work-order detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      responses:
        "200":
          description: Full work-order detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/work-orders/{workOrderId}/reject:
    post:
      operationId: rejectWorkOrder
      summary: Reject a submitted work order with an audit memo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectWorkOrderRequest"
      responses:
        "200":
          description: Rejected work order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/equipment/lookup:
    get:
      operationId: lookupEquipment
      summary: Resolve branch-scoped equipment by management number
      security:
        - bearerAuth: []
      parameters:
        - name: management_no
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Equipment management number. A leading `#` is accepted and ignored.
      responses:
        "200":
          description: Matching equipment, model, customer, and site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentLookupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/equipment:
    get:
      operationId: autocompleteEquipment
      summary: Autocomplete branch-scoped equipment by management number, equipment number, or model
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Prefix-search equipment matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentAutocompletePage"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sync:
    post:
      operationId: replayOfflineSyncBatch
      summary: Replay an idempotent mobile offline-operation batch
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XDeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncBatchRequest"
      responses:
        "200":
          description: Per-operation replay results. Individual failures do not abort the batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncBatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: JWT verification is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /api/v1/evidence/presign:
    post:
      operationId: presignEvidenceUpload
      summary: Issue a presigned upload ticket for work-order evidence
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidencePresignRequest"
      responses:
        "200":
          description: Presigned evidence upload ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidencePresignResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Evidence storage is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /api/v1/evidence/{evidenceId}/confirm:
    post:
      operationId: confirmEvidenceUpload
      summary: Confirm direct evidence upload completion and trigger replica verification
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      responses:
        "200":
          description: Evidence confirmation and replica status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceConfirmResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Evidence storage is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /api/v1/devices:
    post:
      operationId: registerMobileDevice
      summary: Register or refresh a mobile device binding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XDeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationRequest"
      responses:
        "200":
          description: Registered device binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegistrationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/passkey/register/start:
    post:
      summary: Start passkey registration
      description: Starts registration with either a bootstrap credential or an authenticated bearer session adding a device.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegisterStartRequest"
      responses:
        "200":
          description: Registration ceremony challenge.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyRegisterStartResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/auth/passkey/register/finish:
    post:
      summary: Finish passkey registration
      description: Finishes a bootstrap-linked registration ceremony or an authenticated add-device ceremony.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegisterFinishRequest"
      responses:
        "201":
          description: Passkey registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyRegisterFinishResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/auth/passkey/login/start:
    post:
      summary: Start passkey login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginStartRequest"
      responses:
        "200":
          description: Authentication ceremony challenge.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyLoginStartResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/passkey/login/finish:
    post:
      summary: Finish passkey login
      description: Verifies the passkey assertion and issues an ES256 access JWT plus an opaque rotating refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginFinishRequest"
      responses:
        "200":
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/token/refresh:
    post:
      summary: Rotate refresh token
      description: Rotates an opaque refresh token; reuse of an old token revokes the whole family and returns 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      summary: Logout and revoke refresh-token family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh-token family revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Client-stable device identifier. The server stores only a SHA-256 hash.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Forbidden:
      description: Principal lacks role or branch authority.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    NotFound:
      description: Resource was not found in branch scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Conflict:
      description: State conflict or illegal transition.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
  schemas:
    Uuid:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    Date:
      type: string
      format: date
    PriorityLevel:
      type: string
      enum: [P1, P2, P3, OUTSOURCE, UNSET]
    WorkOrderStatus:
      type: string
      enum:
        - RECEIVED
        - UNASSIGNED
        - ASSIGNED
        - IN_PROGRESS
        - REPORT_SUBMITTED
        - ADMIN_REVIEW
        - FINAL_COMPLETED
        - REJECTED
        - ON_HOLD
        - DELAYED
        - TEMPORARY_ACTION
        - PART_WAITING
        - EQUIPMENT_IN_USE
        - REVISIT_REQUIRED
        - ARCHIVED
        - CANCELLED
    WorkResultType:
      type: string
      enum: [COMPLETED, TEMPORARY_ACTION, INCOMPLETE, REVISIT_REQUIRED, UNKNOWN]
    AssignmentRole:
      type: string
      enum: [PRIMARY, SECONDARY]
    AttachmentStage:
      type: string
      enum: [REQUEST, BEFORE, DURING, AFTER, REPORT, OUTSOURCE_RESULT]
    SyncOperationKind:
      type: string
      enum: [WORK_ORDER_START, WORK_ORDER_REPORT]
    SyncOperationStatus:
      type: string
      enum: [APPLIED, FAILED]
    DevicePlatform:
      type: string
      enum: [ios, android]
    WormReplicaStatus:
      type: string
      enum: [PENDING, VERIFIED, FAILED]
    DailyPlanStatus:
      type: string
      enum: [DRAFT, REQUESTED, APPROVED, REJECTED, FINAL_CONFIRMED]
    TargetChangeDecision:
      type: string
      enum: [APPROVED, REJECTED]
    CreateWorkOrderRequest:
      type: object
      required: [branch_id, management_no, symptom]
      properties:
        branch_id:
          $ref: "#/components/schemas/Uuid"
        management_no:
          type: string
        symptom:
          type: string
        customer_request:
          type: string
        target_due_at:
          $ref: "#/components/schemas/Timestamp"
    AssignWorkOrderRequest:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          minItems: 1
          items:
            type: object
            required: [mechanic_id, role]
            properties:
              mechanic_id:
                $ref: "#/components/schemas/Uuid"
              role:
                $ref: "#/components/schemas/AssignmentRole"
        admin_approver_id:
          $ref: "#/components/schemas/Uuid"
        executive_approver_id:
          $ref: "#/components/schemas/Uuid"
    SubmitReportRequest:
      type: object
      required: [result_type, diagnosis, action_taken]
      properties:
        result_type:
          $ref: "#/components/schemas/WorkResultType"
        diagnosis:
          type: string
        action_taken:
          type: string
    TargetChangeRequest:
      type: object
      required: [requested_target_due_at, reason]
      properties:
        requested_target_due_at:
          $ref: "#/components/schemas/Timestamp"
        reason:
          type: string
    ReviewTargetChangeRequest:
      type: object
      required: [decision]
      properties:
        decision:
          $ref: "#/components/schemas/TargetChangeDecision"
        memo:
          type: string
    CreateDailyPlanRequest:
      type: object
      required: [branch_id, mechanic_id, plan_date, items]
      properties:
        branch_id:
          $ref: "#/components/schemas/Uuid"
        mechanic_id:
          $ref: "#/components/schemas/Uuid"
        plan_date:
          $ref: "#/components/schemas/Date"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [description]
            properties:
              work_order_id:
                $ref: "#/components/schemas/Uuid"
              description:
                type: string
    ReviewDailyPlanRequest:
