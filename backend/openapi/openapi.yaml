      - request_version
      - charge_version
      - start_date
      - end_date
      - reason
      - status
      - decided_by
      - decided_at
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        branch_id:
          $ref: '#/components/schemas/Uuid'
        requester_user_id:
          $ref: '#/components/schemas/Uuid'
        subject_employee_id:
          $ref: '#/components/schemas/Uuid'
        leave_type:
          type: string
          enum: [annual, half_day]
