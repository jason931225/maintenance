    DocumentVersion:
      type: object
      description: One immutable version of an in-console office document. The storage key is internal and never returned.
      required: [id, documentRef, versionNo, contentHash, fileType, byteSize, createdAt]
      properties:
        id:
          type: string
          format: uuid
        documentRef:
          type: string
          minLength: 1
          maxLength: 200
        versionNo:
