        is a 404 (RLS hides another tenant's customer). The name is required and
        bounded; optional address / WGS84 coordinates / contact fields follow the
        same ranges and length bounds as PATCH /api/v1/sites/{id} (a one-sided
        coordinate or an over-long value is a 422). A duplicate site name under the
        same customer is a 409. The created site is returned so it appears in the
        고객·현장 list immediately.
      security:
      - bearerAuth: []
      requestBody:
        required: true
