          type: string
        permission_level:
          type: string
          enum:
          - request_only
          - limited
          - allow
        source_type:
          type: string
          enum:
          - system_role
          - custom_role
        source_key:
          type: string
        source_label:
          type: string
    PolicyAssignmentPreviewResponse:
