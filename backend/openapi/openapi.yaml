      security:
      - bearerAuth: []
      parameters:
      - name: period
        in: query
        required: true
        schema:
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}\.\.[0-9]{4}-[0-9]{2}-[0-9]{2}$
        example: 2026-06-01..2026-07-01
        description: Inclusive start date and exclusive end date in UTC day boundaries.
      - name: scope
        in: query
        required: false
        schema:
          type: string
          default: company
        examples:
          company:
            value: company
          region:
            value: region:00000000-0000-0000-0000-000000000000
          branch:
            value: branch:00000000-0000-0000-0000-000000000000
          technician:
            value: technician:00000000-0000-0000-0000-000000000000
