      description: Lists workflow runs across the org, filterable by status (including FAILED/DEAD_LETTERED for dead-letter
        visibility) and keyset-paginated over (updated_at, id). Requires workflow-manage authority.
      security:
      - bearerAuth: []
      parameters:
