    LeaveCreateRequest:
      type: object
      description: >-
        A self-service leave-request filing. The subject employee and branch are
        NOT accepted here — they are resolved from the authenticated caller.
      additionalProperties: false
      required:
        - idempotency_key
        - leave_type
        - start_date
        - end_date
        - reason
      properties:
        idempotency_key:
          type: string
          format: uuid
          description: Stable client submission id. Reuse it only to retry the same canonical client intent after an unknown or lost response.
        leave_type:
          type: string
          enum: [annual, half_day]
          description: Full-day or partial-day intent; quantity is resolved only from evidence.
        partial_day_period:
          type: string
          enum: [am, pm]
          nullable: true
          description: Required exactly when leave_type is half_day.
        start_date:
          type: string
          format: date
          description: YYYY-MM-DD. A half-day request must use the same start and end date.
        end_date:
          type: string
          format: date
        reason:
          type: string
          minLength: 1
          maxLength: 500
    ProjectionRequest:
      type: object
      required: [series, horizon, kind]
      properties:
        series:
          type: array
          description: Ordered historical values, oldest first (min 3).
          items:
            type: number
            format: double
          minItems: 3
        horizon:
          type: integer
          format: int32
          minimum: 1
          maximum: 3650
          description: Number of forward steps to project.
        kind:
          type: string
          enum: [money, percent]
          description: >
            Composition rule. `money` = multiplicative (ratio returns, floored
            at 0); `percent` = additive (arithmetic differences).
    ProjectionResult:
      type: object
      required: [point_estimate, ci95_low, ci95_high, cvar95, assumptions]
      properties:
        point_estimate:
          type: number
          format: double
          description: Deterministic central projection.
        ci95_low:
          type: number
          format: double
          description: 2.5th percentile of terminal outcomes.
        ci95_high:
          type: number
          format: double
          description: 97.5th percentile of terminal outcomes.
        cvar95:
          type: number
          format: double
          description: EVT-refined expected shortfall of the worst 5% of outcomes.
        assumptions:
          $ref: '#/components/schemas/ProjectionAssumptions'
    ProjectionAssumptions:
      type: object
      required: [ewma_volatility, student_t_nu, drift, simulations, seed]
      properties:
        ewma_volatility:
          type: number
          format: double
          description: Final EWMA volatility σ.
        student_t_nu:
          type: number
          format: double
          description: Student-t degrees of freedom (4).
        drift:
          type: number
          format: double
          description: Estimated per-step drift μ.
        simulations:
          type: integer
          format: int32
          description: Monte-Carlo path count.
        seed:
          type: integer
          format: int64
          description: RNG seed (echoed to prove determinism).
    ConsoleRouteTelemetryEventKind:
      type: string
      enum:
      - route_selection
      - rum_error
      - rum_perf
    ConsoleRouteSurface:
      type: string
      enum:
      - console
      - legacy
    ConsoleRouteTelemetryRequest:
      type: object
      required:
      - event_kind
      - route_surface
      - route_path
      - release_cycle
      properties:
        event_kind:
          $ref: '#/components/schemas/ConsoleRouteTelemetryEventKind'
        route_surface:
          $ref: '#/components/schemas/ConsoleRouteSurface'
        route_path:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^/[A-Za-z0-9._:/-]*$
          description: Cardinality-safe route template; never include raw URL parameters, queries, or fragments.
        release_cycle:
          type: string
          minLength: 1
          maxLength: 80
          pattern: ^[A-Za-z0-9._:-]+$
        duration_ms:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          maximum: 600000
        error_name:
          type:
          - string
          - 'null'
          minLength: 1
          maxLength: 80
          pattern: ^[A-Za-z0-9._:-]+$
    ConsoleRouteTelemetryAccepted:
      type: object
      required:
      - accepted
      properties:
        accepted:
          type: boolean
    ObjectHead:
      type: object
      description: Compact, kind-agnostic head for any object. exists=false means the object is absent OR outside the
        caller's scope (indistinguishable, by design). Carries no route/URL — objectRegistry (frontend) is the sole
        kind->URL authority.
      required:
      - kind
      - id
      - exists
      properties:
        kind:
          type: string
        id:
          type: string
        code:
          type: string
          nullable: true
          description: Canonical issued code if the kind has one (e.g. work-order request_no); absent otherwise.
        title:
          type: string
          nullable: true
          description: Human display label if available.
        status:
          type: string
          nullable: true
          description: Domain status string if available.
        exists:
          type: boolean
    CreateObjectLinkRequest:
      type: object
      description: Request to create a directed link between two known objects.
      required:
      - src_kind
      - src_id
      - dst_kind
      - dst_id
      - link_type
      properties:
        src_kind:
          type: string
          description: Source object kind slug (must be a known object type).
        src_id:
          type: string
          description: Source object id/reference (≤200 chars).
        dst_kind:
          type: string
          description: Destination object kind slug (must be a known object type).
        dst_id:
          type: string
          description: Destination object id/reference (≤200 chars).
        link_type:
          type: string
          description: Relationship label slug (e.g. authorized_by, relates_to, blocks).
    ObjectLinkResponse:
      type: object
      required:
      - id
      - src_kind
      - src_id
      - dst_kind
      - dst_id
      - link_type
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        src_kind:
          type: string
        src_id:
          type: string
        dst_kind:
          type: string
        dst_id:
          type: string
        link_type:
          type: string
        created_by:
          $ref: '#/components/schemas/Uuid'
          nullable: true
        created_at:
          $ref: '#/components/schemas/Timestamp'
    ObjectLinksListResponse:
      type: object
      description: Links touching one object, split by direction.
      required:
      - outgoing
      - incoming
      properties:
        outgoing:
          type: array
          description: Links where the queried object is the source.
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
        incoming:
          type: array
          description: Links where the queried object is the destination.
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
    ObjectGraphResponse:
      type: object
      description: The bounded, caller-visible neighborhood of an object, walked over object_links. Unresolvable
        nodes are omitted entirely (never returned as stubs), and edges touching an omitted node are omitted too.
      required:
      - nodes
      - edges
      - truncated
      properties:
        nodes:
          type: array
          description: Every object the caller can resolve, each passed through the same visibility guard as resolveObject.
          items:
            $ref: '#/components/schemas/ObjectHead'
        edges:
          type: array
          description: Links between resolved nodes (the induced subgraph over the visible node set).
          items:
            $ref: '#/components/schemas/ObjectLinkResponse'
        truncated:
          type: boolean
          description: True if the node cap was hit before the walk exhausted the requested depth.
    SearchResponse:
      type: object
      description: Global search hits, each an ObjectHead scoped identically to resolveObject (a hit the caller could
        not resolve never appears). Grouped by kind; exists is always true for a hit.
      required:
      - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ObjectHead'
    ObjectTypeResponse:
      type: object
      description: An object-type registry row plus the caller-visible active instance count.
      required:
      - kind
      - description
      - status
      - active_count
      properties:
        kind:
          type: string
        code_prefix:
          type: string
          nullable: true
          description: Canonical per-kind code prefix (e.g. AP-, CS-); absent for id/name-referenced kinds.
        description:
          type: string
        status:
          type: string
          description: Type lifecycle state (draft, active, archived).
          enum:
          - draft
          - active
          - archived
        active_count:
          type: integer
          format: int64
          description: Instances of this kind visible to the caller (same per-kind visibility as resolveObject).
    LinkTypeResponse:
      type: object
      description: A registered edge type (object-link relationship label).
      required:
      - link_type
      - description
      - status
      properties:
        link_type:
          type: string
        description:
          type: string
        status:
          type: string
          description: Edge-type lifecycle state (draft, active, archived).
          enum:
          - draft
          - active
          - archived
    CreateSeriesRequest:
      type: object
      description: Create a series and attach its first instance.
      required:
      - label
      - kind
      - id
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 200
          description: Human label for the series (1-200 chars).
        kind:
