      - id
      properties:
        kind:
          type: string
          description: Instance object kind slug.
        id:
          type: string
          maxLength: 200
          description: Instance object id/reference (≤200 chars).
    AttachInstanceAck:
      type: object
      required:
      - attached
      properties:
        attached:
          type: boolean
    SeriesHead:
      type: object
      required:
      - id
      - code
      - label
