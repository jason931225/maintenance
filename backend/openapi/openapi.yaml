    get:
      operationId: getObjectType
      summary: Get an object type definition
      description: Returns the object type definition plus its property/link/action/analytic children. An optional version pins an
        immutable, content-addressed published schema version; absent returns the head.
      tags:
      - Ontology
      security:
      - bearerAuth: []
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      - name: version
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
