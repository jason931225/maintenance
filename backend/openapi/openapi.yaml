      summary: File a self-service 연차/반차 request (본인 연차 신청)
      description: >-
        The caller files a leave request for THEMSELVES. `subject_employee_id`
        and the routing `branch_id` are resolved server-side from the caller's
        own account and employee.home_branch_id — never from input — so a
        caller can only file for their own employee record. No directory feature
        is required (filing one's own leave is a base employee capability); the
        gate is an active account linked to an active employee; an unlinked or
        inactive subject is denied with 403. Missing home-branch authority returns the
        stable 409 `leave_home_branch_review_required`. The request preserves
        date and AM/PM intent in `review_required`; no calendar-day or fixed-half
        quantity is invented. A separate resolver pins authoritative evidence
        before any approval can move the ledger. Modern clients generate one
        `idempotency_key` per user intent and reuse it after an unknown or lost
        response. The same key and canonical client intent return the original
        request without another mutation or audit; a different intent conflicts.
