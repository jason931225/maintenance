  /api/v1/search:
    get:
      operationId: searchObjects
      summary: Global object + person search (⌘K palette, compose picker, explore, token dropdowns)
      description: 'Searches the object kinds resolveObject serves that carry a human-searchable name/code (work_order,
        equipment, support_ticket, org_unit) plus the person directory (messenger member semantics: active + shared
        branch). Every hit is scoped identically to resolveObject: the WorkOrderReadAll feature gate for
        work_order/equipment (a caller lacking it gets zero hits of those kinds), and the branch-visibility guard for
        every branch-scoped kind — a hit the caller could not resolve never appears. Org-isolated under RLS.
        Deny-by-omission: never a 403 for an out-of-scope kind, just absence.'
      security:
      - bearerAuth: []
      parameters:
      - name: q
        in: query
        required: true
        description: Case-insensitive substring to match against names/codes (≤200 chars; empty returns no hits).
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Max hits per object kind, clamped 1-50 (default 20).
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Caller-visible hits across kinds and the person directory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/objects/{kind}/{id}:
    get:
      operationId: resolveObject
      summary: Resolve any object to a compact head (code, title, status)
      description: 'Dereferences a (kind, id) pair to an ObjectHead so any object chip/code can be rendered and navigated.
        Reuses each domain''s tenant + branch scoping: an object outside the caller''s org/branch scope resolves identically
        to a missing id (exists=false), the deny-by-omission guarantee. A well-formed but unregistered kind returns 404.
        Routing is the frontend objectRegistry''s responsibility; this endpoint never returns a route/URL.'
      security:
      - bearerAuth: []
      parameters:
      - name: kind
        in: path
        required: true
        description: Object kind slug (e.g. work_order, equipment, support_ticket, org_unit, person, approval_run).
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The resolved object head (exists=false when not visible/absent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectHead'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/objects/{kind}/{id}/graph:
    get:
      operationId: getObjectGraph
      summary: Walk the bounded object-link neighborhood of an object
      description: 'Bounded level-by-level walk over object_links up to `depth` hops (clamped 1-5), org-scoped under
        RLS. Every returned node passed the SAME per-kind visibility guard as resolveObject; deny-by-omission governs
        discovery itself here, not just display: a node the caller cannot resolve is OMITTED (never returned as a
        stub) and the walk never expands through it, so an edge touching an omitted node is omitted too. `truncated`
        is true when the response was cut short by the node cap before `depth` was exhausted.'
      security:
      - bearerAuth: []
      parameters:
      - name: kind
        in: path
        required: true
        description: Root object kind slug.
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Root object id.
        schema:
          type: string
      - name: depth
        in: query
        required: false
        description: Walk depth in hops, clamped to 1-5 (default 1).
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: The bounded neighborhood of the root object (empty if the root itself does not resolve).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectGraphResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
