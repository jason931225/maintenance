      summary: Create a generic, audited link between two objects
      description: Creates one directed edge (src -> dst) of a given link_type between two known object kinds. Both kinds
        must exist in the object-type registry. An identical link is rejected with 409. Audited via with_audit.
      security:
      - bearerAuth: []
      requestBody:
        required: true
