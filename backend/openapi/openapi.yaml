        otp:
          type: string
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    EnrollHandoffRequest:
      type: object
      description: Cross-device passkey-enrollment handoff request. Carries NO user/org — those come from the verified access
        token, so a caller can only mint a handoff for itself. `step_up` is REQUIRED only when the caller already has a passkey
        (adding a device); a mid-onboarding caller (zero passkeys) omits it.
      properties:
        step_up:
          $ref: '#/components/schemas/PasskeyStepUpAssertion'
    EnrollHandoffResponse:
      type: object
      description: The minted single-use, short-lived passkey-enrollment code (returned once, only its hash is stored) plus
        the ready-to-encode enrollment URL the frontend renders as a QR. The phone opens `enroll_url`, redeems `otp` via the
        first-sign-in path, enrolls a platform passkey, then approves the paired desktop poll token when `desktop_approve`
        is present in the URL fragment.
      required:
      - otp
      - expires_at
      - enroll_url
      - poll_token
      properties:
        otp:
          type: string
          description: The single-use enrollment handoff code.
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        enroll_url:
          type: string
          description: The console enrollment URL carrying the handoff code in the fragment (`{origin}/login#otp=<code>&desktop_approve=<approve-token>`),
            to be rendered as a QR and scanned on a phone.
        poll_token:
          type: string
          description: Desktop-only poll token paired to the phone enrollment QR. The desktop polls the device-login endpoint
            with this token and receives its own session once the phone enrollment approves the handoff.
    DeviceLoginStartResponse:
      type: object
      required:
      - poll_token
      - approve_url
      - expires_at
      properties:
        poll_token:
          type: string
          description: Desktop-only token used to poll for approval.
        approve_url:
          type: string
          description: Phone QR URL carrying the approve token in the URL fragment.
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    DeviceLoginPollRequest:
      type: object
      required:
      - poll_token
      properties:
        poll_token:
          type: string
    DeviceLoginPollResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - pending
          - approved
          - expired
        access_token:
          type: string
          nullable: true
        refresh_token:
          type: string
          nullable: true
          description: Null in web cookie transport; present in body transport.
        token_type:
          type: string
          nullable: true
          enum:
          - Bearer
        refresh_expires_at:
          type: string
          format: date-time
          nullable: true
        requires_passkey_setup:
          type: boolean
          nullable: true
          description: Approved desktop QR sessions are passkey-authenticated and return false.
    DeviceLoginApproveRequest:
      type: object
      required:
      - approve_token
      - ceremony_id
      - credential
      properties:
        approve_token:
          type: string
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    DeviceLoginApproveSessionRequest:
      type: object
      required:
      - approve_token
      properties:
        approve_token:
          type: string
    PrivacyConsentAcceptRequest:
      type: object
      description: Required initial-login Korean privacy collection/use and service-terms acknowledgement. These required
        agreements are explicit booleans so the client cannot bundle them into one generic "agree all" flag. Optional marketing
        consent and GPS/location consent are not collected by this request.
      required:
      - policy_version
      - privacy_collection
      - terms_of_service
      properties:
        policy_version:
          type: string
          description: Required privacy/terms notice version being accepted.
        privacy_collection:
          type: boolean
          description: Required acknowledgement of collection/use purpose, items, retention period, refusal right, and refusal
            consequence.
        terms_of_service:
          type: boolean
          description: Required acknowledgement of service terms, security controls, and audit-log processing needed to operate
            the console.
    PrivacyConsentStatusResponse:
      type: object
      description: Current required first-login privacy/terms consent status.
      required:
      - policy_version
      - accepted
      properties:
        policy_version:
          type: string
          description: Current required privacy/terms notice version.
        accepted:
          type: boolean
          description: True when the authenticated user has accepted the current version.
        accepted_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp of the latest acceptance for the current version.
    PasskeyLoginStartResponse:
      type: object
      required:
      - ceremony_id
      - challenge
      - expires_at
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        challenge:
          type: object
          additionalProperties: true
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    PasskeyLoginFinishRequest:
      type: object
      required:
      - ceremony_id
      - credential
      properties:
        ceremony_id:
          $ref: '#/components/schemas/Uuid'
        credential:
          type: object
          additionalProperties: true
    RefreshTokenRequest:
      type: object
      description: Refresh/logout request body. `refresh_token` is OPTIONAL because the web transport carries the token in
        the HttpOnly `mnt_refresh` cookie (sent automatically by the browser) and the body is empty; mobile clients send the
        token here.
      properties:
        refresh_token:
          type: string
          nullable: true
    LogoutRequest:
      $ref: '#/components/schemas/RefreshTokenRequest'
    TokenPairResponse:
      type: object
      required:
      - access_token
      - token_type
      - refresh_expires_at
      - requires_passkey_setup
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          nullable: true
          description: The opaque rotating refresh token in the body transport (mobile). It is null in the cookie transport
            (web), where the token is set as an HttpOnly `mnt_refresh` cookie and must never reach web JS.
        token_type:
          type: string
          enum:
          - Bearer
        refresh_expires_at:
