      responses:
        '200': { description: committed, content: { application/json: { schema: { $ref: '#/components/schemas/LifecycleOutcome' } } } }
        '403': { description: gate denied / unconfigured edge }
        '409': { description: illegal FSM edge or concurrent state change }
        '404': { description: instance not found (RLS-scoped) }

