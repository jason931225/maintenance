[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[patch.crates-io]
# Temporary RUSTSEC-2026-0194/RUSTSEC-2026-0195 unblock: upstream calamine
# 0.35.0 and umya-spreadsheet 3.0.0 still constrain quick-xml below the fixed
# 0.41 line. The audited source lives under the repository's Rust third-party
# boundary so Cargo, Reindeer, Buck2, and the image build consume one copy.
# Remove these patches once crates.io can resolve quick-xml >=0.41 without
# local compatibility shims.
calamine = { path = "../third-party/rust/vendor/calamine-0.35.0-quickxml41" }
quick-xml = { path = "../third-party/rust/vendor/quick-xml-0.41.0-compat" }
umya-spreadsheet = { path = "../third-party/rust/vendor/umya-spreadsheet-3.0.0-quickxml41" }
