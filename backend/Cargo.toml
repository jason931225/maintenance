[workspace]
resolver = "3"
# Member globs are added as their first crate lands (an unmatched glob fails the build):
#   "crates/<domain>/*"  mnt-<domain>-{domain,application,adapter-postgres,rest,worker}
#   "crates/platform/*"  mnt-platform-{auth,authz,storage,push,email,realtime,excel}
#   "ci/gates/*"         CI gate binaries (layer-boundary, audit-coverage, ...)
#   "app"                mnt-app composition root
members = [
  "app",
  "crates/action-inbox/*",
  "crates/kernel/*",
  "crates/benefit/*",
  "crates/compliance/*",
  "crates/docs/*",
  "crates/financial/*",
  "crates/finance-gl/*",
  "crates/governance/*",
  "crates/identity/*",
  "crates/inspection/*",
  "crates/inventory/*",
  "crates/logistics/*",
  "crates/ontology/*",
  "crates/registry/*",
  "crates/reporting/*",
  "crates/sales/*",
  "crates/support/*",
  "crates/workorder/*",
  "crates/workflow/*",
  "crates/messenger/*",
  "crates/notifications/*",
  "crates/notices/*",
  "crates/inbox/*",
  "crates/leave/*",
  "crates/todos/*",
  "crates/comms/*",
  "crates/payroll/*",
  "crates/production/*",
  "crates/policy/*",
  "crates/erp/*",
  "crates/platform/*",
  "crates/analytics-quant/*",
  "ci/gates/*",
]

[workspace.package]
edition = "2024"
rust-version = "1.96"
license = "LicenseRef-Proprietary"
publish = false

[workspace.dependencies]
# Versions verified live against crates.io at add time (project mandate:
# never from training data). Re-verify on every new `cargo add`.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
time = { version = "0.3", features = ["serde", "serde-well-known", "formatting", "parsing", "macros"] }
# Versions verified live against crates.io 2026-06-12: sqlx 0.9.0, tokio 1.52.3
sqlx = { version = "0.9.0", default-features = false, features = [
    "runtime-tokio",
    "postgres",
    "uuid",
    "time",
    "json",
    "migrate",
    "macros",
] }
tokio = { version = "1.52.3", default-features = false, features = ["rt-multi-thread", "macros"] }
# Versions verified live against crates.io 2026-06-12:
# reqwest 0.13.4, hmac 0.13.0, sha2 0.11.0, hex 0.4.3,
# url 2.5.8, bytes 1.11.1.
reqwest = { version = "0.13.4", default-features = false }
hmac = "0.13.0"
sha2 = "0.11.0"
hex = "0.4.3"
url = "2.5.8"
bytes = "1.11.1"
# Version verified live against crates.io 2026-06-12: jsonwebtoken 10.4.0.
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["rust_crypto", "use_pem"] }
# apalis 1.0.0-rc.9, apalis-postgres 1.0.0-rc.8, apalis-sql 1.0.0-rc.9.
# No stable apalis 1.0.0 release was available at verification time.
apalis = { version = "=1.0.0-rc.9" }
apalis-postgres = { version = "=1.0.0-rc.8" }
apalis-sql = { version = "=1.0.0-rc.9" }
# Version verified live against crates.io 2026-06-12: calamine 0.35.0
calamine = { version = "0.35.0", features = ["dates"] }
# Magic-number file-type sniffing for evidence content re-validation (the
# downloaded staging bytes are authoritative; the declared content_type is
# advisory). Pure-Rust, no extra runtime binary. Version verified live against
# crates.io 2026-06-23: infer 0.19.0.
infer = { version = "0.19.0", default-features = false, features = ["std"] }
# Cron parsing/evaluation for workflow_schedules (BE-AUTO). Versions verified
# live against crates.io 2026-07-08: croner 3.0.1, chrono 0.4.45,
# chrono-tz 0.10.4 (croner evaluates over chrono types; chrono-tz supplies the
# IANA timezone the schedule's cron pattern is interpreted in — 매일 아침 9시
# must mean 09:00 KST, not UTC). chrono was already in the lockfile
# transitively; `time` stays the workspace-wide datetime type and chrono is
# confined to the cron boundary.
croner = "3.0.1"
chrono = { version = "0.4.45", default-features = false, features = ["std"] }
chrono-tz = "0.10.4"
# Versions verified live against crates.io 2026-06-12:
# axum 0.8.9, tower-http 0.7.0, tower 0.5.3, http 1.4.2,
# tracing 0.1.44, tracing-subscriber 0.3.23,
# tracing-opentelemetry 0.33.0, opentelemetry 0.32.0,
# opentelemetry_sdk 0.32.1, opentelemetry-otlp 0.32.0.
axum = "0.8.9"
tower-http = "0.7.0"
tower = "0.5.3"
http = "1.4.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
tracing-opentelemetry = "0.33.0"
opentelemetry = "0.32.0"
opentelemetry_sdk = "0.32.1"
opentelemetry-otlp = "0.32.0"
# Prometheus metrics: the `metrics` facade records into a process-global
# recorder; metrics-exporter-prometheus renders the /metrics exposition. Versions
# verified live against the crates.io index. default-features off: we only render
# (no built-in HTTP listener / push-gateway, which would pull extra hyper deps).
metrics = "0.24.6"
metrics-exporter-prometheus = { version = "0.18.3", default-features = false }
# Outbound SMTP for transactional email (OCI Email Delivery relay). Version
# verified live against crates.io 2026-06-22: lettre 0.11.22 (latest stable).
# The workspace ships NO TLS backend (reqwest is default-features = false; no
# rustls/native-tls elsewhere), so lettre MUST bring its own — we select the
# bundled rustls stack via `tokio1-rustls-tls` and disable defaults so no
# system-native TLS (openssl) is pulled in.
lettre = { version = "0.11.22", default-features = false, features = [
    "tokio1-rustls-tls",
    "builder",
    "smtp-transport",
] }
# Webmail credential cipher (envelope AEAD for SMTP/IMAP passwords at rest).
# Versions verified live against the crates.io index 2026-06-23:
#   chacha20poly1305 0.10.1, secrecy 0.10.3, zeroize 1.9.0, base64 0.22.1.
# `chacha20poly1305` 0.10.1 builds on `aead` 0.5, whose `OsRng` (the bundled
# `getrandom` feature, on by default) is the version-matched CSPRNG — we use it
# for per-row DEK + nonce generation rather than adding the standalone `rand`
# crate (rand 0.10 would pull a SECOND, incompatible `rand_core` major). No
# async-imap / tokio-rustls is added in this batch (those land in B-mail-3).
chacha20poly1305 = "0.10.1"
secrecy = "0.10.3"
zeroize = "1.9.0"
base64 = "0.22.1"
subtle = "2.6.1"
# SSRF guard for outbound webmail connections (B-mail-2). Versions verified live
# against the crates.io index 2026-06-23: hickory-resolver 0.26.1 (latest
# stable), ipnet 2.12.0 (latest stable). The resolver gives us a resolve-once,
# validate-the-IP, then dial-the-pinned-IP path (DNS-rebinding safe); ipnet
# matches the resolved IP against the RFC1918 / loopback / link-local / ULA /
# CGNAT denylist. hickory-resolver brings its own tokio runtime integration and
# does NOT add a second rustls stack (it speaks plain UDP/TCP DNS by default).
hickory-resolver = "0.26.1"
ipnet = "2.12.0"
# Inbound IMAP sync (B-mail-3). Versions verified live against the crates.io
# index 2026-06-23: async-imap 0.11.2, mail-parser 0.11.4, tokio-rustls 0.26.4,
# rustls 0.23 (workspace already resolves 0.23.x via lettre's tokio1-rustls-tls),
# webpki-roots 1.0.8, futures 0.3.32.
#
# R1 SINGLE-STACK GATE: `async-imap` is TLS-AGNOSTIC — it speaks IMAP over any
# `tokio::io::AsyncRead + AsyncWrite` (feature `runtime-tokio`, default off so
# `async-std` is never pulled). We supply the TLS layer ourselves with
# `tokio-rustls` 0.26 on `rustls` 0.23 + the `ring` provider — the EXACT rustls
# major/minor + ring that `lettre 0.11.22`'s `tokio1-rustls-tls` already pulls,
# so `cargo tree -d` stays single-stack (one rustls, one ring, no native-tls /
# openssl). `mail-parser` is the inbound MIME parser; both appear ONLY in
# `mnt-comms-adapter-imap`.
async-imap = { version = "0.11.2", default-features = false, features = ["runtime-tokio"] }
mail-parser = "0.11.4"
tokio-rustls = { version = "0.26.4", default-features = false, features = ["ring", "tls12"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
webpki-roots = "1.0.8"
futures = { version = "0.3.32", default-features = false, features = ["std"] }

