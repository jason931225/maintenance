mnt-dispatch-adapter-postgres = { path = "crates/dispatch/adapter-postgres" }
mnt-dispatch-rest = { path = "crates/dispatch/rest" }
mnt-dispatch-worker = { path = "crates/dispatch/worker" }
mnt-platform-db = { path = "crates/platform/db" }
mnt-platform-auth = { path = "crates/platform/auth" }
mnt-platform-auth-rest = { path = "crates/platform/auth-rest" }
mnt-platform-authz = { path = "crates/platform/authz" }
mnt-platform-realtime = { path = "crates/platform/realtime" }
mnt-platform-storage = { path = "crates/platform/storage" }
