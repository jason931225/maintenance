[workspace]
resolver = "3"
# Member globs are added as their first crate lands (an unmatched glob fails the build):
#   "crates/<domain>/*"  mnt-<domain>-{domain,application,adapter-postgres,rest,worker}
#   "crates/platform/*"  mnt-platform-{auth,authz,storage,push,realtime,excel}
#   "ci/gates/*"         CI gate binaries (layer-boundary, audit-coverage, ...)
#   "app"                mnt-app composition root
members = [
  "app",
  "crates/kernel/*",
  "crates/compliance/*",
  "crates/financial/*",
  "crates/identity/*",
  "crates/registry/*",
  "crates/reporting/*",
  "crates/workorder/*",
  "crates/messenger/*",
  "crates/platform/*",
  "ci/gates/*",
]

[workspace.package]
edition = "2024"
rust-version = "1.96"
license = "LicenseRef-Proprietary"
publish = false

[workspace.dependencies]
# Versions verified live against crates.io at add time (project mandate:
# never from training data). Re-verify on every new `cargo add`.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
time = { version = "0.3", features = ["serde", "formatting", "parsing", "macros"] }
# Versions verified live against crates.io 2026-06-12: sqlx 0.9.0, tokio 1.52.3
sqlx = { version = "0.9.0", default-features = false, features = [
    "runtime-tokio",
    "postgres",
    "uuid",
    "time",
    "json",
    "migrate",
    "macros",
] }
tokio = { version = "1.52.3", default-features = false, features = ["rt-multi-thread", "macros"] }
# Versions verified live against crates.io 2026-06-12:
# reqwest 0.13.4, hmac 0.13.0, sha2 0.11.0, hex 0.4.3,
# url 2.5.8, bytes 1.11.1.
reqwest = { version = "0.13.4", default-features = false }
hmac = "0.13.0"
sha2 = "0.11.0"
hex = "0.4.3"
url = "2.5.8"
bytes = "1.11.1"
# Version verified live against crates.io 2026-06-12: jsonwebtoken 10.4.0.
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["rust_crypto", "use_pem"] }
# apalis 1.0.0-rc.9, apalis-postgres 1.0.0-rc.8, apalis-sql 1.0.0-rc.9.
# No stable apalis 1.0.0 release was available at verification time.
apalis = { version = "=1.0.0-rc.9" }
apalis-postgres = { version = "=1.0.0-rc.8" }
apalis-sql = { version = "=1.0.0-rc.9" }
# Version verified live against crates.io 2026-06-12: calamine 0.35.0
calamine = { version = "0.35.0", features = ["dates"] }
# Versions verified live against crates.io 2026-06-12:
# axum 0.8.9, tower-http 0.6.11, tower 0.5.3, http 1.4.2,
# tracing 0.1.44, tracing-subscriber 0.3.23,
# tracing-opentelemetry 0.33.0, opentelemetry 0.32.0,
# opentelemetry_sdk 0.32.1, opentelemetry-otlp 0.32.0.
axum = "0.8.9"
tower-http = "0.6.11"
tower = "0.5.3"
http = "1.4.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
tracing-opentelemetry = "0.33.0"
opentelemetry = "0.32.0"
opentelemetry_sdk = "0.32.1"
opentelemetry-otlp = "0.32.0"

mnt-kernel-core = { path = "crates/kernel/core" }
mnt-compliance-domain = { path = "crates/compliance/domain" }
mnt-compliance-application = { path = "crates/compliance/application" }
mnt-financial-domain = { path = "crates/financial/domain" }
mnt-financial-application = { path = "crates/financial/application" }
mnt-financial-adapter-postgres = { path = "crates/financial/adapter-postgres" }
mnt-financial-rest = { path = "crates/financial/rest" }
mnt-identity-application = { path = "crates/identity/application" }
mnt-registry-domain = { path = "crates/registry/domain" }
mnt-registry-application = { path = "crates/registry/application" }
mnt-reporting-domain = { path = "crates/reporting/domain" }
mnt-reporting-application = { path = "crates/reporting/application" }
mnt-reporting-adapter-postgres = { path = "crates/reporting/adapter-postgres" }
mnt-reporting-rest = { path = "crates/reporting/rest" }
mnt-registry-adapter-postgres = { path = "crates/registry/adapter-postgres" }
mnt-registry-rest = { path = "crates/registry/rest" }
mnt-workorder-domain = { path = "crates/workorder/domain" }
mnt-workorder-application = { path = "crates/workorder/application" }
mnt-workorder-adapter-postgres = { path = "crates/workorder/adapter-postgres" }
mnt-workorder-rest = { path = "crates/workorder/rest" }
mnt-messenger-domain = { path = "crates/messenger/domain" }
mnt-messenger-application = { path = "crates/messenger/application" }
mnt-messenger-adapter-postgres = { path = "crates/messenger/adapter-postgres" }
