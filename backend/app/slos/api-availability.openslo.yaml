apiVersion: openslo/v1
kind: SLO
metadata:
  name: mnt-api-availability
  displayName: MNT API availability
  labels:
    service: mnt-app-api
    tier: platform
spec:
  description: MNT API successful HTTP request ratio over a rolling 30 day window.
  service: mnt-app-api
  indicator:
    metadata:
      name: mnt-api-http-availability
      displayName: MNT API HTTP availability ratio
    spec:
      ratioMetric:
        counter: true
        good:
          metricSource:
            type: Prometheus
            spec:
              query: sum(rate(http_server_request_duration_seconds_count{service_name="mnt-app-api",http_response_status_code!~"5.."}[5m]))
        total:
          metricSource:
            type: Prometheus
            spec:
              query: sum(rate(http_server_request_duration_seconds_count{service_name="mnt-app-api"}[5m]))
  timeWindow:
    - duration: 30d
      isRolling: true
  budgetingMethod: Occurrences
  objectives:
    - displayName: 99.5% successful requests over 30d
      target: 0.995
