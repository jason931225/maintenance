[dev-dependencies]
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8", "pem"] }
tokio = { workspace = true, features = ["io-util", "net", "macros", "rt-multi-thread"] }
tower = { workspace = true, features = ["util"] }
webauthn-authenticator-rs = { version = "0.5.5", features = ["softpasskey"] }
webauthn-rs = { version = "0.5.5", features = ["danger-allow-state-serialisation"] }

[lints]
workspace = true
