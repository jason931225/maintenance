[package]
name = "mnt-app"
version = "0.1.0"
description = "Composition root binary for the maintenance FSM backend."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
default-run = "mnt-app"

[[bin]]
name = "mnt-app"
path = "src/main.rs"

# Cedar/PBAC parity evidence: read-only aggregation of recorded shadow parity
# observations (`authz.cedar_pbac_parity` audit rows) into per-site agree/disagree
# totals + concrete divergent cases. Promotion gate reads this; no REST surface.
[[bin]]
name = "mnt-cedar-parity-report"
path = "src/bin/mnt_cedar_parity_report.rs"

[lib]
name = "mnt_app"
path = "src/lib.rs"

[features]
# Local role-switch dev-auth endpoint. NOT in `default` (there is no `default`
# key here, so cargo's implicit default feature set is empty) and MUST NEVER be
# added to one — `mnt-gate-dev-auth-absence` asserts this via `cargo metadata`
# and is wired into CI as a blocking gate.
dev-auth = ["mnt-platform-auth-rest/dev-auth"]

[dependencies]
axum = { workspace = true }
calamine = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
croner = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
hex = { workspace = true }
mnt-comms-adapter-imap = { workspace = true }
mnt-comms-adapter-postgres = { workspace = true }
mnt-comms-application = { workspace = true }
mnt-comms-credential-cipher = { workspace = true }
mnt-comms-rest = { workspace = true }
mnt-compliance-adapter-postgres = { workspace = true }
mnt-compliance-rest = { workspace = true }
mnt-erp-domain = { workspace = true }
mnt-integrity = { workspace = true }
mnt-financial-adapter-postgres = { workspace = true }
mnt-financial-rest = { workspace = true }
mnt-identity-adapter-postgres = { workspace = true }
mnt-identity-rest = { workspace = true }
mnt-inspection-adapter-postgres = { workspace = true }
mnt-inspection-rest = { workspace = true }
mnt-support-adapter-postgres = { workspace = true }
mnt-support-application = { workspace = true }
mnt-support-domain = { workspace = true }
mnt-support-rest = { workspace = true }
mnt-sales-adapter-postgres = { workspace = true }
mnt-sales-rest = { workspace = true }
mnt-kernel-core = { workspace = true }
mnt-messenger-adapter-postgres = { workspace = true }
mnt-messenger-rest = { workspace = true }
mnt-notifications-adapter-postgres = { workspace = true }
mnt-notifications-rest = { workspace = true }
mnt-inbox-adapter-postgres = { workspace = true }
mnt-inbox-rest = { workspace = true }
mnt-todos-adapter-postgres = { workspace = true }
mnt-todos-rest = { workspace = true }
mnt-payroll-domain = { workspace = true }
mnt-platform-audit-chain = { path = "../crates/platform/audit-chain" }
mnt-platform-auth = { path = "../crates/platform/auth" }
mnt-platform-auth-rest = { workspace = true }
mnt-platform-authz = { path = "../crates/platform/authz" }
mnt-platform-request-context = { workspace = true }
mnt-platform-db = { workspace = true }
mnt-platform-email = { workspace = true }
mnt-platform-jobs = { workspace = true }
mnt-platform-provisioning = { path = "../crates/platform/provisioning" }
mnt-platform-rest = { path = "../crates/platform/platform-rest" }
mnt-platform-push = { workspace = true }
mnt-platform-realtime = { workspace = true }
mnt-platform-storage = { workspace = true }
mnt-reporting-adapter-postgres = { workspace = true }
mnt-reporting-rest = { workspace = true }
mnt-registry-adapter-postgres = { workspace = true }
mnt-registry-rest = { workspace = true }
mnt-dispatch-adapter-postgres = { workspace = true }
mnt-dispatch-domain = { workspace = true }
mnt-dispatch-rest = { workspace = true }
mnt-dispatch-worker = { workspace = true }
mnt-workflow-domain = { workspace = true }
mnt-workflow-runtime = { workspace = true }
mnt-workflow-runtime-adapter-postgres = { workspace = true }
mnt-workorder-adapter-postgres = { workspace = true }
mnt-workorder-rest = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic"] }
opentelemetry_sdk = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
serde = { workspace = true }
