#:schema https://dystroy.org/bacon/.bacon.schema.json
#
# Dev-loop config for the mnt-app backend. `scripts/dev-up.mjs up` spawns
# `bacon run` as a child process, inheriting the relocated dev env (DB/S3/OTEL
# endpoints, JWT keys, cold-start OTP) from that parent — this file only
# defines *what* each job runs, not the environment.
#
# Complete help on configuration: https://dystroy.org/bacon/config/

default_job = "run"
env.CARGO_TERM_COLOR = "always"
env.SQLX_OFFLINE = "true"

# mnt-app is a long-running server: restart on change instead of waiting for exit.
[jobs.run]
command = ["cargo", "run", "-p", "mnt-app"]
need_stdout = true
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"

[jobs.test]
command = ["cargo", "test"]
need_stdout = true

# Mirrors the CI clippy gate (.github/workflows/ci.yml): all targets, warnings deny.
[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
need_stdout = false
