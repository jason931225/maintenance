apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # App-of-apps: this is the single object an operator applies after Argo CD is
  # bootstrapped. It owns every child Application under deploy/argocd/apps and
  # keeps them self-healed.
spec:
  project: maintenance
  source:
    repoURL: https://github.com/jason931225/maintenance.git # replace OWNER
    targetRevision: feat/multi-tenant-phase1
    path: deploy/argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
