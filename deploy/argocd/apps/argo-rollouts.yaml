apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: maintenance
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.41.0 # renovate: datasource=helm depName=argo-rollouts
    helm:
      releaseName: argo-rollouts
      valuesObject:
        controller:
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
        dashboard:
          enabled: false # not worth the footprint on a single free-tier node
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
