apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: maintenance
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 40.3.0 # renovate: datasource=helm depName=traefik
    helm:
      releaseName: traefik
      valuesObject:
        # Single node: bind 80/443 straight onto the node (hostPort) instead of
        # provisioning the OCI load balancer. The node's public IP is the entry
        # point; no LB cost, fits Always Free.
        service:
          enabled: false
        deployment:
          kind: DaemonSet
        ports:
          # Port 80 stays plain HTTP — cert-manager's ACME HTTP-01 challenge is
          # served there; a blanket http→https redirect would break TLS issuance.
          web:
            port: 8000
            hostPort: 80
          websecure:
            port: 8443
            hostPort: 443
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { memory: 192Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    # Talos enforces the baseline PodSecurity profile cluster-wide, and baseline
    # forbids hostPort. Traefik binds host ports 80/443 directly (no LB, Always
    # Free), which requires the privileged PSS level on its namespace. This is
    # the standard tradeoff for hostPort-based ingress; the chart itself still
    # runs Traefik as non-root with a dropped-capability container.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
