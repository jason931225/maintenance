apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # before anything that needs webhooks/certs
spec:
  project: maintenance
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2 # renovate: datasource=helm depName=cert-manager
    helm:
      releaseName: cert-manager
      valuesObject:
        crds:
          enabled: true
        # Single small node — keep the controller/webhook/cainjector lean.
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { memory: 128Mi }
        webhook:
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 64Mi }
        cainjector:
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits: { memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
