apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-issuer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # after cert-manager CRDs exist
spec:
  project: maintenance
  source:
    repoURL: https://github.com/OWNER/maintenance.git # replace OWNER
    targetRevision: main
    path: deploy/infra/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ServerSideApply=true]
