# Dark Argo CD project for the ADR-0024 on-prem Traefik LoadBalancer variant.
# This file is intentionally under deploy/apps/traefik-onprem/, not deploy/argocd/apps/,
# so merging it does not broaden the live app-of-apps project or cut over OCI ingress.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maintenance-onprem-traefik-ingress
  namespace: argocd
  annotations:
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
spec:
  description: Dark ADR-0024 on-prem Traefik Service LoadBalancer variant; manual apply/sync only.
  sourceRepos:
    - https://traefik.github.io/charts
    - https://github.com/jason931225/maintenance.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: traefik
  # The Traefik chart creates RBAC and an IngressClass. Keep those permissions in
  # this dark project instead of changing the live maintenance project during a no-op merge.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
