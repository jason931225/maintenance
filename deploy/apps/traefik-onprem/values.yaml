# Traefik Helm values for the ADR-0024 on-prem ingress variant.
# This file is inert until the dark Argo Application in this directory is manually
# applied and synced after the MetalLB VIP provider has been staged.

deployment:
  enabled: true
  kind: Deployment
  replicas: 2
  minReadySeconds: 10

providers:
  kubernetesIngress:
    publishedService:
      enabled: true

service:
  enabled: true
  annotations:
    metallb.universe.tf/address-pool: maintenance-onprem-ingress
  labels:
    maintenance.nousresearch.com/context: onprem
    maintenance.nousresearch.com/vip-provider: metallb
  spec:
    type: LoadBalancer
    externalTrafficPolicy: Local

ports:
  # Port 80 stays plain HTTP so cert-manager ACME HTTP-01 challenges keep working.
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Require the two ingress replicas to land on distinct worker nodes when the
# on-prem substrate has enough schedulable nodes. This is the HA replacement for
# the current single-node OCI ingress shape.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
            app.kubernetes.io/instance: traefik-traefik
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik
        app.kubernetes.io/instance: traefik-traefik

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { memory: 192Mi }
