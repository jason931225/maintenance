# ExternalSecret: project the runtime DB connection `mnt-db-rt` out of OpenBao.
# This is the least-privilege mnt_rt (NOSUPERUSER, NOBYPASSRLS) role connection
# read by mnt-app / mnt-worker (`DATABASE_URL` <- key `uri`) AND by CNPG, which
# binds the managed mnt_rt role's password from this Secret
# (deploy/apps/maintenance/base/database.yaml `passwordSecret: mnt-db-rt`).
# Same Secret name + keys as today (deploy/SECRETS.md) -> zero pod/CNPG change.
# ADR-0022 lane 1.
#
# NOTE (cutover ordering): mnt-db-rt must exist BEFORE the maintenance app first
# syncs so CNPG can bind mnt_rt with LOGIN. The README runbook seeds the KV path
# and verifies this Secret projects before retiring the manual `kubectl create
# secret`. NOT mnt-db-app: that owner/migration Secret is auto-generated by CNPG
# and is intentionally NOT projected here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mnt-db-rt
  namespace: maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-maintenance
    kind: ClusterSecretStore
  target:
    name: mnt-db-rt
    creationPolicy: Owner
  data:
    - secretKey: username         # key in the resulting k8s Secret
      remoteRef:
        key: maintenance/db/rt    # KV v2 path under the `secret` mount
        property: username        # field within that KV entry
    - secretKey: password
      remoteRef:
        key: maintenance/db/rt
        property: password
    - secretKey: uri              # postgresql://mnt_rt:<pw>@mnt-db-rw.maintenance.svc:5432/maintenance
      remoteRef:
        key: maintenance/db/rt
        property: uri
