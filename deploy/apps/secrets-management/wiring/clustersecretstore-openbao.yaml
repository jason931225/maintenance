# ClusterSecretStore: External Secrets Operator (ESO) -> OpenBao (mnt-kms).
# Lifted from oyatie infra/external-secrets/clustersecretstore-openbao-oya.yaml
# (full-license reuse), adapted to maintenance's namespace/naming. ADR-0022 lane 1.
# Cluster-scoped, so ExternalSecrets in ANY namespace (here: maintenance) bind it.
#
# ===========================================================================
# CRITICAL OpenBao-side requirement (see README.md in this directory):
#   The OpenBao  auth/kubernetes/config  MUST set  disable_local_ca_jwt=true.
#
#   With disable_local_ca_jwt=true, OpenBao uses the CLIENT JWT (the
#   external-secrets ServiceAccount token that ESO presents) to perform the
#   Kubernetes TokenReview. That SA (external-secrets/external-secrets) is
#   granted system:auth-delegator by the ClusterRoleBinding in this directory
#   (clusterrolebinding-external-secrets-auth-delegator.yaml).
#
#   This DELIBERATELY avoids requiring OpenBao's OWN ServiceAccount to hold
#   system:auth-delegator: OpenBao runs as a plain Deployment SA in mnt-kms and
#   is NOT wired for delegated TokenReview. Leaving disable_local_ca_jwt at its
#   default (false) makes OpenBao try to use ITS local SA token for the
#   TokenReview, which 403s and breaks every ExternalSecret. DO NOT remove this
#   requirement without also granting auth-delegator to OpenBao's SA.
# ===========================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  provider:
    # OpenBao speaks the Vault wire protocol; ESO's `vault` provider drives it.
    vault:
      server: http://openbao.mnt-kms.svc:8200
      path: secret            # KV mount point (enable with `bao secrets enable -path=secret kv-v2`)
      version: v2             # KV v2 (versioned secrets -> secret/data/<path>)
      auth:
        kubernetes:
          # Kubernetes auth method mount path inside OpenBao (`bao auth enable
          # kubernetes` -> mounted at auth/kubernetes).
          mountPath: kubernetes
          # OpenBao role bound to external-secrets/external-secrets with the
          # mnt-eso-read policy (see README.md).
          role: eso-mnt
          # ESO presents THIS ServiceAccount's token as the client JWT. Because
          # OpenBao runs with disable_local_ca_jwt=true, this same SA is the one
          # that must hold system:auth-delegator for the TokenReview to succeed.
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
