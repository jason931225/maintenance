# ExternalSecret: project the CNPG backup credentials `oci-objectstore-creds` out
# of OpenBao. Consumed by the Barman ObjectStore for DB backups
# (deploy/apps/maintenance/base/database.yaml s3Credentials -> keys ACCESS_KEY_ID
# / ACCESS_SECRET_KEY). Despite the `oci-` name these are just an S3-compatible
# access/secret pair; on the on-prem substrate they point at SeaweedFS with
# no manifest change. Same Secret name + keys as today (deploy/SECRETS.md).
# ADR-0024 roadmap item 2.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oci-objectstore-creds
  namespace: maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-maintenance
    kind: ClusterSecretStore
  target:
    name: oci-objectstore-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID          # k8s Secret key CNPG expects (uppercase)
      remoteRef:
        key: maintenance/objectstore    # KV v2 path under the `secret` mount
        property: access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: maintenance/objectstore
        property: access_secret_key
