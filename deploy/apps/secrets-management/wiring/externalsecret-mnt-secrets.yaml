# ExternalSecret: project the application secret `mnt-secrets` out of OpenBao into
# the maintenance namespace as the SAME native k8s Secret the pods already consume
# (mnt-app / mnt-worker read it via `envFrom.secretRef: mnt-secrets` — see
# deploy/apps/maintenance/base/backend.yaml + worker.yaml). Running pods need ZERO
# change. Source of truth: deploy/SECRETS.md. ADR-0022 lane 1.
#
# `dataFrom.extract` projects EVERY field of the KV entry into the Secret, so the
# Secret keys == the KV field names. Store the fields in OpenBao under the exact
# env-var names the app expects (README.md documents this):
#   MNT_JWT_PRIVATE_KEY_PEM, MNT_JWT_PUBLIC_KEY_PEM (ES256 keypair),
#   MNT_S3_ACCESS_KEY_ID, MNT_S3_SECRET_ACCESS_KEY (OCI evidence-bucket S3 creds),
#   MNT_MAIL_MASTER_KEY (base64 32-byte webmail KEK).
# Optional integration keys (MNT_EMAIL_SMTP_USERNAME/PASSWORD, MNT_COLDSTART_OTP,
# MNT_FCM_*, MNT_SOLAPI_*) flow through automatically once added to the KV path —
# no edit here, mirroring the whole-secret envFrom behaviour.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mnt-secrets
  namespace: maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-maintenance
    kind: ClusterSecretStore
  target:
    name: mnt-secrets           # the k8s Secret ESO creates/owns in maintenance
    creationPolicy: Owner        # ESO creates + fully manages this Secret
  dataFrom:
    - extract:
        key: maintenance/app     # KV v2 path under the `secret` mount
