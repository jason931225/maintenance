# ExternalSecret: project the dedicated leave-command connection from OpenBao.
# CNPG binds the password to the managed `mnt_leave_cmd` login while only the
# API consumes its URI as `LEAVE_COMMAND_DATABASE_URL`. The migration and worker
# roles never receive this credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mnt-db-leave-command
  namespace: maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-maintenance
    kind: ClusterSecretStore
  target:
    name: mnt-db-leave-command
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: maintenance/db/leave-command
        property: username
    - secretKey: password
      remoteRef:
        key: maintenance/db/leave-command
        property: password
    - secretKey: uri
      remoteRef:
        key: maintenance/db/leave-command
        property: uri
