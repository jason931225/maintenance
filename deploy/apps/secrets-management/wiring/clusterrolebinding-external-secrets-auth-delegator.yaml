# ClusterRoleBinding granting the External Secrets Operator ServiceAccount the
# Kubernetes TokenReview delegation role (system:auth-delegator). Lifted verbatim
# from oyatie infra/external-secrets/ (full-license reuse) — this is the
# load-bearing invariant. ADR-0024 roadmap item 2.
#
# WHY: the ClusterSecretStore `openbao-maintenance` authenticates to OpenBao via
# the kubernetes auth method with disable_local_ca_jwt=true. In that mode OpenBao
# performs the TokenReview using the CLIENT JWT supplied by ESO -- i.e. the
# token of external-secrets/external-secrets. For that TokenReview to be
# authorized, this SA (NOT OpenBao's own SA) must carry system:auth-delegator.
# This is the cluster-side half of the runtime ESO->OpenBao fix; the OpenBao
# config side is documented in README.md in this directory.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-auth-delegator
  labels:
    app.kubernetes.io/part-of: mnt-substrate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator     # built-in: allows creating TokenReviews/SubjectAccessReviews
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
