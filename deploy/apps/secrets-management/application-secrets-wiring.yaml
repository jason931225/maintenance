# STAGED / DARK ArgoCD Application — the ESO<->OpenBao wiring (ClusterSecretStore,
# auth-delegator ClusterRoleBinding, and the ExternalSecrets that project
# maintenance's k8s Secrets from OpenBao KV).
#
# DARK: under deploy/apps/secrets-management/, not deploy/argocd/apps/. Merging
# deploys nothing. Sync-wave "1" so (once activated) it applies AFTER the ESO CRDs
# + OpenBao are up. The ExternalSecrets will report NotReady until OpenBao's KV
# paths are seeded + kubernetes auth is configured — that is the founder-gated
# activation in README.md, and it is safe: OCI Vault + the existing hand-created
# Secrets keep the app running throughout (creationPolicy: Owner means ESO only
# takes over a Secret once it can successfully render it).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-wiring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after external-secrets CRDs + openbao
spec:
  project: maintenance
  source:
    repoURL: https://github.com/jason931225/maintenance.git # replace OWNER
    targetRevision: main
    path: deploy/apps/secrets-management/wiring
  destination:
    server: https://kubernetes.default.svc
    namespace: maintenance # ExternalSecrets land here; the CSS/CRB are cluster-scoped
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ServerSideApply=true]
