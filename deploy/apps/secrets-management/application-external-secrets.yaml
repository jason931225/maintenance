# STAGED / DARK ArgoCD Application — External Secrets Operator (ESO).
#
# This file lives under deploy/apps/secrets-management/ ON PURPOSE: the root
# app-of-apps (deploy/argocd/root.yaml) only recurses deploy/argocd/apps, so
# NOTHING here is auto-synced. Merging this PR deploys nothing. Activation is
# founder-gated: see README.md in this directory. To activate, move (or copy)
# this file into deploy/argocd/apps/ (and add the chart repo to
# deploy/argocd/project.yaml sourceRepos) — or `kubectl apply -f` it directly.
#
# OCI Vault + the out-of-band `kubectl create secret` flow keep working until then.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # operator + CRDs before the wiring Application
spec:
  project: maintenance
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0 # renovate: datasource=helm depName=external-secrets
    helm:
      releaseName: external-secrets
      valuesObject:
        installCRDs: true
        replicaCount: 1
        # Single small node — keep the controller/webhook/cert-controller lean.
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { memory: 192Mi }
        webhook:
          replicaCount: 1
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
        certController:
          replicaCount: 1
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
