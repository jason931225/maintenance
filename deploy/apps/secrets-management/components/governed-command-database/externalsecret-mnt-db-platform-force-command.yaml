# ExternalSecret: project the dedicated platform-force-command connection from
# OpenBao. CNPG binds the password to `mnt_platform_force_cmd`; only the API receives
# the URI as `PLATFORM_FORCE_COMMAND_DATABASE_URL`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mnt-db-platform-force-command
  namespace: maintenance
  labels:
    app.kubernetes.io/part-of: mnt-substrate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-maintenance
    kind: ClusterSecretStore
  target:
    name: mnt-db-platform-force-command
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: maintenance/db/platform-force-command
        property: username
    - secretKey: password
      remoteRef:
        key: maintenance/db/platform-force-command
        property: password
    - secretKey: uri
      remoteRef:
        key: maintenance/db/platform-force-command
        property: uri
