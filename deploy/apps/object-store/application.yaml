# Dark Argo CD Application for ADR-0022 self-hosted S3 object storage.
# Do not move this file under deploy/argocd/apps/ until a later founder/operator
# activation lane intentionally wires the object store into the live app-of-apps root.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maintenance-object-store-dark
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # self-hosted S3 must exist before consumers switch endpoints.
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
    maintenance.nousresearch.com/activation-boundary: "DARK: not referenced by deploy/argocd/apps; manual apply/sync only after founder/operator approval"
spec:
  project: maintenance-object-store-dark
  source:
    repoURL: https://github.com/jason931225/maintenance.git
    targetRevision: main
    path: deploy/apps/object-store/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: maintenance-object-store
  syncPolicy:
    # No automated sync by design: applying this Application stages Argo visibility
    # only. A later operator-approved on-prem cutover must sync it manually.
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
