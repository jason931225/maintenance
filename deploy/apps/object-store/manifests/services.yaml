apiVersion: v1
kind: Service
metadata:
  name: mnt-object-store-headless
  namespace: maintenance-object-store
  labels:
    app.kubernetes.io/name: seaweedfs-s3
    app.kubernetes.io/instance: mnt-object-store
    app.kubernetes.io/part-of: maintenance-object-store
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: s3
      port: 8333
      targetPort: s3
      protocol: TCP
      appProtocol: http
  selector:
    app.kubernetes.io/name: seaweedfs-s3
    app.kubernetes.io/instance: mnt-object-store
---
apiVersion: v1
kind: Service
metadata:
  name: mnt-object-store-s3
  namespace: maintenance-object-store
  labels:
    app.kubernetes.io/name: seaweedfs-s3
    app.kubernetes.io/instance: mnt-object-store
    app.kubernetes.io/part-of: maintenance-object-store
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
  annotations:
    maintenance.nousresearch.com/s3-endpoint-url: "http://mnt-object-store-s3.maintenance-object-store.svc.cluster.local:8333"
    maintenance.nousresearch.com/s3-addressing-style: "path"
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 8333
      targetPort: s3
      protocol: TCP
      appProtocol: http
  selector:
    app.kubernetes.io/name: seaweedfs-s3
    app.kubernetes.io/instance: mnt-object-store
