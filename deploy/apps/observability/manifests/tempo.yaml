# Tempo single-binary trace store for the DARK observability stage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: maintenance-observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: maintenance-observability
data:
  config.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
    compactor:
      compaction:
        block_retention: 48h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: maintenance-observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/part-of: maintenance-observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: tempo
          image: grafana/tempo:2.7.1
          args:
            - -config.file=/etc/tempo/config.yaml
          ports:
            - { name: http, containerPort: 3200, protocol: TCP }
            - { name: otlp-grpc, containerPort: 4317, protocol: TCP }
            - { name: otlp-http, containerPort: 4318, protocol: TCP }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data, mountPath: /var/tempo }
            # Tempo keeps traces/WAL under /var/tempo (PVC) but writes scratch
            # files to /tmp; back it with tmpfs for a read-only root filesystem.
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: maintenance-observability
spec:
  selector:
    app.kubernetes.io/name: tempo
  ports:
    - { name: http, port: 3200, targetPort: http, protocol: TCP }
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc, protocol: TCP }
    - { name: otlp-http, port: 4318, targetPort: otlp-http, protocol: TCP }
