# Loki single-binary log store for the DARK observability stage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: maintenance-observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: maintenance-observability
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: maintenance-observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/part-of: maintenance-observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args:
            - -config.file=/etc/loki/config.yaml
          ports:
            - { name: http, containerPort: 3100, protocol: TCP }
            - { name: grpc, containerPort: 9095, protocol: TCP }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /var/loki }
            # Loki keeps chunks/WAL under /var/loki (PVC) but still writes scratch
            # files to /tmp; back it with tmpfs for a read-only root filesystem.
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: maintenance-observability
spec:
  selector:
    app.kubernetes.io/name: loki
  ports:
    - { name: http, port: 3100, targetPort: http, protocol: TCP }
    - { name: grpc, port: 9095, targetPort: grpc, protocol: TCP }
