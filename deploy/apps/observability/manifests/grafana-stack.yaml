# Grafana dashboard surface for the DARK observability stage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        uid: victoriametrics
        type: prometheus
        access: proxy
        url: http://victoriametrics.maintenance-observability.svc.cluster.local:8428
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.maintenance-observability.svc.cluster.local:3100
        editable: false
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.maintenance-observability.svc.cluster.local:3200
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: victoriametrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: maintenance-observability
        orgId: 1
        folder: Maintenance
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards/maintenance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-maintenance-overview-dashboard
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
data:
  maintenance-observability-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=\"mnt-app-api\"}[5m]))",
              "legendFormat": "requests/sec",
              "refId": "A"
            }
          ],
          "title": "API request rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{service_name=\"mnt-app-api\"}[5m])) by (le))",
              "legendFormat": "p99 latency",
              "refId": "A"
            }
          ],
          "title": "API p99 latency",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["maintenance", "dark", "observability"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "Maintenance Observability Overview",
      "uid": "maintenance-observability-overview",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: maintenance-observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: admin }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maintenance-grafana-admin
                  key: password
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_ANALYTICS_REPORTING_ENABLED, value: "false" }
            - { name: GF_ANALYTICS_CHECK_FOR_UPDATES, value: "false" }
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/grafana }
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards/maintenance }
            # Grafana writes transient files (rendered PNGs, CSV exports) under
            # /tmp; back it with tmpfs so the root filesystem can stay read-only.
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-maintenance-overview-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: maintenance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: maintenance-observability
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - { name: http, port: 3000, targetPort: http, protocol: TCP }
