# Dark Argo CD project for the ADR-0022 self-hosted observability stage.
# This file is intentionally under deploy/apps/observability/, not deploy/argocd/apps/,
# so merging it does not add observability to the live app-of-apps root.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maintenance-observability-dark
  namespace: argocd
  annotations:
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
spec:
  description: Dark ADR-0022 self-hosted observability stage; manual apply/sync only after founder/operator activation.
  sourceRepos:
    - https://github.com/jason931225/maintenance.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: maintenance-observability
  # The rendered stack owns only the maintenance-observability namespace plus
  # namespace-scoped workloads inside it. Keep the project isolated instead of
  # broadening the live maintenance project during a no-op merge.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
