# Dark Argo CD project for the ADR-0024 on-prem Longhorn storage stage.
# This file is intentionally under deploy/apps/storage/, not deploy/argocd/apps/,
# so merging it does not add the project to the live app-of-apps root.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maintenance-onprem-storage
  namespace: argocd
  annotations:
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
spec:
  description: Dark ADR-0024 on-prem Longhorn replicated block storage stage; manual apply/sync only.
  sourceRepos:
    - https://charts.longhorn.io
    - https://github.com/jason931225/maintenance.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
  # Longhorn installs cluster-scoped CRDs/RBAC plus namespace-scoped controller,
  # CSI, engine, and UI workloads. Keep those permissions scoped to this dark app
  # instead of broadening the live maintenance project during a no-op merge.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
