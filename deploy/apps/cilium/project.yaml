# Dark Argo CD project for the ADR-0022 on-prem Cilium stage.
# This file is intentionally under deploy/apps/cilium/ instead of deploy/argocd/apps/,
# so merging it does not change the live app-of-apps root or deploy anything.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maintenance-onprem-cilium
  namespace: argocd
  annotations:
    maintenance.nousresearch.com/dark-stage: "true"
spec:
  description: Dark ADR-0022 on-prem Cilium CNI stage; apply manually only after substrate/VIP readiness.
  sourceRepos:
    - https://helm.cilium.io
    - https://github.com/jason931225/maintenance.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
  # Cilium installs cluster-scoped CRDs/RBAC and namespace-scoped agents in kube-system.
  # Keep this project isolated to the dark Cilium app instead of broadening the live
  # maintenance project during a no-op merge.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
