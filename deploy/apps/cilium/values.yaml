# Cilium Helm values for Maintenance ADR-0022 on-prem Talos staging.
# Lifted from the sibling oyatie infra/talos/cilium-values.yaml where the settings
# are provider-neutral for Talos (CNI disabled in Talos, kube-proxy disabled, KubePrism
# localhost API endpoint, cgroup2 already mounted). This file is inert until the dark
# Argo Application in this directory is manually applied and synced.

ipam:
  mode: kubernetes # use node PodCIDRs from kube-controller-manager; no cloud IPAM dependency.

# Enable Cilium's kube-proxy replacement so Service load-balancing runs in eBPF.
# ADR-0022 requires eBPF load-balancing for the on-prem target; Talos machine config
# must pair this with cluster.proxy.disabled=true before sync.
kubeProxyReplacement: true
k8sServiceHost: localhost # Talos KubePrism endpoint on every node; override if KubePrism is not enabled.
k8sServicePort: 7445

# Kubernetes NetworkPolicy enforcement stays on Cilium's normal "default" mode:
# namespaces are open until a NetworkPolicy selects pods, then Cilium enforces it.
# Do not set "never"; maintenance/base already carries default-deny policies that
# become effective only after a policy-capable CNI is live.
policyEnforcementMode: "default"

operator:
  # ADR-0022's on-prem target is HA/multi-node, so keep the HA operator default
  # explicit. Oyatie's single-node lab used replicas: 1; do not copy that here.
  replicas: 2

cgroup:
  autoMount:
    enabled: false # Talos already mounts cgroup2; Cilium must not remount it.
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    # SYS_MODULE intentionally absent: Talos forbids workloads loading kernel modules.
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Keep socket-level service load-balancing to the host namespace. Workload pod
# traffic still uses Cilium's eBPF datapath, while future L7/mesh layers are not
# bypassed by pod-origin socket LB before they can observe traffic.
socketLB:
  enabled: true
  hostNamespaceOnly: true

# BGP/VIP coordination is deliberately dark. ADR-0022 allows MetalLB, kube-vip, or
# Cilium BGP for north-south VIPs, but issue #378 owns that decision. Leave both
# Cilium BGP and L2 announcements disabled until that lane chooses Cilium as the
# speaker and documents peers/IP pools/failover ownership.
bgpControlPlane:
  enabled: false
l2announcements:
  enabled: false

# Hubble is provider-neutral eBPF flow observability. Keep ServiceMonitor disabled
# because this dark stage must not assume the Prometheus Operator CRD exists yet.
hubble:
  enabled: true
  tls:
    auto:
      # The chart default method=helm embeds freshly generated certs in rendered
      # YAML and marks them helm-template-non-idempotent, which is hostile to
      # Argo CD drift detection. Let Cilium's in-cluster certgen Job/CronJob own
      # Hubble TLS rotation instead; this avoids a cert-manager dependency while
      # keeping GitOps renders deterministic.
      method: cronJob
  relay:
    enabled: true
    startupProbe:
      timeoutSeconds: 5
      failureThreshold: 24
      periodSeconds: 5
  metrics:
    enableOpenMetrics: true
    serviceMonitor:
      enabled: false
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,destination_ip,destination_namespace"
