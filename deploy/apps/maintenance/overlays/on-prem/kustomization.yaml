apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# DARK on-prem HA overlay for ADR-0024/#379. Do not wire this path into
# deploy/argocd/apps until a separate founder/operator cutover approves it.
resources:
  - ../../base

patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: mnt-db
    path: cnpg-ha-patch.yaml
  - target: { kind: ConfigMap, name: mnt-config }
    patch: |-
      # The on-prem context uses the DARK self-hosted S3 service staged under
      # deploy/apps/object-store. The OCI/prod context keeps the OCI endpoint.
      - op: replace
        path: /data/MNT_S3_ENDPOINT_URL
        value: http://mnt-object-store-s3.maintenance-object-store.svc.cluster.local:8333
      - op: replace
        path: /data/MNT_S3_REGION
        value: us-east-1
  - target: { kind: ObjectStore, name: mnt-backups }
    patch: |-
      # CNPG Barman follows the same deployment-context endpoint as evidence S3.
      # Credentials are projected by the on-prem secret store (OpenBao/ESO for
      # production activation, or an explicitly approved rehearsal secret), not
      # by the live OCI customer-secret-key path.
      - op: replace
        path: /spec/configuration/endpointURL
        value: http://mnt-object-store-s3.maintenance-object-store.svc.cluster.local:8333
      - op: replace
        path: /spec/configuration/s3Credentials/accessKeyId/name
        value: mnt-cnpg-objectstore-creds
      - op: replace
        path: /spec/configuration/s3Credentials/secretAccessKey/name
        value: mnt-cnpg-objectstore-creds
