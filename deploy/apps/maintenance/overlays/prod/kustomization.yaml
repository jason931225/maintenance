apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production overlay. The operator sets three things here: the GHCR owner, the
# released image tag (release-please bumps it), and the public host + OCI
# object-storage namespace.
resources:
  - ../../base

images:
  # Deploy by immutable, cosign-signed @sha256 digest (not a mutable tag): the
  # exact scanned+signed artifact from image-release. Renovate / release-please
  # bump these. mnt-worker shares the mnt-app image.
  - name: mnt-app
    newName: ghcr.io/jason931225/mnt-app
    digest: sha256:729f04af94c4a28e4a022b50baad0b7837df15ad1b9929336fa8bda2e6ee6b8f
  - name: mnt-web
    newName: ghcr.io/jason931225/mnt-web
    digest: sha256:8dff1455eb0d92916acf1888908cc72fc1ae0c21a6864199c6af6d58cc4d1b13

patches:
  # Public host (WebAuthn rp id/origin must equal the served origin) + the OCI
  # object-storage namespace for evidence + DB backups.
  - target: { kind: ConfigMap, name: mnt-config }
    patch: |-
      - op: replace
        path: /data/MNT_WEBAUTHN_RP_ID
        value: knllogistic.com
      - op: replace
        path: /data/MNT_WEBAUTHN_RP_ORIGIN
        value: https://console.knllogistic.com
      - op: replace
        path: /data/MNT_S3_ENDPOINT_URL
        value: https://axdotp9iv3ua.compat.objectstorage.ap-chuncheon-1.oraclecloud.com
  - target: { kind: Ingress, name: mnt }
    patch: |-
      # Attach the fsm→console 301 redirect Middleware ingress-wide. Its
      # redirectRegex is anchored to the fsm host, so it is a no-op for the
      # apex/www storefront routers (their URLs don't match the regex).
      - op: add
        path: /metadata/annotations/traefik.ingress.kubernetes.io~1router.middlewares
        value: maintenance-fsm-console-redirect@kubernetescrd
      - op: replace
        path: /spec/tls/0/hosts
        value: [console.knllogistic.com, fsm.knllogistic.com, knllogistic.com, www.knllogistic.com]
      - op: replace
        path: /spec/rules/0/host
        value: console.knllogistic.com
      - op: replace
        path: /spec/rules/1/host
        value: knllogistic.com
      - op: replace
        path: /spec/rules/2/host
        value: www.knllogistic.com
      - op: replace
        path: /spec/rules/3/host
        value: fsm.knllogistic.com
  - target: { kind: Middleware, name: fsm-console-redirect }
    patch: |-
      - op: replace
        path: /spec/redirectRegex/regex
        value: ^https?://fsm\.knllogistic\.com/(.*)
      - op: replace
        path: /spec/redirectRegex/replacement
        value: https://console.knllogistic.com/${1}
  - target: { kind: ObjectStore, name: mnt-backups }
    patch: |-
      - op: replace
        path: /spec/configuration/endpointURL
        value: https://axdotp9iv3ua.compat.objectstorage.ap-chuncheon-1.oraclecloud.com
