apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mnt
  namespace: maintenance
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts: [fsm.example.com] # host set by the prod overlay
      secretName: mnt-tls
  rules:
    - host: fsm.example.com
      http:
        paths:
          # API (incl. the unauthenticated /api/v1/support/intake) → server.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mnt-app
                port: { number: 8080 }
          # Everything else → the SPA (which does client-side routing).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mnt-web
                port: { number: 8080 }
