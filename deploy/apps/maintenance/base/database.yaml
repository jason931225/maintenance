apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mnt-db
  namespace: maintenance
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  # Deployment context: live oci-guest base. This cluster is intentionally one
  # CNPG instance on one Always Free A1 node; it has restore/PITR artifacts but no
  # automatic database failover. The ADR-0024 on-prem-ha overlay patches this to
  # >=3 instances plus replicated storage without changing the live OCI posture.
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  primaryUpdateStrategy: unsupervised
  # CNPG's postgres login is never exposed. The ordered read-only topology gate
  # uses the migration owner's mnt-db-app credential to inspect public catalogs.
  enableSuperuserAccess: false
  storage:
    size: 5Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { memory: 1Gi }
  # OCI-specific Barman/S3 compatibility workaround. Do not treat these env vars
  # as universal: the on-prem-ha self-hosted S3 endpoint must be validated on its
  # own before copying checksum behavior.
  # boto3 >= 1.36 (bundled in barman-cloud's S3 client) defaults to flexible
  # checksums sent via AWS *chunked encoding* on PutObject. OCI Object Storage's
  # S3-compatible API rejects that with "NotImplemented: AWS chunked encoding not
  # supported", which broke EVERY WAL archive + base backup (continuous archiving
  # stuck False, daily backup failing). Forcing checksum calc/validation to
  # when_required disables the default chunked upload so OCI accepts it. The
  # barman-cloud subprocess runs in the instance container and inherits these.
  env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: when_required
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: when_required
  postgresql:
    parameters:
      # Deliberate sizing for the shared A1 node rather than container defaults.
      shared_buffers: 256MB
      effective_cache_size: 768MB
      work_mem: 16MB
      max_connections: "60"
  bootstrap:
    initdb:
      database: maintenance
      # mnt_app OWNS every table, has BYPASSRLS for migration backfills, and is
      # used ONLY to run schema migrations (out of band, via mnt-db-app). The
      # running application does NOT receive it — see managed.roles.mnt_rt.
      owner: mnt_app
  # mnt_rt is the least-privilege RUNTIME role the app/worker connect as. It
  # owns nothing, is NOSUPERUSER + NOBYPASSRLS (so Postgres RLS applies to it),
  # and gets only the GRANTs migration 0031 hands out. CNPG attaches LOGIN + the
  # password from mnt-db-rt here; the role attributes are also pinned in 0031 so
  # they hold regardless of creation order.
  managed:
    roles:
      # CNPG's bootstrap owner is also reconciled here so it cannot retain
      # cluster-admin attributes. Membership permits migrations to transfer
      # SECURITY DEFINER functions to the two NOLOGIN owners; ADMIN OPTION is
      # not granted by CNPG's inRoles membership reconciliation.
      - name: mnt_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: true
        inherit: true
        replication: false
        inRoles: [mnt_leave_definer, mnt_ontology_writer]
        passwordSecret:
          name: mnt-db-app
      - name: mnt_rt
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: false
        replication: false
        passwordSecret:
          name: mnt-db-rt
      # Narrow command credential for leave mutations. It owns nothing and is
      # granted only EXECUTE on the intrinsically-audited leave command
      # routines by the schema migration. The API uses a separate small pool;
      # worker and migrate workloads never receive this Secret.
      - name: mnt_leave_cmd
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: false
        replication: false
        passwordSecret:
          name: mnt-db-leave-command
      # Narrow command credential for ontology schema mutation and governed
      # canonical seeding. Direct table DML remains unavailable.
      - name: mnt_ontology_cmd
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: false
        replication: false
        passwordSecret:
          name: mnt-db-ontology-command
      - name: mnt_leave_definer
        ensure: present
        login: false
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: false
        replication: false
        disablePassword: true
      - name: mnt_ontology_writer
        ensure: present
        login: false
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: false
        replication: false
        disablePassword: true
  # Continuous WAL archiving + base backups via the Barman Cloud Plugin.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: mnt-backups
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: mnt-backups
  namespace: maintenance
spec:
  # Indefinite retention (user 2026-06-23): with no retentionPolicy, barman-cloud
  # never prunes base backups / WALs, so PITR reaches back to the first backup
  # forever. NOTE: storage grows unbounded — re-add e.g. retentionPolicy: "90d"
  # to cap it once the DB / OCI Always-Free object-storage budget warrants it.
  configuration:
    # OCI Object Storage, S3-compatible API, Chuncheon. NAMESPACE = the tenancy
    # object-storage namespace (oci os ns get); bucket pre-created out of band.
    # The on-prem-ha overlay replaces endpoint/credentials with the selected
    # self-hosted S3-compatible service and OpenBao/ESO-projected secrets.
    destinationPath: s3://mnt-db-backups/
    endpointURL: https://axdotp9iv3ua.compat.objectstorage.ap-chuncheon-1.oraclecloud.com
    s3Credentials:
      accessKeyId:
        name: oci-objectstore-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: oci-objectstore-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      maxParallel: 1 # one WAL PUT stream — keeps requests under the 50k/mo free cap
    data:
      compression: gzip
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mnt-db-daily
  namespace: maintenance
spec:
  # 6-field cron (CNPG uses seconds). 03:00 UTC = 12:00 KST daily base backup;
  # continuous WAL archiving gives point-in-time recovery between base backups.
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: mnt-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
