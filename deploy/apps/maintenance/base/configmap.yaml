apiVersion: v1
kind: ConfigMap
metadata:
  name: mnt-config
  namespace: maintenance
# Non-secret runtime config shared by the api + worker workloads (consumed via
# envFrom). Secrets (JWT PEMs, S3 keys, notification creds) live in the
# mnt-secrets Secret — see deploy/SECRETS.md. DATABASE_URL is injected from the
# CNPG-generated mnt-db-app secret. Host-specific values (RP id/origin) are
# overridden in overlays/prod.
data:
  MNT_HTTP_ADDR: "0.0.0.0:8080"
  MNT_JWT_ISSUER: "mnt-platform-auth"
  MNT_JWT_AUDIENCE: "mnt-api"
  MNT_WEBAUTHN_RP_NAME: "MNT 정비 콘솔"
  # RP id is the APEX domain so a passkey enrolled today on fsm.knllogistic.com
  # stays valid across every current/future subdomain of the org. The RP ORIGIN
  # stays the exact served origin (https://fsm.knllogistic.com): WebAuthn requires
  # the origin's host to equal the rp id OR be a subdomain of it, which the apex
  # satisfies. Prod has no enrolled passkeys yet, so this is a clean switch.
  MNT_WEBAUTHN_RP_ID: "knllogistic.com" # apex; overridden in overlays/prod
  MNT_WEBAUTHN_RP_ORIGIN: "https://fsm.knllogistic.com" # overridden in overlays/prod
  # Absolute refresh-family lifetime cap (NIST 800-63B AAL2). Past this ceiling a
  # rotation is rejected and the family revoked, forcing a fresh sign-in. 24h.
  MNT_REFRESH_FAMILY_ABSOLUTE_TTL_SECS: "86400"
  # Native app-link association (served public + unauthenticated at /.well-known/*
  # so native passkeys validate). Comma-separated lists; leave empty until the
  # native apps are provisioned (the endpoints then serve a valid empty document).
  # See deploy/SECRETS.md "Native app-link association" for how to source these.
  #   MNT_IOS_APP_IDS: "<TeamID>.<bundle-id>" — Apple Team ID is 98Q89GFZWP;
  #     awaiting the registered iOS bundle id to form "98Q89GFZWP.<bundle-id>".
  #   MNT_ANDROID_CERT_SHA256: the release signing-cert SHA-256 (colon-hex);
  #     awaiting the keystore fingerprint. assetlinks serves once package+cert set.
  MNT_IOS_APP_IDS: ""
  MNT_ANDROID_PACKAGE: "com.maintenance.field"
  MNT_ANDROID_CERT_SHA256: ""
  # Evidence object storage — OCI Object Storage (S3-compatible), Chuncheon.
  MNT_S3_ENDPOINT_URL: "https://axdotp9iv3ua.compat.objectstorage.ap-chuncheon-1.oraclecloud.com"
  MNT_S3_REGION: "ap-chuncheon-1"
  MNT_S3_PRIMARY_BUCKET: "mnt-evidence"
  # WORM replica bucket: evidence is mirrored here and integrity-verified before
  # financial operations proceed (data resiliency + tamper-evidence).
  MNT_S3_REPLICA_BUCKET: "mnt-evidence-replica"
  MNT_S3_FORCE_PATH_STYLE: "true"
  # OTLP trace export (opt-in). Leave unset to keep tracing as JSON-to-stdout
  # only. Uncommenting enables gRPC OTLP export to an in-cluster collector — the
  # OTel collector MUST be deployed first, otherwise every request will attempt
  # to export and fail. Point it at the collector's gRPC endpoint, e.g.:
  # OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"
