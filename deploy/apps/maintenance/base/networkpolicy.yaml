# Default-deny ingress for the namespace, then the minimum allows, plus a
# default-deny EGRESS for the app tier with explicit allows (DNS, intra-namespace
# Postgres, outbound HTTPS for OCI Object Storage / FCM / Solapi). The CNPG
# database pods are intentionally NOT egress-restricted here — their egress
# (Barman→OCI, the Kubernetes API used by the instance manager) is operator-
# managed and unsafe to blanket-deny.
#
# ENFORCEMENT: these manifests render on any Kubernetes cluster, but they only
# isolate traffic when the cluster uses a policy-capable CNI (Cilium, Calico, or
# Canal: flannel dataplane + Calico policy). Plain flannel (Talos default) does
# NOT enforce NetworkPolicy, so these resources are inert there. ADR-0022's
# portable substrate uses Cilium as the intended NetworkPolicy enforcer. Run the
# live readback preflight plus scripts/smoke-networkpolicy-deny.sh on the target
# context before claiming production isolation.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: maintenance
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-tier-from-traefik
  namespace: maintenance
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [mnt-app, mnt-web] }
  policyTypes: [Ingress]
  ingress:
    # From the Traefik ingress controller.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: traefik }
      ports:
        - { protocol: TCP, port: 8080 }
    # From within the namespace (the blue/green smoke-test job hits the preview
    # Service; the active/preview Services share the app pods).
    - from:
        - podSelector: {}
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-app
  namespace: maintenance
spec:
  podSelector:
    matchLabels: { cnpg.io/cluster: mnt-db }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - { key: app, operator: In, values: [mnt-app, mnt-worker] }
      ports:
        - { protocol: TCP, port: 5432 }
---
# Default-deny EGRESS for the app tier (api/web/worker). CNPG pods are excluded.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress-app-tier
  namespace: maintenance
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [mnt-app, mnt-web, mnt-worker] }
  policyTypes: [Egress]
---
# DNS resolution (kube-dns in kube-system) for the app tier.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress-dns
  namespace: maintenance
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [mnt-app, mnt-web, mnt-worker] }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# api/worker → Postgres (intra-namespace).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress-postgres
  namespace: maintenance
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [mnt-app, mnt-worker] }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: { cnpg.io/cluster: mnt-db }
      ports:
        - { protocol: TCP, port: 5432 }
---
# api/worker → external HTTPS (OCI Object Storage, FCM, Solapi). External SaaS
# endpoints have no stable IPs, so allow 443 broadly; every other egress port
# stays denied by default-deny-egress-app-tier.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress-https
  namespace: maintenance
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [mnt-app, mnt-worker] }
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }
