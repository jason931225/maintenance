apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mnt-app
  namespace: maintenance
  labels: { app: mnt-app }
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels: { app: mnt-app }
  strategy:
    blueGreen:
      activeService: mnt-app
      previewService: mnt-app-preview
      # Promote automatically once the preview passes the smoke analysis;
      # a failed analysis leaves the active (old) version serving = automatic
      # rollback. Keep the old ReplicaSet warm briefly for instant manual revert.
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 30
      prePromotionAnalysis:
        templates:
          - templateName: smoke-http
        args:
          - name: health-url
            value: http://mnt-app-preview.maintenance.svc:8080/readyz
  template:
    metadata:
      labels: { app: mnt-app }
    spec:
      # The API talks to Postgres and OCI, never to the Kubernetes API.
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30 # Rust app handles SIGTERM and drains within MNT_SHUTDOWN_TIMEOUT_SECS (10s)
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mnt-app
          image: mnt-app # registry + tag set by the prod overlay
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
          envFrom:
            - configMapRef: { name: mnt-config }
            - secretRef: { name: mnt-secrets }
          env:
            - name: MNT_APP_ROLE
              value: "api"
            - name: MNT_SERVICE_NAME # metrics/traces service_name — must match the SLO selector
              value: "mnt-app-api"
            # SMTP relay is enabled by non-secret MNT_EMAIL_* fields in mnt-config.
            # Require the credential keys explicitly so a missing/partial
            # mnt-secrets Secret fails closed during rollout instead of envFrom
            # silently omitting the variables and degrading to stub email.
            - name: MNT_EMAIL_SMTP_USERNAME
              valueFrom:
                secretKeyRef: { name: mnt-secrets, key: MNT_EMAIL_SMTP_USERNAME }
            - name: MNT_EMAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef: { name: mnt-secrets, key: MNT_EMAIL_SMTP_PASSWORD }
            # Runtime connects as the NON-OWNER role mnt_rt (subject to RLS).
            # Schema migrations are applied out of band with the owner mnt-db-app
            # secret — never from this workload.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: mnt-db-rt, key: uri }
            # Dedicated narrow credential for intrinsically-audited leave
            # commands. Required only by the API role; the app fails closed
            # when DATABASE_URL is configured without this value.
            - name: LEAVE_COMMAND_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: mnt-db-leave-command, key: uri }
            # Dedicated narrow credential for ontology schema commands and
            # canonical governed-config seeding. API-only and fail-closed.
            - name: ONTOLOGY_COMMAND_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: mnt-db-ontology-command, key: uri }
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
            timeoutSeconds: 2
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mnt-app
  namespace: maintenance
  labels: { app: mnt-app }
spec:
  selector: { app: mnt-app } # Argo Rollouts appends the pod-template-hash for blue/green
  ports:
    - { name: http, port: 8080, targetPort: http }
---
apiVersion: v1
kind: Service
metadata:
  name: mnt-app-preview
  namespace: maintenance
  labels: { app: mnt-app }
spec:
  selector: { app: mnt-app }
  ports:
    - { name: http, port: 8080, targetPort: http }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mnt-app
  namespace: maintenance
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: mnt-app }
