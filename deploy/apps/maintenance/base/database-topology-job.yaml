# Ordered readback gate between CNPG reconciliation (wave 0) and migrations
# (wave 2). It is intentionally a Sync hook: PreSync runs before the Cluster can
# exist/reconcile and deadlocks a fresh installation.
apiVersion: batch/v1
kind: Job
metadata:
  name: mnt-db-topology
  namespace: maintenance
  labels: { app: mnt-db-topology }
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: { app: mnt-db-topology }
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: topology-readback
          image: postgres:18.4@sha256:65f70a152846cf504dff86e807007e9aeac98c3aeb7b62541b2c55ab9d264e56
          env:
            - name: PGHOST
              value: mnt-db-rw.maintenance.svc
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: maintenance
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: mnt-db-app, key: username }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: mnt-db-app, key: password }
            - name: MNT_RT_USERNAME
              valueFrom:
                secretKeyRef: { name: mnt-db-rt, key: username }
            - name: MNT_RT_PASSWORD
              valueFrom:
                secretKeyRef: { name: mnt-db-rt, key: password }
            - name: MNT_LEAVE_COMMAND_USERNAME
              valueFrom:
                secretKeyRef: { name: mnt-db-leave-command, key: username }
            - name: MNT_LEAVE_COMMAND_PASSWORD
              valueFrom:
                secretKeyRef: { name: mnt-db-leave-command, key: password }
            - name: MNT_ONTOLOGY_COMMAND_USERNAME
              valueFrom:
                secretKeyRef: { name: mnt-db-ontology-command, key: username }
            - name: MNT_ONTOLOGY_COMMAND_PASSWORD
              valueFrom:
                secretKeyRef: { name: mnt-db-ontology-command, key: password }
          command: [bash, -ceu]
          args:
            - |
              # Secret values arrive here already decoded by Kubernetes. Reject
              # role aliases and pairwise credential reuse before touching the
              # database; a URL-string comparison in the application cannot
              # protect the migration-only credential it never receives.
              test "${PGUSER}" = mnt_app
              test "${MNT_RT_USERNAME}" = mnt_rt
              test "${MNT_LEAVE_COMMAND_USERNAME}" = mnt_leave_cmd
              test "${MNT_ONTOLOGY_COMMAND_USERNAME}" = mnt_ontology_cmd
              passwords=(
                "${PGPASSWORD}"
                "${MNT_RT_PASSWORD}"
                "${MNT_LEAVE_COMMAND_PASSWORD}"
                "${MNT_ONTOLOGY_COMMAND_PASSWORD}"
              )
              for ((i = 0; i < ${#passwords[@]}; i++)); do
                test -n "${passwords[i]}"
                for ((j = i + 1; j < ${#passwords[@]}; j++)); do
                  test "${passwords[i]}" != "${passwords[j]}"
                done
              done

              test "$(psql -v ON_ERROR_STOP=1 -Atqc \
                "SELECT session_user::text || '|' || current_user::text")" = 'mnt_app|mnt_app'

              expected_roles='mnt_app|t|f|t|t|f|f|f
              mnt_leave_cmd|t|f|f|f|f|f|f
              mnt_leave_definer|f|f|f|f|f|f|f
              mnt_ontology_cmd|t|f|f|f|f|f|f
              mnt_ontology_writer|f|f|f|f|f|f|f
              mnt_rt|t|f|f|f|f|f|f'
              actual_roles="$(psql -v ON_ERROR_STOP=1 -At -F '|' <<'SQL'
              SELECT rolname, rolcanlogin, rolsuper, rolbypassrls, rolinherit,
                     rolcreatedb, rolcreaterole, rolreplication
              FROM pg_roles
              WHERE rolname IN (
                'mnt_app', 'mnt_rt', 'mnt_leave_cmd', 'mnt_ontology_cmd',
                'mnt_leave_definer', 'mnt_ontology_writer'
              )
              ORDER BY rolname;
              SQL
              )"
              test "${actual_roles}" = "${expected_roles}"

              expected_memberships='mnt_app|mnt_leave_definer|f|t|t
              mnt_app|mnt_ontology_writer|f|t|t'
              actual_memberships="$(psql -v ON_ERROR_STOP=1 -At -F '|' <<'SQL'
              SELECT member.rolname, granted.rolname, membership.admin_option,
                     membership.inherit_option, membership.set_option
              FROM pg_auth_members membership
              JOIN pg_roles member ON member.oid = membership.member
              JOIN pg_roles granted ON granted.oid = membership.roleid
              WHERE member.rolname IN (
                      'mnt_app', 'mnt_rt', 'mnt_leave_cmd', 'mnt_ontology_cmd',
                      'mnt_leave_definer', 'mnt_ontology_writer'
                    )
                 OR granted.rolname IN (
                      'mnt_app', 'mnt_rt', 'mnt_leave_cmd', 'mnt_ontology_cmd',
                      'mnt_leave_definer', 'mnt_ontology_writer'
                    )
              ORDER BY member.rolname, granted.rolname;
              SQL
              )"
              test "${actual_memberships}" = "${expected_memberships}"
              test "$(psql -v ON_ERROR_STOP=1 -Atqc "SELECT pg_get_userbyid(datdba) FROM pg_database WHERE datname=current_database()")" = mnt_app

              # Prove the three serving credentials are real direct logins,
              # not admin/owner sessions that arrive through SET ROLE. No
              # serving identity may be on either side of a membership edge.
              assert_direct_serving_login() {
                local role="$1"
                local password="$2"
                local actual
                actual="$(PGUSER="${role}" PGPASSWORD="${password}" psql \
                  -v ON_ERROR_STOP=1 -At -F '|' <<'SQL'
              SELECT session_user,
                     current_user,
                     authenticated.rolcanlogin,
                     authenticated.rolsuper,
                     authenticated.rolbypassrls,
                     authenticated.rolinherit,
                     authenticated.rolcreatedb,
                     authenticated.rolcreaterole,
                     authenticated.rolreplication,
                     EXISTS (
                       SELECT 1
                       FROM pg_auth_members membership
                       WHERE membership.member = authenticated.oid
                          OR membership.roleid = authenticated.oid
                     )
              FROM pg_roles authenticated
              WHERE authenticated.rolname = session_user;
              SQL
                )"
                test "${actual}" = "${role}|${role}|t|f|f|f|f|f|f|f"
              }
              assert_direct_serving_login mnt_rt "${MNT_RT_PASSWORD}"
              assert_direct_serving_login mnt_leave_cmd "${MNT_LEAVE_COMMAND_PASSWORD}"
              assert_direct_serving_login mnt_ontology_cmd "${MNT_ONTOLOGY_COMMAND_PASSWORD}"
              echo 'database topology readback passed'
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
