apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Opt-in monitoring resources (ServiceMonitor + PrometheusRule). These require
# the Prometheus Operator CRDs and are NOT referenced by base/prod — see
# README.md. Enable from an overlay with:
#   components:
#     - ../../components/monitoring
resources:
  - servicemonitor.yaml
  - prometheusrule.yaml
