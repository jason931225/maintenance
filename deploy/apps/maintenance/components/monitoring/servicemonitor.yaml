apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mnt-app
  namespace: maintenance
  labels: { app: mnt-app }
spec:
  selector:
    matchLabels: { app: mnt-app }
  # Scrape the active mnt-app Service (the blue/green active endpoint). The
  # preview Service shares the app=mnt-app label, so restrict to the named port.
  endpoints:
    - port: http # named port 8080 on the mnt-app Service
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mnt-mox
  namespace: maintenance
  labels: { app: mnt-mox }
spec:
  selector:
    # The headless StatefulSet Service also has app=mnt-mox; select only the
    # scrape-facing ClusterIP Service to avoid duplicate Prometheus targets.
    matchLabels: { app: mnt-mox, monitoring: "true" }
  endpoints:
    - port: metrics # named port 8010 on the ClusterIP-only mnt-mox Service
      path: /metrics
      interval: 30s
