apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    maintenance.nousresearch.com/context: onprem
    maintenance.nousresearch.com/vip-provider: metallb
    # MetalLB speaker runs as a privileged network component on Talos nodes.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
