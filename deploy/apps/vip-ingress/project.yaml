# Dark Argo CD project for the ADR-0022 on-prem VIP ingress stage.
# This file is intentionally under deploy/apps/vip-ingress/, not deploy/argocd/apps/,
# so merging it does not add the project to the live app-of-apps root.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maintenance-onprem-vip-ingress
  namespace: argocd
  annotations:
    maintenance.nousresearch.com/dark-stage: "true"
    maintenance.nousresearch.com/context: "onprem"
spec:
  description: Dark ADR-0022 on-prem MetalLB L2 VIP ingress stage; manual apply/sync only.
  sourceRepos:
    - https://metallb.github.io/metallb
    - https://github.com/jason931225/maintenance.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: metallb-system
  # MetalLB installs CRDs, ClusterRoles, webhook configuration, and namespaced
  # controller/speaker resources. Keep those permissions scoped to this dark app
  # instead of broadening the live maintenance project during a no-op merge.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
