# Talos machine-config patch for a single-node OCI Ampere A1 cluster.
# Applied on top of `talosctl gen config` output:
#   talosctl gen config maintenance https://<NODE_PUBLIC_IP>:6443 \
#     --config-patch-control-plane @deploy/talos/controlplane.patch.yaml
#
# Single node => workloads must schedule on the control plane.
cluster:
  allowSchedulingOnControlPlanes: true
  # Argo Rollouts/CNPG/cert-manager are plain workloads; nothing cluster-side
  # to add here. Pod CIDRs left at Talos defaults.

machine:
  # OCI exposes one paravirtualized boot volume. Confirm the device with
  # `talosctl -n <ip> disks --insecure` before applying; on A1 it is usually
  # /dev/sda. A selector avoids hard-coding when the name differs.
  install:
    disk: /dev/sda
    wipe: false
  # Oracle's link-local NTP — accurate time is required for TLS, JWT (ES256
  # exp/iat) and CNPG WAL ordering.
  time:
    servers:
      - 169.254.169.254
  # Talos cluster discovery's public registry is unnecessary for one node and
  # is a needless external dependency; keep only KubeSpan-less local discovery.
  features:
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
