apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Rancher local-path-provisioner as the single-node default StorageClass.
# Talos-specific: data path must be a writable location (/var/...), and the
# helper pod needs a privileged PodSecurity namespace to mount the hostPath.
# renovate: datasource=github-releases depName=rancher/local-path-provisioner
resources:
  - https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.30/deploy/local-path-storage.yaml

patches:
  # Talos writable path (the upstream default /opt is read-only on Talos).
  - target: { kind: ConfigMap, name: local-path-config }
    patch: |-
      - op: replace
        path: /data/config.json
        value: |
          {
            "nodePathMap": [
              { "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES", "paths": ["/var/local-path-provisioner"] }
            ]
          }
  # Make it the cluster default StorageClass (CNPG + everything else uses it).
  - target: { kind: StorageClass, name: local-path }
    patch: |-
      - op: add
        path: /metadata/annotations
        value: { "storageclass.kubernetes.io/is-default-class": "true" }
  # The provisioner's helper pod mounts a hostPath → needs a privileged namespace.
  - target: { kind: Namespace, name: local-path-storage }
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          pod-security.kubernetes.io/enforce: privileged
