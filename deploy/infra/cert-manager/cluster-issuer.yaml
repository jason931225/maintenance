# Let's Encrypt issuers, solved over DNS-01 via the Cloudflare API.
#
# The public records (knllogistic.com / www / fsm) are Cloudflare-PROXIED
# (orange cloud), so HTTP-01 can't work — Cloudflare terminates TLS and forces
# HTTPS, so Let's Encrypt can't fetch the port-80 challenge. DNS-01 issues the
# cert by creating an unproxied `_acme-challenge` TXT record through the
# Cloudflare API instead, which is independent of the proxy. Cloudflare SSL/TLS
# mode must then be "Full (strict)" so it validates the real LE cert on origin.
#
# PREREQUISITE (operator, one-time): a Cloudflare API token scoped to
# Zone:DNS:Edit + Zone:Zone:Read for the knllogistic.com zone, stored as a
# Secret in the cert-manager namespace:
#   kubectl -n cert-manager create secret generic cloudflare-api-token \
#     --from-literal=api-token='<TOKEN>'
# Use letsencrypt-staging first to avoid the prod rate limit, then switch the
# Ingress annotation to letsencrypt-prod.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: jason19931225@gmail.com # owner/operator contact for expiry + revocation notices
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: jason19931225@gmail.com # owner/operator contact for expiry + revocation notices
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
